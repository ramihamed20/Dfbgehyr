  {type:'mcq',q:'Which of the following BEST describes an advantage of light-cured composite over chemically-cured composite?',opts:['Deeper depth of cure with no incremental buildup needed','Command setting, no air incorporation (no porosity), and no human mixing variables','Lower polymerization shrinkage due to slower reaction','Does not require a photosensitizer'],ans:1,exp:'Light-cured advantages: (1) command setting (cures only when light applied), (2) no mixing → no air incorporation → no porosity, (3) no human mixing variables → consistent results.'},
  {type:'mcq',q:'To ensure adequate depth of cure in a posterior composite restoration, which of the following should be done?',opts:['Use a single large increment and cure from one side only','Use incremental buildup with each increment cured independently, ≤2–2.5 mm thick','Reduce light exposure time for darker shades','Increase the distance between light tip and composite surface'],ans:1,exp:'Incremental technique (≤2–2.5 mm per increment, each cured independently): overcomes limited depth of cure, reduces shrinkage stress (vectors cancel), ensures full polymerization of each layer.'},
  {type:'mcq',q:'Inhibitors are added to composite resin to:',opts:['Absorb UV light and prevent yellowing','Initiate polymerization when light is applied','Prevent spontaneous polymerization of monomers during storage','Bond the filler particles to the resin matrix'],ans:2,exp:'Inhibitors (free radical scavengers, e.g., monomethyl ether of hydroquinone) quench stray free radicals during storage, preventing premature polymerization and extending shelf life.'},
  {type:'mcq',q:'UV absorbers such as benzophenone are added to composite resin to:',opts:['Initiate the polymerization reaction','Minimize color changes caused by oxidation and prevent yellowing with age','Increase the filler content','Reduce water sorption of the resin'],ans:1,exp:'UV absorbers (benzophenone) intercept UV radiation from sunlight and oral environment, preventing photo-oxidation of the resin matrix. This prevents yellowing and maintains color stability over the restoration\'s lifespan.'},
  {type:'mcq',q:'The thermal conductivity of composite resin compared to metallic restorations is:',opts:['Much higher — leading to thermal sensitivity','Identical — no clinical difference','Lower — provides better thermal insulation, closely matching enamel and dentine','Variable depending only on shade'],ans:2,exp:'Composite has LOW thermal conductivity (similar to enamel and dentine) → good pulp insulation. This is an advantage over metallic restorations, which conduct heat/cold directly to the pulp.'},
  {type:'mcq',q:'Which of the following is a direct consequence of composite resin\'s high coefficient of thermal expansion?',opts:['Increased radiopacity on X-rays','Cyclic thermal changes → material fatigue → marginal gap → percolation of oral fluids','Improved bonding to enamel','Reduced polymerization shrinkage'],ans:1,exp:'High thermal expansion coefficient: cyclic hot/cold changes → repeated expansion/contraction → interfacial fatigue → marginal gap → percolation of oral fluids → secondary caries + postoperative sensitivity.'},
  {type:'mcq',q:'Polymerization shrinkage in composite resin can create interfacial stresses of up to:',opts:['10 kg/cm²','50 kg/cm²','130 kg/cm²','500 kg/cm²'],ans:2,exp:'Polymerization shrinkage creates interfacial stresses up to 130 kg/cm². These stresses can debond the restoration margin, create enamel cracks, and lead to marginal leakage and postoperative sensitivity.'},
  {type:'mcq',q:'Which of the following methods is used to REDUCE polymerization shrinkage clinically?',opts:['Use macrofilled composite with large increments','Incremental addition and polymerizing each increment independently','Increasing the distance of the light source from the composite','Using only chemically-activated composite'],ans:1,exp:'Incremental technique reduces shrinkage effects: each small increment (≤2–2.5 mm) shrinks less total volume, shrinkage vectors partially cancel between layers, and each layer bonds before next is added.'},
  {type:'mcq',q:'Acid etching of enamel for composite bonding is performed using:',opts:['10% citric acid for 60 seconds','30–50% phosphoric acid for 15–30 seconds','37% hydrofluoric acid for 30 seconds','50% polyacrylic acid for 15 seconds'],ans:1,exp:'Enamel etching: 30–50% phosphoric acid for 15–30 seconds. Removes ~15 µm enamel surface, creates microporosities, resin penetrates → microtags → micromechanical bond. Creates characteristic chalky white frosted appearance.'},
  {type:'mcq',q:'Dentin bonding agents are bifunctional monomers because they have:',opts:['Two identical hydrophobic ends','Hydrophilic groups (to wet dentine) on one side and hydrophobic groups (to polymerize with composite) on the other','Two Si-OH groups that bond only to silica','One reactive end that bonds only to enamel'],ans:1,exp:'Dentin bonding agents are bifunctional: hydrophilic end → wets and penetrates moist dentine. Hydrophobic end → co-polymerizes with composite resin. This dual nature bridges the hydrophilic dentine to the hydrophobic composite.'},
  {type:'mcq',q:'Which of the following is a DISADVANTAGE of composite resin compared to amalgam?',opts:['Poor esthetics','High thermal conductivity','Technique sensitivity and polymerization shrinkage leading to marginal leakage','Cannot bond to tooth structure'],ans:2,exp:'Composite disadvantages vs. amalgam: technique sensitivity (multiple steps), polymerization shrinkage (marginal leakage, sensitivity), lower wear resistance in stress-bearing areas. Amalgam self-seals and is more technique-forgiving.'},
  {type:'mcq',q:'Which modification of composite resin involves a matrix that is BOTH organic and inorganic?',opts:['Nanofilled composite','Flowable composite','Ormocers','Packable composite'],ans:2,exp:'Ormocers (Organically Modified Ceramics): matrix = inorganic polysiloxane (SiO₂) backbone + organic methacrylate groups. This unique dual matrix reduces shrinkage, residual monomers, and improves biocompatibility.'},
  {type:'mcq',q:'Flowable composite differs from conventional composite resin mainly because it has:',opts:['Higher filler content and increased viscosity','Lower filler content and decreased viscosity — allowing flow into small cavities','A dual-cure initiator system only','No organic matrix phase'],ans:1,exp:'Flowable composite: lower filler content → decreased viscosity → flows into small/irregular cavities and undercuts. Trade-off: lower filler = slightly lower mechanical properties and higher shrinkage than packable composites.'},
  {type:'mcq',q:'Which of the following composite modifications is specifically designed to release fluoride ions?',opts:['Packable composite','Core build-up composite','Fluoride-releasing composite','Indirect posterior composite'],ans:2,exp:'Fluoride-releasing composite contains fluoride salts in the filler phase. Fluoride release helps prevent secondary caries at restoration margins — a biological modification targeting caries prevention.'},
];

/* ═══════════════════════════════════════════════
   AMALGAM DATA
═══════════════════════════════════════════════ */
const AMALGAM = [
  // ─── PART 1: Introduction → Setting Reaction of Admixed Alloy ───
  // True/False (20)
  {type:'tf',q:'Dental Amalgam is defined as an alloy of Mercury with Silver, Tin, Copper, and sometimes Zinc.',ans:true,exp:'TRUE — Dental amalgam is an alloy of mercury with silver, tin, copper, and sometimes zinc. These metals together create a strong, durable restorative material.'},
  {type:'tf',q:'The hardened set amalgam is weaker than most other direct filling materials.',ans:false,exp:'FALSE — Set amalgam is stronger than any other direct filling material, making it suitable for posterior stress-bearing restorations.'},
  {type:'tf',q:'Dental Amalgam has been used as a direct filling material for posterior teeth for over 160 years.',ans:true,exp:'TRUE — Amalgam has been in clinical use for more than 160 years, making it one of the longest-established dental restorative materials.'},
  {type:'tf',q:'Low Copper Amalgam alloys contain more than 6% Copper.',ans:false,exp:'FALSE — Low Copper alloys contain LESS than 6% copper; High Copper alloys contain MORE than 6% copper.'},
  {type:'tf',q:'In Low Copper Amalgam alloys, Silver makes up 67–74% of the composition.',ans:true,exp:'TRUE — The composition of Low Copper amalgam is approximately Ag 67–74%, Sn 25–27%, Cu 0–6%, and Zn 0–2%.'},
  {type:'tf',q:'Zinc-containing amalgam is defined as one with more than 0.01% Zinc.',ans:true,exp:'TRUE — Any amalgam alloy containing more than 0.01% zinc is classified as zinc-containing and must be protected from moisture contamination.'},
  {type:'tf',q:'Increasing Silver content in amalgam decreases its strength and corrosion resistance.',ans:false,exp:'FALSE — Silver INCREASES strength and corrosion resistance, and also decreases creep and setting time.'},
  {type:'tf',q:'Tin increases the rate of amalgamation because it reacts very readily with mercury.',ans:true,exp:'TRUE — Tin reacts readily with mercury, which facilitates the amalgamation process during mixing/trituration.'},
  {type:'tf',q:'Increasing Copper content in amalgam decreases hardness and strength.',ans:false,exp:'FALSE — Copper INCREASES hardness, strength, setting expansion, and tarnish resistance. It also decreases creep.'},
  {type:'tf',q:'Zinc acts as an oxygen scavenger, minimizing the formation of other oxides.',ans:true,exp:'TRUE — Zinc scavenges oxygen during manufacture, protecting other metals from oxidation and preserving their properties.'},
  {type:'tf',q:'Mercury increases the strength and corrosion resistance of set amalgam.',ans:false,exp:'FALSE — Mercury DECREASES strength and resistance to tarnish and corrosion, and INCREASES creep.'},
  {type:'tf',q:'In the setting reaction of Low Copper Amalgam, the Gamma-1 (γ1) phase precipitates after the Gamma-2 (γ2) phase.',ans:false,exp:'FALSE — γ1 (Ag₂Hg₃) precipitates FIRST; γ2 (Sn₇Hg) precipitates LATER in the setting reaction.'},
  {type:'tf',q:'The Gamma-2 (γ2) phase is the weakest and most corrodible phase in set Low Copper Amalgam.',ans:true,exp:'TRUE — γ2 (Sn₇Hg) is the weakest phase mechanically and the most susceptible to corrosion, which is why High Copper amalgams were developed to eliminate it.'},
  {type:'tf',q:'The Gamma (γ) phase (Ag3Sn) is the strongest and most corrosion-resistant phase in amalgam.',ans:true,exp:'TRUE — The original γ (Ag₃Sn) alloy phase is the strongest and most corrosion-resistant. The ranking from strongest to weakest is: γ > γ1 > γ2.'},
  {type:'tf',q:'Completion of the amalgam setting reaction occurs within the first hour after mixing.',ans:false,exp:'FALSE — While initial set occurs quickly, full completion of the setting reaction may take SEVERAL DAYS to SEVERAL WEEKS.'},
  {type:'tf',q:'The microstructure of set Low Copper Amalgam consists of unreacted Gamma particles surrounded by a matrix of γ1 and γ2 phases.',ans:true,exp:'TRUE — This "cored structure" is characteristic of set Low Copper amalgam: unreacted γ (Ag₃Sn) particles bound in a matrix of γ1 + γ2.'},
  {type:'tf',q:'High Copper Amalgam alloys were developed to eliminate the Gamma-1 (γ1) phase.',ans:false,exp:'FALSE — High Copper amalgam was developed specifically to eliminate the GAMMA-2 (γ2) phase, which is the weakest and most corrodible.'},
  {type:'tf',q:'For elimination of the γ2 phase in High Copper Amalgam, the Copper percentage must be higher than 12%.',ans:true,exp:'TRUE — The copper content must exceed 12% to ensure complete elimination of the γ2 phase through the solid-state reaction.'},
  {type:'tf',q:'In Admixed High Copper Amalgam, the final powder particles are all spherical in shape.',ans:false,exp:'FALSE — Admixed alloy = 2/3 conventional (lathe-cut/irregular) particles + 1/3 spherical Ag-Cu eutectic particles, mixed together.'},
  {type:'tf',q:'In the solid-state reaction of Admixed High Copper Amalgam, γ2 reacts with Ag-Cu eutectic to form the eta phase (Cu6Sn5), eliminating γ2.',ans:true,exp:'TRUE — The solid-state Stage 2 reaction: γ2 + Ag-Cu eutectic → γ1 + Cu₆Sn₅ (eta phase). This eliminates the weak γ2 and strengthens the matrix.'},
  // MCQ (20)
  {type:'mcq',q:'Dental Amalgam is best defined as:',opts:['A pure mercury compound','An alloy of mercury with silver, tin, copper, and sometimes zinc','A silver-tin compound without mercury','A synthetic resin-based material'],ans:1,exp:'Dental amalgam is an alloy of mercury (Hg) with silver (Ag), tin (Sn), copper (Cu), and sometimes zinc (Zn). Mercury is essential for the amalgamation (setting) process.'},
  {type:'mcq',q:'Which of the following is NOT a clinical use of Dental Amalgam?',opts:['Direct permanent posterior restorations','Core build-up material','Cementation of porcelain crowns','Die materials'],ans:2,exp:'Amalgam cannot be used for cementation of porcelain crowns. Its clinical uses include: direct posterior fillings, core build-up, die materials, and retrograde root-end fillings.'},
  {type:'mcq',q:'Dental Amalgam classified as "High Copper" contains:',opts:['Less than 6% Copper','Less than 12% Copper','More than 6% Copper','More than 25% Copper'],ans:2,exp:'High Copper amalgam contains MORE than 6% copper. This higher copper content (>12% eliminates γ2 completely) dramatically improves corrosion resistance and strength.'},
  {type:'mcq',q:'According to classification by particle shape, which type of amalgam alloy has an irregular surface and requires more mercury (about 50%)?',opts:['Spherical','Unicompositional','Lathe-cut (Conventional)','Admixed'],ans:2,exp:'Lathe-cut (conventional) particles are irregular/irregular-shaped, which increases surface area and requires more mercury (~50%) and greater condensation force compared to spherical particles.'},
  {type:'mcq',q:'The composition of Low Copper Amalgam alloy is:',opts:['Ag 67–74%, Sn 25–27%, Cu 0–6%, Zn 0–2%','Ag 40–60%, Sn 17%, Cu 13–30%','Ag 69%, Sn 17%, Cu 13%, Zn 1%','Ag 50%, Sn 30%, Cu 15%, Zn 5%'],ans:0,exp:'Low Copper amalgam composition: Ag 67–74%, Sn 25–27%, Cu 0–6%, Zn 0–2%. High Copper has a different ratio with more copper (e.g., Ag 69%, Sn 17%, Cu 13%, Zn 1%).'},
  {type:'mcq',q:'In Unicompositional High Copper Amalgam alloys, the particle shape is:',opts:['All lathe-cut (irregular)','2/3 conventional + 1/3 spherical','All spherical','Equal conventional and spherical'],ans:2,exp:'Unicompositional (single composition) high copper alloy = ALL SPHERICAL particles. All particles have the same composition: Ag 69%, Sn 17%, Cu 13%, Zn 1%.'},
  {type:'mcq',q:'Which metal in amalgam INCREASES Creep and DECREASES hardness and speed of setting?',opts:['Silver','Copper','Zinc','Tin'],ans:3,exp:'Tin (Sn) increases creep, decreases hardness, and slows amalgamation. However, it is essential because it enables the amalgamation reaction by reacting readily with mercury.'},
  {type:'mcq',q:'Which metal in amalgam DECREASES Creep and INCREASES hardness, strength, and tarnish resistance?',opts:['Tin','Mercury','Copper','Zinc'],ans:2,exp:'Copper (Cu) decreases creep, increases hardness, strength, setting expansion, and tarnish resistance. Higher copper content (>12%) eliminates the weak γ2 phase.'},
  {type:'mcq',q:'The role of Zinc in Dental Amalgam includes all of the following EXCEPT:',opts:['Increases strength','Acts as oxygen scavenger','Causes delayed expansion when contaminated with water','Increases corrosion resistance'],ans:3,exp:'Zinc does NOT increase corrosion resistance. Zinc\'s roles: (1) increases strength, (2) acts as oxygen scavenger, (3) causes delayed expansion if contaminated with water (Zn + H₂O → ZnO + H₂).'},
  {type:'mcq',q:'Contamination of a Zinc-containing Amalgam with water during condensation results in:',opts:['Contraction of the set amalgam','Delayed expansion due to hydrogen gas formation','Immediate rapid setting','Elimination of the γ2 phase'],ans:1,exp:'Water contamination of zinc-containing amalgam → Zn + H₂O → ZnO + H₂ (hydrogen gas). The H₂ gas causes delayed expansion days/weeks after placement, lifting the restoration.'},
  {type:'mcq',q:'In the setting reaction of Low Copper Amalgam, the correct equation is:',opts:['Ag₃Sn + Hg → Ag₂Hg₃ (γ1) + Sn₇Hg (γ2) + Ag₃Sn (unreacted)','Ag₃Sn + Hg → Cu₆Sn₅ + Ag₂Hg₃','Ag₃Sn + Cu → γ2 + eta phase','Sn + Hg → Ag₂Hg₃ + Cu₆Sn₅'],ans:0,exp:'Low Copper setting: Ag₃Sn (γ) + Hg → Ag₂Hg₃ (γ1) + Sn₇Hg (γ2) + unreacted Ag₃Sn (γ). The three phases form a cored structure.'},
  {type:'mcq',q:'The Gamma-1 (γ1) phase in set Amalgam has which crystal structure?',opts:['Hexagonal','Face-centered cubic','Body-centered cubic','Orthorhombic'],ans:2,exp:'γ1 (Ag₂Hg₃) has a BODY-CENTERED CUBIC crystal structure. γ2 (Sn₇Hg) has a HEXAGONAL crystal structure.'},
  {type:'mcq',q:'The Gamma-2 (γ2) phase in set Amalgam has which crystal structure?',opts:['Body-centered cubic','Face-centered cubic','Hexagonal','Tetragonal'],ans:2,exp:'γ2 (Sn₇Hg) has a HEXAGONAL crystal structure. This phase is the weakest and most corrodible, acting as the anode in galvanic corrosion within the amalgam matrix.'},
  {type:'mcq',q:'Which of the following correctly ranks the three amalgam phases from strongest to weakest?',opts:['γ1 > γ2 > γ','γ > γ1 > γ2','γ2 > γ > γ1','γ1 > γ > γ2'],ans:1,exp:'Correct ranking (strongest → weakest): γ (Ag₃Sn) > γ1 (Ag₂Hg₃) > γ2 (Sn₇Hg). γ2 is the weakest and most corrodible phase — hence the drive to eliminate it with High Copper amalgam.'},
  {type:'mcq',q:'Elimination of the γ2 phase from Amalgam results in:',opts:['Lower strength and higher Creep','Higher strength, higher corrosion resistance, and lower Creep','Increased marginal leakage','Increased mercury vapor pressure'],ans:1,exp:'Eliminating γ2 → higher compressive strength, higher corrosion resistance, and lower creep. This is why High Copper amalgam is clinically superior to Low Copper amalgam.'},
  {type:'mcq',q:'The microstructure of set Low Copper Amalgam is best described as:',opts:['Homogeneous single-phase structure','Cored structure: unreacted γ particles bound by γ1 + γ2 matrix','Uniform eta phase throughout','Layered structure with silver on the outside'],ans:1,exp:'Set Low Copper amalgam has a "cored structure": unreacted γ (Ag₃Sn) particles surrounded by a continuous matrix of γ1 + γ2. The γ2 phase at grain boundaries is responsible for corrosion.'},
  {type:'mcq',q:'High Copper Amalgam was developed because:',opts:['The γ1 phase caused excessive expansion','The γ phase was too brittle','The γ2 phase is the weakest and most corrodible phase','Silver content was too high in conventional alloys'],ans:2,exp:'High Copper amalgam was developed specifically because γ2 (Sn₇Hg) is the weakest and most corrodible phase in Low Copper amalgam. Increasing copper > 12% eliminates γ2 via solid-state reaction.'},
  {type:'mcq',q:'In the Admixed High Copper Amalgam, the Ag-Cu eutectic particles act as:',opts:['Oxygen scavengers','Strong fillers that strengthen the amalgam matrix','Lubricants to reduce condensation force','Corrosion inhibitors only'],ans:1,exp:'Ag-Cu eutectic spherical particles in Admixed amalgam act as strong fillers that reinforce the matrix AND participate in the solid-state reaction (reacting with γ2 to eliminate it).'},
  {type:'mcq',q:'The INITIAL setting reaction of Admixed High Copper Amalgam with mercury is:',opts:['Completely different from Low Copper amalgam','Similar to Low Copper amalgam — γ1 + γ2 form initially','Produces only the eta phase immediately','Produces only unreacted gamma particles'],ans:1,exp:'The INITIAL (Stage 1) reaction of Admixed amalgam is the same as Low Copper: Ag₃Sn + Hg → γ1 + γ2. The γ2 is then eliminated in Stage 2 by the solid-state reaction with Ag-Cu eutectic.'},
  {type:'mcq',q:'In the solid-state (secondary) reaction of Admixed High Copper Amalgam, γ2 is eliminated by reacting with:',opts:['Excess silver particles','Zinc oxide','Ag-Cu eutectic particles to form Cu₆Sn₅ (eta phase)','Unreacted γ particles'],ans:2,exp:'Stage 2 (solid-state): γ2 + Ag-Cu eutectic → γ1 + Cu₆Sn₅ (eta phase). The Ag-Cu eutectic spheres react with γ2, eliminating it and replacing it with the stronger eta phase.'},
  // ─── PART 2: Setting Reactions → Properties → Manipulation → Modifications ───
  // True/False (20)
  {type:'tf',q:'In Admixed High Copper Amalgam, the γ2 phase never forms during the setting reaction.',ans:false,exp:'FALSE — In Admixed amalgam, γ2 DOES form initially (Stage 1, same as Low Copper), but is then eliminated in the solid-state Stage 2 reaction with Ag-Cu eutectic.'},
  {type:'tf',q:'In Unicompositional High Copper Amalgam, γ2 forms initially and then disappears due to the solid-state reaction.',ans:false,exp:'FALSE — In Unicompositional amalgam, γ2 NEVER FORMS AT ALL. The higher and more uniformly distributed copper reacts immediately to produce γ1 + eta phase directly, bypassing γ2 formation.'},
  {type:'tf',q:'The eta phase produced in High Copper Amalgam has the formula Cu6Sn5.',ans:true,exp:'TRUE — The eta (η) phase = Cu₆Sn₅. It forms when copper reacts with the tin in γ2, eliminating the weak γ2 and replacing it with the stronger eta phase.'},
  {type:'tf',q:'In the solid-state reaction of Admixed amalgam, γ2 reacts with Ag-Cu eutectic particles to produce γ1 and eta phase.',ans:true,exp:'TRUE — Stage 2 solid-state reaction: γ2 + Ag-Cu eutectic → γ1 + Cu₆Sn₅ (eta). This eliminates γ2 and is why Admixed High Copper amalgam has superior properties.'},
  {type:'tf',q:'The copper content must exceed 12% for complete elimination of the γ2 phase.',ans:true,exp:'TRUE — Cu > 12% is required for complete γ2 elimination. Below this threshold, some γ2 remains in the set structure, reducing corrosion resistance and strength.'},
  {type:'tf',q:'The compressive strength of set dental amalgam is 100–200 MN/m², making it the strongest direct restorative material.',ans:false,exp:'FALSE — Compressive strength of dental amalgam is 300–500 MN/m² (NOT 100–200). While it IS the strongest direct restorative, the correct range is 300–500 MN/m².'},
  {type:'tf',q:'According to ADA specifications, the maximum acceptable creep for dental amalgam is less than 3%.',ans:true,exp:'TRUE — ADA specification No. 1 states maximum acceptable creep = less than 3%. High Copper amalgam has much lower creep (0.1–0.4%) vs Low Copper (0.8–8%).'},
  {type:'tf',q:'The creep of Low Copper amalgam ranges from 0.1–0.4%.',ans:false,exp:'FALSE — Low Copper creep = 0.8–8% (high creep, clinical problem). High Copper creep = 0.1–0.4% (low creep, clinically acceptable). This is reversed.'},
  {type:'tf',q:'The viscoelastic properties of dental amalgam are reflected by creep.',ans:true,exp:'TRUE — Creep is the time-dependent deformation of amalgam under sustained loading conditions, reflecting its viscoelastic (part viscous, part elastic) behavior.'},
  {type:'tf',q:'Delayed expansion can occur in any type of amalgam alloy when contaminated with water during manipulation.',ans:false,exp:'FALSE — Delayed expansion occurs ONLY in ZINC-CONTAINING amalgam. The reaction: Zn + H₂O → ZnO + H₂. The hydrogen gas causes progressive expansion days to weeks later.'},
  {type:'tf',q:'The dimensional changes of dental amalgam become nearly constant after 6–8 hours, and final values are recorded after 24 hours.',ans:true,exp:'TRUE — Dimensional changes stabilize at 6–8 hours, and the final dimensional change values are recorded at 24 hours as per standardized testing protocols.'},
  {type:'tf',q:'Corrosion in set dental amalgam occurs primarily in the γ1 phase because it acts as an anode.',ans:false,exp:'FALSE — Corrosion occurs primarily in γ2 phase (Sn₇Hg), which is the ANODE in galvanic corrosion. γ1 acts as the cathode. This is why eliminating γ2 improves corrosion resistance.'},
  {type:'tf',q:'The self-sealing property of amalgam is due to corrosion products filling the marginal gap over time.',ans:true,exp:'TRUE — Corrosion products (tin and mercury oxides/chlorides) accumulate at the tooth-amalgam interface, gradually sealing marginal gaps. This reduces microleakage over time.'},
  {type:'tf',q:'Mercury addition increases the compressive strength of dental amalgam.',ans:false,exp:'FALSE — Mercury DECREASES strength and corrosion resistance, and INCREASES creep. Excess mercury (higher Hg:alloy ratio) weakens the restoration — hence the importance of proper mercury/alloy ratio.'},
  {type:'tf',q:'Spherical alloy particles require less mercury (about 42%) and less condensation force than lathe-cut particles.',ans:true,exp:'TRUE — Spherical particles have lower surface area, require less mercury (~42% vs ~50% for lathe-cut), and need less condensation force. They produce a smoother surface and faster set.'},
  {type:'tf',q:'Small alloy particles produce a rougher surface and lower strength than large particles.',ans:false,exp:'FALSE — Small particles give HIGHER strength (more reactive surface), SMOOTHER surface (finer texture), and more rapid setting. Small particles are clinically preferable.'},
  {type:'tf',q:'Condensation of amalgam should be delayed until the material begins to harden to achieve better adaptation.',ans:false,exp:'FALSE — Condensation must be done IMMEDIATELY after trituration while the mix is still plastic. Delay allows partial crystallization, leading to a weak, poorly adapted restoration.'},
  {type:'tf',q:'Finishing and polishing of amalgam is done after 24 hours using wet abrasives such as pumice.',ans:true,exp:'TRUE — Finishing and polishing at 24 hours allows sufficient setting. Wet abrasives (pumice, Soflex discs) are used. Dry polishing or high heat must be avoided to prevent mercury vapor release.'},
  {type:'tf',q:'Addition of Palladium (0.5–1%) to High Copper amalgam decreases its strength and corrosion resistance.',ans:false,exp:'FALSE — Palladium (Pd) INCREASES strength and corrosion resistance, and DECREASES creep. It is added to further improve the properties of High Copper amalgam.'},
  {type:'tf',q:'Gallium alloy is a mercury-free alternative to dental amalgam.',ans:true,exp:'TRUE — Gallium (Ga) alloy replaces mercury as the liquid metal component, reacting with silver-tin alloy powder. It is the only mercury-free alternative that mimics amalgam\'s properties.'},
  // MCQ (20)
  {type:'mcq',q:'In the setting reaction of Admixed amalgam, which phase is eliminated by the solid-state reaction?',opts:['γ (Ag₃Sn)','γ1 (Ag₂Hg₃)','γ2 (Sn₇Hg)','Eta phase (Cu₆Sn₅)'],ans:2,exp:'γ2 (Sn₇Hg) is the phase eliminated by the solid-state Stage 2 reaction. γ2 + Ag-Cu eutectic → γ1 + Cu₆Sn₅. γ2 is weak and corrodible; its elimination is the key advantage of High Copper amalgam.'},
  {type:'mcq',q:'The solid-state reaction in Admixed High Copper Amalgam can be written as:',opts:['Ag₃Sn + Hg → γ1 + γ2','γ2 + Ag-Cu spheres → γ1 + Cu₆Sn₅','γ1 + Ag-Cu → γ2 + Cu₆Sn₅','Ag₃Sn + Cu → η phase only'],ans:1,exp:'The solid-state Stage 2 reaction: γ2 + Ag-Cu eutectic → γ1 + Cu₆Sn₅ (eta phase). This eliminates γ2. Option A is the Stage 1 (initial) reaction common to both Low and High Copper.'},
  {type:'mcq',q:'In Unicompositional High Copper Amalgam, the setting reaction directly produces:',opts:['γ1 + γ2','γ2 + eta phase','γ1 + eta phase (no γ2)','γ1 + γ2 + eta phase'],ans:2,exp:'In Unicompositional amalgam, γ2 NEVER FORMS. The reaction produces γ1 + Cu₆Sn₅ (eta) directly, because copper is uniformly distributed at high enough concentration to react with Sn before γ2 can form.'},
  {type:'mcq',q:'The viscoelastic properties of dental amalgam are reflected by:',opts:['Electrical conductivity','Thermal insulation','Creep','Compressive strength'],ans:2,exp:'Creep reflects the viscoelastic behavior of amalgam — slow plastic deformation under sustained load. Amalgam has both elastic (recoverable) and viscous (permanent) deformation components.'},
  {type:'mcq',q:'The compressive strength of dental amalgam is:',opts:['55–100 MN/m²','150–200 MN/m²','300–500 MN/m²','700–900 MN/m²'],ans:2,exp:'Compressive strength of dental amalgam = 300–500 MN/m². This makes it the strongest direct filling material. High Copper amalgam achieves the higher end of this range.'},
  {type:'mcq',q:'According to ADA specification, the maximum acceptable creep for dental amalgam is:',opts:['Less than 1%','Less than 3%','Less than 5%','Less than 8%'],ans:1,exp:'ADA maximum acceptable creep = less than 3%. High Copper amalgam: 0.1–0.4% (well within limit). Low Copper amalgam: 0.8–8% (may exceed ADA limit, causing marginal breakdown).'},
  {type:'mcq',q:'Dimensions of dental amalgam become nearly constant after:',opts:['2–4 hours','3–5 hours','6–8 hours','120 minutes'],ans:2,exp:'Dimensional changes of set amalgam stabilize after 6–8 hours. Final dimensional change values are recorded at 24 hours per standardized protocol.'},
  {type:'mcq',q:'Delayed expansion in zinc-containing amalgam is caused by:',opts:['Rapid γ2 formation','Excess mercury reacting with silver','Zn + H₂O → ZnO + H₂ (hydrogen gas)','Setting contraction of the matrix'],ans:2,exp:'Delayed expansion: Zn + H₂O → ZnO + H₂. The hydrogen gas generated causes progressive expansion that can lift and fracture the restoration days to weeks after placement.'},
  {type:'mcq',q:'The phase primarily responsible for corrosion in Low Copper Amalgam is:',opts:['γ (Ag₃Sn)','γ1 (Ag₂Hg₃)','γ2 (Sn₇Hg)','Eta phase (Cu₆Sn₅)'],ans:2,exp:'γ2 (Sn₇Hg) is the ANODE in galvanic corrosion (most electrochemically active). γ1 is the cathode. This electrochemical couple makes γ2 preferentially corrode, weakening the amalgam matrix.'},
  {type:'mcq',q:'Mercury addition to dental amalgam:',opts:['Increases strength and decreases creep','Increases creep and decreases strength','Has no effect on mechanical properties','Decreases setting expansion'],ans:1,exp:'Excess mercury increases creep and decreases compressive strength and corrosion resistance. The ADA recommends minimizing excess mercury — hence condensation squeezes out excess Hg.'},
  {type:'mcq',q:'Compared to lathe-cut particles, spherical alloy particles require:',opts:['More mercury (50%) and more condensation force','Less mercury (42%) and less condensation force','Same mercury but less condensation force','Less mercury but more condensation force'],ans:1,exp:'Spherical particles have lower surface area → need less mercury (~42%) and less condensation force. Lathe-cut particles have higher surface area → need more mercury (~50%) and greater force.'},
  {type:'mcq',q:'Small alloy particles in dental amalgam produce:',opts:['Slower setting and rougher surface','Rapid hardening, greater strength, and smoother surface','Higher corrosion tendency and lower strength','Greater mercury requirement'],ans:1,exp:'Small particles: more reactive surface area → rapid hardening, greater compressive strength, and smoother surface finish. Clinically this means faster work time constraints but better final properties.'},
  {type:'mcq',q:'The goals of condensation in amalgam manipulation include all of the following EXCEPT:',opts:['Adaptation to cavity walls','Elimination of excess mercury','Bonding of increments together','Increasing the mercury content of the mix'],ans:3,exp:'Condensation goals: (1) adapt to cavity walls, (2) eliminate excess mercury (squeezed out), (3) bond increments together. Condensation REMOVES mercury — it never increases it.'},
  {type:'mcq',q:'Trimming and carving of amalgam is performed to:',opts:['Remove excess mercury','Reproduce tooth anatomy','Polish the surface to final smoothness','Increase adaptation to cavity walls'],ans:1,exp:'Trimming and carving reproduces tooth anatomy (cusps, fissures, contact points) and removes gross excess material. Polishing (to final smoothness) is a separate step done at a later appointment.'},
  {type:'mcq',q:'Finishing and polishing of amalgam must be done:',opts:['Immediately after condensation','After carving and before setting','After 24 hours using wet abrasives such as pumice','At the same appointment as placement'],ans:2,exp:'Finishing/polishing at 24 hours allows adequate setting. Wet abrasives prevent heat generation. Polishing reduces surface roughness and corrosion. Immediate polishing risks weakening the set.'},
  {type:'mcq',q:'High temperatures should be avoided during finishing and polishing because they:',opts:['Cause delayed expansion','Increase γ2 formation','Release mercury vapor','Reduce surface hardness permanently'],ans:2,exp:'High temperature during polishing releases mercury vapor from the amalgam surface — a health and safety hazard to the patient and operator. Wet abrasives and light pressure prevent excessive heat.'},
  {type:'mcq',q:'Addition of Palladium (0.5–1%) to High Copper amalgam:',opts:['Decreases strength and increases creep','Increases strength and corrosion resistance, decreases creep','Has no significant effect on properties','Increases mercury vapor pressure'],ans:1,exp:'Palladium (Pd) 0.5–1%: increases compressive strength and corrosion resistance, decreases creep. It improves the overall properties of High Copper amalgam further beyond the elimination of γ2.'},
  {type:'mcq',q:'Addition of Indium (8–14%) to amalgam:',opts:['Eliminates the γ2 phase','Decreases mercury vapor pressure','Increases setting contraction','Acts as an oxygen scavenger'],ans:1,exp:'Indium (In) 8–14% decreases mercury vapor pressure. This reduces mercury volatility and potential environmental/health hazard, while also improving some mechanical properties.'},
  {type:'mcq',q:'Copper Amalgam (Hg 60–70%, Cu 30–40%) is NOT recommended for routine clinical use because:',opts:['It lacks antibacterial properties','It has very low strength','It has excessive mercury content causing health hazards','It has very high solubility'],ans:2,exp:'Copper amalgam (60–70% Hg) has excessive mercury content, creating unacceptable health hazards from mercury vapor and toxicity. Its very high mercury content makes it clinically unacceptable for routine use.'},
  {type:'mcq',q:'Which of the following is a mercury-free alternative to dental amalgam?',opts:['Copper amalgam','Indium amalgam','Gallium alloy','Silver admixed GIC'],ans:2,exp:'Gallium (Ga) alloy is the only true mercury-free alternative to dental amalgam. Gallium metal replaces mercury as the liquid component, reacting with Ag-Sn alloy powder to form a solid restoration.'},
];

/* ═══════════════════════════════════════════════
   ELASTIC IMPRESSION MATERIALS — Quiz 8
   Polysulfide · Condensation Silicone · Addition Silicone · Polyether
   20 T/F + 20 MCQ = 40 Q | 2025–2026
═══════════════════════════════════════════════ */
const ELASTIC = [
  // TRUE / FALSE (20)
  {type:'tf',q:'Elastomeric rubber impression materials are classified as non-aqueous elastic impression materials.',ans:true,exp:'TRUE — Elastomeric materials (polysulfide, silicones, polyether) are classified as non-aqueous elastic impression materials, distinguishing them from hydrocolloids which use water as the dispersion medium.'},
  {type:'tf',q:'The consistency of elastomeric impression materials is governed only by the molecular weight of the polymers.',ans:false,exp:'FALSE — Consistency is governed by TWO factors: (1) the molecular weight of the polymers AND (2) the amount of fillers present. More filler = higher viscosity and lower shrinkage.'},
  {type:'tf',q:'Polysulfide and condensation silicone both set by addition polymerization.',ans:false,exp:'FALSE — Polysulfide and condensation silicone set by CONDENSATION polymerization. ADDITION polymerization applies to addition silicone and polyether.'},
  {type:'tf',q:'A putty-wash technique is used to compensate for polymerization shrinkage in elastomeric materials.',ans:true,exp:'TRUE — The putty-wash (two-stage) technique places a heavy-body putty first to absorb most of the shrinkage, then a thin wash of light-body material records fine detail after shrinkage has largely occurred.'},
  {type:'tf',q:'In polysulfide impression material, lead dioxide is found in the BASE paste.',ans:false,exp:'FALSE — Lead dioxide is found in the CATALYST paste, not the base. The BASE paste contains the low molecular weight polymer with mercaptan groups and reinforcing fillers.'},
  {type:'tf',q:'Both increased moisture and increased temperature accelerate the setting reaction of polysulfide.',ans:true,exp:'TRUE — Polysulfide setting is accelerated by both higher temperature and higher moisture/humidity. This means hot, humid conditions significantly shorten working time.'},
  {type:'tf',q:'The working time for polysulfide rubber impression material is 5–7 minutes, and the setting time is 8–12 minutes.',ans:true,exp:'TRUE — Polysulfide has the longest working time (5–7 min) among rubber impression materials, with a total setting time of 8–12 minutes in the mouth.'},
  {type:'tf',q:'Polysulfide rubber shrinks 0.3–0.4% during the first 24 hours because water is released as a by-product of the setting reaction.',ans:true,exp:'TRUE — The condensation reaction of polysulfide releases water as a by-product. This water evaporation causes dimensional shrinkage of 0.3–0.4% within the first 24 hours.'},
  {type:'tf',q:'Polysulfide impression material must be poured within 24 hours and allows multiple pours.',ans:false,exp:'FALSE — Polysulfide must be poured within 1 HOUR (not 24 hours) and allows only a SINGLE POUR. The ongoing water by-product causes continuous dimensional change, making multiple pours inaccurate.'},
  {type:'tf',q:'The base paste of condensation silicone contains a silicone polymer with terminal VINYL groups.',ans:false,exp:'FALSE — The base of condensation silicone contains a silicone polymer with terminal HYDROXYL groups (–OH), e.g. dimethylsiloxane. Terminal VINYL groups are found in the ADDITION silicone base paste.'},
  {type:'tf',q:'Initial mixing of condensation silicone putty by hand is inadvisable because high concentrations of accelerator contacting the skin may cause an allergic response.',ans:true,exp:'TRUE — The organo-tin catalyst in the putty can cause allergic skin reactions. Gloves should always be worn or the two-phase auto-mix system used.'},
  {type:'tf',q:'Condensation silicone has greater dimensional stability than polysulfide rubber.',ans:false,exp:'FALSE — Condensation silicone has LESS dimensional stability than polysulfide. The dimensional change during 24 hours for condensation silicone is larger. The best dimensional stability among rubbers belongs to ADDITION silicone.'},
  {type:'tf',q:'Addition silicone (vinyl polysiloxane) produces no by-product during the setting reaction, which is why it has the best dimensional stability among rubber impression materials.',ans:true,exp:'TRUE — Addition silicone undergoes addition polymerization with NO by-product released. This absence of shrinkage-causing by-products gives it the best dimensional stability of all rubber impression materials.'},
  {type:'tf',q:'Latex gloves should be avoided when handling addition silicone because the sulfur in latex inhibits the setting reaction.',ans:true,exp:'TRUE — Sulfur compounds in latex gloves are absorbed onto the platinum catalyst surface, poisoning it and preventing the addition polymerization reaction from occurring properly.'},
  {type:'tf',q:'The hydrogen gas problem in addition silicone occurs because of a side reaction involving residual hydroxyl groups, and can cause bubbles in gypsum models poured less than 1 hour after the impression.',ans:true,exp:'TRUE — A side reaction between residual hydroxyl groups and the platinum catalyst produces hydrogen gas. This gas can create bubbles in gypsum models poured within the first hour. Waiting 1 hour before pouring allows the gas to dissipate.'},
  {type:'tf',q:'Polyether has the longest working time of all rubber impression materials.',ans:false,exp:'FALSE — Polyether has the SHORTEST working time of all rubber impression materials. The longest working time belongs to POLYSULFIDE (5–7 min). Polyether\'s short working time is a clinical disadvantage.'},
  {type:'tf',q:'Polyether impression material absorbs water if stored in a moist environment, causing dimensional changes.',ans:true,exp:'TRUE — Polyether is hydrophilic and will absorb water (imbibition) if stored in moist conditions, causing dimensional expansion and distorting the impression.'},
  {type:'tf',q:'A 4mm rather than 2mm rubber thickness between the tray and teeth is recommended for polyether due to its low flexibility.',ans:true,exp:'TRUE — Polyether is the most rigid (least flexible) rubber impression material. Greater bulk (4mm) is needed to provide enough elasticity for removal without permanent deformation or tearing.'},
  {type:'tf',q:'The correct order of tear strength from greatest to least is: Polysulfide > Addition Silicone > Polyether > Condensation Silicone >> Hydrocolloids.',ans:true,exp:'TRUE — Polysulfide has the highest tear strength, making it resilient in areas with thin sections. Hydrocolloids have very low tear strength in comparison to all rubber materials.'},
  {type:'tf',q:'The correct order of dimensional stability from best to worst is: Addition Silicone > Polyether > Polysulfide > Condensation Silicone > Hydrocolloid.',ans:true,exp:'TRUE — Addition silicone (no by-product) > Polyether (can be stored 1 week) > Polysulfide (water by-product, pour within 1 hr) > Condensation silicone (alcohol by-product, most shrinkage) > Hydrocolloid (syneresis/imbibition).'},
  // MCQ (20)
  {type:'mcq',q:'Polysulfide rubber impression material is also known by which of the following names?',opts:['Vinyl polysiloxane','Mercaptan / Thiokol / Rubber Base','Polyvinyl siloxane','Aromatic polyether'],ans:1,exp:'Polysulfide = Mercaptan / Thiokol / Rubber Base. Vinyl polysiloxane and polyvinyl siloxane are both names for ADDITION silicone. Aromatic polyether is not a recognized impression material name.'},
  {type:'mcq',q:'In the polysulfide catalyst paste, inert oils such as stearic acid are added to function as:',opts:['Accelerators to shorten the setting time','Plasticizers to improve elasticity of the set rubber','Retarders to extend the working time','Fillers to increase the viscosity'],ans:2,exp:'Inert oils (stearic acid, dibutyl phthalate) act as RETARDERS, extending working time. Lead dioxide is the oxidizing agent that drives the reaction — the inert oils slow it down.'},
  {type:'mcq',q:'Why must polysulfide rubber impression material be used in a thin section with a close-fitting custom tray?',opts:['To allow the water by-product to evaporate before pouring the cast','To prevent the material from contacting moisture in the mouth','To decrease the amount of polymerization shrinkage and maintain high tear strength','To increase flexibility and allow easy removal from undercuts'],ans:2,exp:'Thin sections in a close-fitting tray minimize the total shrinkage volume and preserve the high tear strength of polysulfide. Polysulfide is actually ACCELERATED by moisture, not prevented from it.'},
  {type:'mcq',q:'A polysulfide impression was taken but the clinician could not pour the cast immediately. What is the MAXIMUM time allowed before pouring?',opts:['30 minutes','1 hour','24 hours','1 week if stored dry'],ans:1,exp:'Polysulfide must be poured within 1 HOUR due to ongoing dimensional change from the water by-product. 24 hours applies to agar. 1 week applies to POLYETHER (stored dry).'},
  {type:'mcq',q:'What does the BASE paste of condensation silicone contain?',opts:['Silicone polymer with terminal vinyl groups + chloroplatinic acid catalyst','Silicone polymer with terminal hydroxyl groups (–OH) + silica filler','Low molecular weight polyether with ethylene imine terminal groups','Mercaptan polymer + titanium dioxide filler'],ans:1,exp:'Condensation silicone base: silicone polymer with terminal –OH groups (dimethylsiloxane) + silica filler. Terminal vinyl groups + chloroplatinic acid describe ADDITION silicone. Mercaptan = polysulfide.'},
  {type:'mcq',q:'In condensation silicone, the organo-tin compound (e.g. dibutyl-tin dilaurate) in the catalyst paste functions as:',opts:['A cross-linking agent that connects silicone chains','A filler to control the viscosity of the catalyst','An activator / accelerator for the setting reaction','A retarder to extend the working time'],ans:2,exp:'The organo-tin compound is an ACTIVATOR/ACCELERATOR. The cross-linking agent is the alkoxy ortho-silicate. Fillers are separate components that control viscosity independently.'},
  {type:'mcq',q:'Compared to polysulfide, condensation silicone has which of the following properties?',opts:['Higher permanent deformation, higher flexibility, and longer shelf life','Lower permanent deformation, lower flexibility, and shorter shelf life','Equal permanent deformation but greater dimensional stability','Lower permanent deformation, higher flexibility, and greater dimensional stability'],ans:1,exp:'Condensation silicone vs polysulfide: LOWER permanent deformation, LOWER flexibility, and SHORTER shelf life. Dimensional stability is also WORSE (more shrinkage from alcohol by-product).'},
  {type:'mcq',q:'Addition silicone (vinyl polysiloxane) was introduced in:',opts:['1945','1960','1970','1985'],ans:2,exp:'Addition silicone was introduced in 1970. It represents a significant advancement over condensation silicone, offering no by-product, superior dimensional stability, and the ability to be stored for 1 week.'},
  {type:'mcq',q:'Why is the auto-mixing system (dual cartridge + static mixing gun) preferred for addition silicone?',opts:['It increases working time by cooling the material during extrusion','It ensures proper base-to-catalyst ratio, fewer air bubbles, and no contamination from latex gloves','It eliminates the need for a custom tray by ensuring uniform material distribution','It activates the setting reaction with light, speeding up the process'],ans:1,exp:'The auto-mix system ensures accurate base:catalyst ratio, minimizes air incorporation, and avoids hand-mixing contact with latex gloves (which contain sulfur that inhibits the platinum catalyst).'},
  {type:'mcq',q:'A gypsum model poured 30 minutes after taking an addition silicone impression shows multiple air bubbles. What is the MOST likely cause?',opts:['Insufficient spatulation causing air incorporation during mixing','Imbibition of moisture from the fresh gypsum during pouring','Hydrogen gas released from a side reaction due to residual hydroxyl groups','Condensation by-product trapped within the impression surface'],ans:2,exp:'Hydrogen gas from residual hydroxyl groups reacting with the platinum catalyst causes bubbles in gypsum models poured within 1 hour. Solution: wait at least 1 hour before pouring. Addition silicone produces NO condensation by-product.'},
  {type:'mcq',q:'What is the FLEXIBILITY of addition silicone compared to other rubber impression materials?',opts:['Highest flexibility among all rubber impression materials','Equal to condensation silicone in flexibility','Less flexible than both polysulfide and condensation silicone','Most flexible of all elastic impression materials including hydrocolloids'],ans:2,exp:'Addition silicone is LESS flexible than both polysulfide and condensation silicone. The most flexible of ALL elastic impression materials (including hydrocolloids) is ALGINATE at ~14%.'},
  {type:'mcq',q:'The base of polyether impression material contains a moderately low-molecular weight polyether with ethylene imine terminal groups. These groups react with which catalyst?',opts:['Organo-tin compound to form an alcohol by-product','Chloroplatinic acid to initiate addition polymerization','Lead dioxide to cross-link the mercaptan groups','Aromatic sulfonic acid ester to form a cross-linked high-molecular weight rubber'],ans:3,exp:'Polyether base (ethylene imine groups) + catalyst (aromatic sulfonic acid ester) → cationic ring-opening polymerization → cross-linked rubber. No by-product is released, giving good dimensional stability.'},
  {type:'mcq',q:'What happens if the length of the polyether catalyst is INCREASED by 25%?',opts:['Setting time increases (slower set)','Setting time decreases (faster set)','Working time increases proportionally','No effect — only temperature affects polyether setting time'],ans:1,exp:'More catalyst = faster reaction = SHORTER setting time. Both catalyst amount AND temperature affect polyether setting. Working time is ALSO shortened when catalyst is increased.'},
  {type:'mcq',q:'A clinician chooses polyether for a crown and bridge impression. The patient has very pronounced undercuts. What is the MAIN concern?',opts:['Polyether produces excessive hydrogen gas that distorts the impression','Polyether is highly flexible and may not record fine details accurately','Polyether has low flexibility and may be difficult to remove from undercuts','Polyether absorbs the patient\'s saliva and expands during the impression'],ans:2,exp:'Polyether is the MOST RIGID of all rubber impression materials (lowest flexibility). In pronounced undercuts, this rigidity makes removal difficult and risks distortion or tearing. Hydrogen gas is a problem with addition silicone, not polyether.'},
  {type:'mcq',q:'How long can a polyether impression be stored before pouring, and under what condition?',opts:['1 hour, stored at room temperature','24 hours, stored in 100% relative humidity','Up to 1 week, kept dry','30 minutes, stored in a sealed bag'],ans:2,exp:'Polyether can be stored up to 1 WEEK if kept DRY. This is excellent dimensional stability. 100% humidity storage is for agar/alginate — polyether would absorb water and expand (imbibition) in humid conditions.'},
  {type:'mcq',q:'Which of the following is the correct order of WORKING TIME from LONGEST to SHORTEST?',opts:['Polysulfide > Agar > Silicones > Alginate > Polyether','Agar > Polysulfide > Silicones > Alginate > Polyether','Agar > Silicones > Polysulfide > Alginate > Polyether','Polysulfide > Silicones > Agar > Polyether > Alginate'],ans:1,exp:'Agar > Polysulfide > Silicones > Alginate > Polyether. Agar has the longest working time (controlled by water-cooling speed). Polyether has the shortest. Polysulfide has the longest working time among rubber materials.'},
  {type:'mcq',q:'Which of the following correctly lists STIFFNESS from MOST to LEAST?',opts:['Addition Silicone > Polyether > Condensation Silicone > Polysulfide > Hydrocolloids','Polyether > Addition Silicone > Condensation Silicone > Polysulfide > Hydrocolloids','Polysulfide > Polyether > Addition Silicone > Condensation Silicone > Hydrocolloids','Polyether > Condensation Silicone > Addition Silicone > Polysulfide > Hydrocolloids'],ans:1,exp:'Polyether is the MOST STIFF (rigid). Correct order: Polyether > Addition Silicone > Condensation Silicone > Polysulfide > Hydrocolloids. Polysulfide has the most flexibility (lowest stiffness) among rubbers.'},
  {type:'mcq',q:'Which of the following correctly lists COST from LOWEST to HIGHEST?',opts:['Alginate < Agar = Polysulfide < Condensation Silicone < Addition Silicone < Polyether','Agar < Alginate < Polysulfide < Condensation Silicone < Addition Silicone < Polyether','Alginate < Polysulfide < Agar < Condensation Silicone < Polyether < Addition Silicone','Alginate < Agar < Condensation Silicone < Polysulfide < Addition Silicone < Polyether'],ans:0,exp:'Correct cost order (low to high): Alginate < Agar = Polysulfide < Condensation Silicone < Addition Silicone < Polyether. Alginate is the cheapest; polyether is the most expensive rubber impression material.'},
  {type:'mcq',q:'Which rubber impression material CANNOT be electroplated?',opts:['Polysulfide','Condensation silicone','Addition silicone','Polyether'],ans:3,exp:'Polyether CANNOT be electroplated. Polysulfide, condensation silicone, and addition silicone can all be electroplated with silver or copper to produce metal dies.'},
  {type:'mcq',q:'Which of the following correctly lists DIMENSIONAL STABILITY from BEST to WORST?',opts:['Polyether > Addition Silicone > Polysulfide > Condensation Silicone > Hydrocolloid','Addition Silicone > Condensation Silicone > Polyether > Polysulfide > Hydrocolloid','Addition Silicone > Polyether > Polysulfide > Condensation Silicone > Hydrocolloid','Polysulfide > Addition Silicone > Polyether > Condensation Silicone > Hydrocolloid'],ans:2,exp:'Best to worst dimensional stability: Addition Silicone (no by-product) > Polyether (store 1 week dry) > Polysulfide (water by-product, 1 hr) > Condensation Silicone (alcohol by-product, most shrinkage) > Hydrocolloid (syneresis/imbibition).'},
];


/* ═══════════════════════════════════════════════
   MODEL & DIE MATERIALS — Quiz 9
   Gypsum Products · Die Materials · Classification · Properties
   15 T/F + 15 MCQ = 30 Q | 2025–2026
═══════════════════════════════════════════════ */
const MODELDIE = [
  {type:'tf',q:'A die is a positive replica of teeth and the surrounding soft tissues.',ans:false,exp:'FALSE — A die is a model of a SINGLE tooth only. The full arch replica (including soft tissues) is called a Model or Cast.'},
  {type:'tf',q:'Gypsum is Calcium Sulphate Dihydrate.',ans:true,exp:'TRUE — Gypsum (the raw mineral) is CaSO₄·2H₂O (Calcium Sulphate Dihydrate). All dental gypsum products are derived from it by controlled dehydration (calcination).'},
  {type:'tf',q:'All gypsum products are chemically different from each other.',ans:false,exp:'FALSE — All gypsum products are chemically the SAME (CaSO₄·½H₂O). They differ in manufacturing process, particle size, W/P ratio, and resulting physical properties.'},
  {type:'tf',q:'Type III dental stone is used for fixed prosthetic work such as crown and bridge.',ans:false,exp:'FALSE — Type III dental stone is used for REMOVABLE prosthetics (dentures). Type IV and V are used for fixed prosthetics requiring high accuracy.'},
  {type:'tf',q:'Increasing the W/P ratio produces a stronger, harder gypsum product.',ans:false,exp:'FALSE — Higher W/P ratio = MORE excess water = weaker, softer, more porous product. LOWER W/P ratio produces stronger and harder gypsum with fewer voids.'},
  {type:'tf',q:'Potassium sulphate accelerates the setting reaction of gypsum.',ans:true,exp:'TRUE — Potassium sulphate (K₂SO₄) is an ACCELERATOR of gypsum setting. It is also added to counteract the retarding effect of borax when agar impressions are poured with dental stone.'},
  {type:'tf',q:'Above 50°C, water temperature accelerates the gypsum setting reaction.',ans:false,exp:'FALSE — Above 50°C the setting reaction is RETARDED. At 100°C there is NO setting reaction at all because the hemihydrate cannot recrystallize.'},
  {type:'tf',q:'Hygroscopic expansion is equal to double setting expansion.',ans:true,exp:'TRUE — Hygroscopic expansion ≈ 2× setting expansion. When gypsum sets under water, crystals grow without spatial restriction, producing approximately double the normal setting expansion.'},
  {type:'tf',q:'Dry strength of gypsum is measured at 1 hour after setting.',ans:false,exp:'FALSE — 1-hour strength = WET strength. DRY strength is measured after 7 days of drying and is always significantly HIGHER than wet strength.'},
  {type:'tf',q:'Impression Plaster must be treated with a separating agent before pouring dental stone.',ans:true,exp:'TRUE — Impression Plaster (Type I gypsum) requires a separating agent before pouring dental stone, as gypsum-to-gypsum bonding would make model separation impossible.'},
  {type:'tf',q:'Amalgam dies can be used with any type of impression material.',ans:false,exp:'FALSE — Amalgam dies can only be packed into RIGID impressions (Impression Compound). Elastic impressions cannot withstand the condensation forces required for amalgam.'},
  {type:'tf',q:'Resin dies are more abrasion resistant than dental stone dies.',ans:true,exp:'TRUE — Resin (epoxy or polyurethane) dies are significantly more abrasion resistant than dental stone dies. This is one of their main advantages for wax pattern carving.'},
  {type:'tf',q:'High thermal conductivity of amalgam dies is an advantage because it speeds up wax setting.',ans:false,exp:'FALSE — High thermal conductivity of amalgam dies is a DISADVANTAGE. Rapid heat dissipation causes rapid cooling of the wax pattern, leading to distortion before carving is complete.'},
  {type:'tf',q:'Impression Compound impressions can be copper plated to produce electroplated dies.',ans:true,exp:'TRUE — Impression Compound (rigid) can be copper electroplated to produce hard, accurate dies. Rubber base impressions are silver plated. Alginate CANNOT be electroplated.'},
  {type:'tf',q:'High-Strength Stone (Type IV) has lower porosity and higher compressive strength than Dental Stone (Type III).',ans:true,exp:'TRUE — Type IV requires less water (W/P = 22/100), producing denser particles with lower porosity and much higher compressive strength than Type III (W/P = 30/100).'},
  {type:'mcq',q:'Which is the correct definition of a Die?',opts:['Positive replica of the full dental arch','Negative reproduction of teeth','Model of a single tooth','Positive replica of edentulous ridge'],ans:2,exp:'A die = model of a SINGLE tooth. A full arch positive replica = Model/Cast. A negative reproduction = Impression. An edentulous ridge replica = Cast for complete dentures.'},
  {type:'mcq',q:'Gypsum products differ from each other in all of the following EXCEPT:',opts:['W/P ratio','Chemical composition','Particle size and shape','Mechanical properties'],ans:1,exp:'All gypsum products are chemically identical (CaSO₄·½H₂O). They differ in W/P ratio, particle size/shape, and mechanical properties — but NOT in chemical composition.'},
  {type:'mcq',q:'Type II gypsum product is used for:',opts:['Impressions for edentulous patients','Study casts','Removable partial denture models','Crown and bridge dies'],ans:1,exp:'Type II = Model Plaster → used for study casts. Type I = Impression Plaster (edentulous impressions). Type III = Dental Stone (removable prosthetics). Type IV/V = High-Strength Stone (fixed prosthetics).'},
  {type:'mcq',q:'The W/P ratio for High-Strength Stone (Type IV) is:',opts:['50–60/100','30/100','22/100','40/100'],ans:2,exp:'Type IV W/P ratio = 22/100 (least water). Type III = 30/100. Types I/II = 50–60/100. Lower W/P = denser, stronger, less porous product.'},
  {type:'mcq',q:'Working time in gypsum manipulation is defined as:',opts:['Time from adding powder to water until mixing is complete','Time for manipulation + filling tray + pouring the cast','Time required for the setting reaction to complete','Time between initial and final set'],ans:1,exp:'Working time = time available for manipulation + filling the tray + pouring the cast. Setting time = complete crystallization. Mixing time is only one component of working time.'},
  {type:'mcq',q:'Which water temperature causes NO gypsum setting reaction?',opts:['25°C','50°C','75°C','100°C'],ans:3,exp:'At 100°C there is NO setting reaction. The hemihydrate solubility changes and cannot recrystallize into dihydrate. 75°C retards the reaction significantly but does not stop it completely.'},
  {type:'mcq',q:'Hygroscopic expansion of gypsum occurs when it sets:',opts:['In dry air','Under vacuum','Under water during initial stage of setting','Above 50°C'],ans:2,exp:'Hygroscopic expansion occurs when gypsum sets UNDER WATER during the initial setting stage. Water allows crystals to grow freely without constraint, producing ~2× the normal setting expansion.'},
  {type:'mcq',q:'Which of the following ACCELERATES gypsum setting?',opts:['Borax','Water temperature above 50°C','Potassium sulphate','Increasing the W/P ratio'],ans:2,exp:'Potassium sulphate = accelerator. Borax = retarder. Water above 50°C = retarder (stops completely at 100°C). Increasing W/P slightly slows setting and weakens the product.'},
  {type:'mcq',q:'Which gypsum type has the HIGHEST compressive strength?',opts:['Type I — Impression Plaster','Type II — Model Plaster','Type III — Dental Stone','Type IV — High-Strength Stone'],ans:3,exp:'Type IV has the highest compressive strength due to its lowest W/P ratio (22/100) and densely packed α-hemihydrate particles. Type I/II ≈ 12.5 MN/m², Type III ≈ 31.5 MN/m², Type IV = highest.'},
  {type:'mcq',q:'Amalgam dies can only be used with which impression material?',opts:['Alginate','Agar','Impression Compound','Addition silicone'],ans:2,exp:'Amalgam must be condensed into RIGID impressions only. Impression Compound is rigid. Alginate, agar, and addition silicone are all elastic — they cannot withstand amalgam condensation forces.'},
  {type:'mcq',q:'The main DISADVANTAGE of resin dies is:',opts:['Low abrasion resistance','Polymerization shrinkage causing inaccuracy','Incompatibility with dental stone','High cost and difficult manipulation'],ans:1,exp:'The main disadvantage of resin dies is POLYMERIZATION SHRINKAGE, which causes dimensional inaccuracy. Resin dies have excellent abrasion resistance (an advantage) and are compatible with dental stone.'},
  {type:'mcq',q:'Metal sprayed dies use which alloy?',opts:['Gold-tin alloy','Copper-silver alloy','Bismuth-tin alloy','Zinc-lead alloy'],ans:2,exp:'Metal sprayed dies use a BISMUTH-TIN alloy sprayed onto the impression surface. This low-melting alloy forms a thin metal shell with good surface detail reproduction.'},
  {type:'mcq',q:'Rubber base impressions are electroplated with:',opts:['Copper','Gold','Silver','Tin'],ans:2,exp:'Rubber base (elastomeric) impressions are electroplated with SILVER. Impression Compound impressions are copper plated. Alginate CANNOT be electroplated at all.'},
  {type:'mcq',q:'Which of the following is an advantage of gypsum model materials?',opts:['High mechanical strength resistant to fracture','Fine detail reproduction and good dimensional accuracy','No separating agent needed with any impression','High abrasion resistance during wax carving'],ans:1,exp:'The main advantage of gypsum is fine surface detail reproduction with good dimensional accuracy. Gypsum is brittle (fractures easily), requires a separating agent with plaster impressions, and has low abrasion resistance — all disadvantages.'},
  {type:'mcq',q:'High thermal conductivity of amalgam dies causes:',opts:['Faster and more accurate wax pattern fabrication','Rapid cooling of the wax pattern leading to distortion','Improved bonding between the die and the wax','Reduced need for a separating agent'],ans:1,exp:'High thermal conductivity = rapid heat dissipation = rapid wax cooling = DISTORTION before carving is complete. A separating agent is still required regardless of thermal conductivity.'},
];

/* ═══════════════════════════════════════════════
   INVESTMENT MATERIALS — Quiz 10
   Casting Process · Silica · Requirements · Types · Manipulation
   15 T/F + 15 MCQ = 30 Q | 2025–2026
═══════════════════════════════════════════════ */
const INVESTMENT = [
  {type:'tf',q:'Investment material is a ceramic material used to form a mold for casting molten metal.',ans:true,exp:'TRUE — Investment is a ceramic-based material that surrounds the wax pattern, then forms the mold cavity after wax burnout for casting molten metal.'},
  {type:'tf',q:'In the lost wax technique, the wax pattern remains inside the mold during casting.',ans:false,exp:'FALSE — The wax is REMOVED (burned out) first. The space left by the eliminated wax becomes the mold cavity into which molten metal is cast.'},
  {type:'tf',q:'Silica displays polymorphism, meaning it exists in four chemically different forms.',ans:false,exp:'FALSE — The four forms (Quartz, Tridymite, Cristobalite, Fused Silica) are all chemically the SAME (SiO₂). Polymorphism = different crystal structures with the same chemical composition.'},
  {type:'tf',q:'The correct transformation sequence of silica with increasing temperature is: Quartz → Tridymite → Cristobalite → Fused Silica.',ans:true,exp:'TRUE — Quartz → Tridymite at 870°C → Cristobalite at 1470°C → Fused Silica at 1713°C. Each transformation is polymorphic (same SiO₂ chemistry, different crystal structure).'},
  {type:'tf',q:'Silica transforms from α-form to β-form on heating, causing contraction that compensates for casting shrinkage.',ans:false,exp:'FALSE — The α → β transformation causes EXPANSION, not contraction. This thermal expansion enlarges the mold cavity to compensate for shrinkage of the casting alloy as it cools.'},
  {type:'tf',q:'One requirement of investment materials is that the set material must be permeable to allow air to escape during casting.',ans:true,exp:'TRUE — Permeability allows trapped air to escape through the mold walls during casting, preventing porosity in the final metal casting.'},
  {type:'tf',q:'The refractory component of investment materials is Silica (SiO₂).',ans:true,exp:'TRUE — Silica (SiO₂) is the REFRACTORY component that withstands high casting temperatures. The binder holds the silica particles together and determines the investment type.'},
  {type:'tf',q:'The binder material in Gypsum-bonded investment is Sodium Phosphate.',ans:false,exp:'FALSE — Sodium Phosphate is the binder in PHOSPHATE-bonded investment. Gypsum-bonded investment binder = Alpha Calcium Sulphate Hemihydrate (α-CaSO₄·½H₂O).'},
  {type:'tf',q:'Gypsum-bonded investment can be used for casting Cobalt-Chromium alloys.',ans:false,exp:'FALSE — Gypsum-bonded is limited to GOLD alloy castings only. It breaks down above 700°C. Co-Cr alloys require >1200°C and need phosphate-bonded investment.'},
  {type:'tf',q:'Phosphate-bonded investment can withstand temperatures above 1200°C.',ans:true,exp:'TRUE — Phosphate-bonded investment has high thermal resistance (>1200°C), making it suitable for casting high-fusing alloys like Cobalt-Chromium used in metal-ceramic restorations.'},
  {type:'tf',q:'Silicate-bonded investment uses Sodium Silicate or Ethyl Silicate as the binder.',ans:true,exp:'TRUE — Silicate-bonded investment uses either Sodium Silicate (water glass) or Ethyl Silicate as the binder. It is a high-temperature investment similar to phosphate-bonded.'},
  {type:'tf',q:'For Gypsum-bonded investment, metal casting rings are needed because the set material has low strength.',ans:true,exp:'TRUE — Gypsum-bonded investment has LOW strength, requiring a metal casting ring for support. Phosphate and silicate investments have HIGH strength and use plastic rings or no rings.'},
  {type:'tf',q:'For Phosphate and Silicate-bonded investments, metal casting rings are required due to the high temperatures involved.',ans:false,exp:'FALSE — Because of their HIGH strength, phosphate and silicate investments do NOT need metal casting rings. PLASTIC rings (or no rings) are used instead.'},
  {type:'tf',q:'Hygroscopic expansion of investment material occurs when it sets in a dry environment.',ans:false,exp:'FALSE — Hygroscopic expansion occurs when investment sets UNDER WATER or in a humid environment (wet technique). Dry setting produces only normal setting expansion.'},
  {type:'tf',q:'The particle size of investment powder affects the surface smoothness of the final casting.',ans:true,exp:'TRUE — Finer investment particles produce a smoother mold surface, resulting in a smoother casting. Coarser particles produce a rougher surface requiring more finishing.'},
  {type:'mcq',q:'What is the PRIMARY purpose of investment material in dentistry?',opts:['To take impressions of prepared teeth','To form a mold into which a molten metal is cast','To fabricate study casts and models','To act as a binder between die and wax pattern'],ans:1,exp:'Investment forms the mold (lost wax technique) into which molten metal is cast. Impressions use impression materials. Study casts use dental stone. Investment is not a binder between die and wax.'},
  {type:'mcq',q:'In the lost wax casting process, what happens during "burnout"?',opts:['The alloy is melted and cast into the mold','The investment is mixed and placed around the wax pattern','The wax pattern is eliminated from the investment mold by heating','The casting is removed and the investment is broken away'],ans:2,exp:'Burnout = elimination of wax by heating the invested ring in a furnace. This leaves the mold cavity. Casting = pouring molten alloy. Investing = surrounding the wax. Retrieval = breaking away investment post-casting.'},
  {type:'mcq',q:'Silica displays polymorphism. This means:',opts:['Silica exists in forms that are chemically different from each other','Silica changes crystal structure without changing chemical composition','Silica melts at different temperatures depending on purity','Silica expands when heated and contracts when cooled'],ans:1,exp:'Polymorphism = same chemical composition (SiO₂) but different crystal structures. All four forms (Quartz, Tridymite, Cristobalite, Fused Silica) are SiO₂ — they differ only in crystalline arrangement.'},
  {type:'mcq',q:'At what temperature does Quartz transform to Tridymite?',opts:['570°C','870°C','1470°C','1713°C'],ans:1,exp:'Quartz → Tridymite at 870°C. Note: 570°C = α→β inversion WITHIN Quartz (not a full polymorphic transformation). 1470°C = Tridymite → Cristobalite. 1713°C = Cristobalite → Fused Silica.'},
  {type:'mcq',q:'Why is the thermal expansion of silica important in investment materials?',opts:['It increases the strength of the investment mold','It improves the surface smoothness of the casting','It compensates for the shrinkage of the alloy on cooling','It allows the wax to be eliminated more easily during burnout'],ans:2,exp:'When the alloy solidifies, it shrinks. The thermal expansion of silica (α→β transformation) enlarges the mold cavity to compensate for this shrinkage, ensuring the casting has correct dimensions.'},
  {type:'mcq',q:'How many types of expansion occur in investment materials?',opts:['1','2','3','4'],ans:2,exp:'Three types of expansion: (1) Setting expansion — as investment sets. (2) Hygroscopic expansion — when setting under water. (3) Thermal expansion — during burnout heating.'},
  {type:'mcq',q:'Which of the following is NOT a requirement of investment materials?',opts:['Contain refractory material to sustain high temperature','Be soluble in water to allow easy removal after casting','Have sufficient strength to withstand the force of molten alloy','Be permeable to allow air to escape during casting'],ans:1,exp:'Solubility in water is NOT a requirement — investment is removed by mechanical breakage, not dissolution. Requirements include: refractory material, sufficient strength, permeability, and smooth surface reproduction.'},
  {type:'mcq',q:'The refractory component of investment material is:',opts:['Alpha Calcium Sulphate Hemihydrate','Sodium Phosphate','Silicon Dioxide (SiO₂)','Sodium Silicate'],ans:2,exp:'Silica (SiO₂) = REFRACTORY component. The others are all BINDERS: α-Calcium Sulphate Hemihydrate (gypsum-bonded), Sodium Phosphate (phosphate-bonded), Sodium Silicate (silicate-bonded).'},
  {type:'mcq',q:'Which type of investment is classified as LOW temperature investment?',opts:['Phosphate-bonded investment','Silicate-bonded investment','Gypsum-bonded investment','Ethyl silicate-bonded investment'],ans:2,exp:'Gypsum-bonded = LOW temperature (max ~700°C), used for gold alloys only. Phosphate-bonded and silicate-bonded = HIGH temperature (>1200°C) for base metal alloys like Co-Cr.'},
  {type:'mcq',q:'Gypsum-bonded investment is limited to gold castings because:',opts:['Gold requires higher expansion than other alloys','It cannot be heated above 700°C without breaking down','Gold is the only alloy chemically compatible with gypsum','Setting expansion of gypsum investment is too low for other alloys'],ans:1,exp:'The gypsum binder (CaSO₄) decomposes above 700°C, releasing SO₂ which contaminates the casting. Co-Cr alloys require >1200°C, far exceeding this thermal limit.'},
  {type:'mcq',q:'The binder in Phosphate-bonded investment is:',opts:['Alpha Calcium Sulphate Hemihydrate','Sodium Silicate','Sodium Phosphate','Ethyl Silicate'],ans:2,exp:'Phosphate-bonded binder = Sodium Phosphate. α-Calcium Sulphate Hemihydrate = gypsum-bonded. Sodium Silicate and Ethyl Silicate = silicate-bonded binders.'},
  {type:'mcq',q:'Phosphate-bonded investment is used for casting which alloy?',opts:['Gold alloys only','Amalgam alloys','Cobalt-Chromium alloys','Tin-bismuth alloys'],ans:2,exp:'Phosphate-bonded investment is for Cobalt-Chromium (Co-Cr) alloys (metal-ceramic crowns, RPD frameworks) requiring >1200°C. Gold uses gypsum-bonded. Amalgam is not cast using investment.'},
  {type:'mcq',q:'When mixing Phosphate or Silicate investment, a special manufacturer liquid is used instead of water. What does this achieve?',opts:['Increases the setting time','Reduces porosity and improves surface smoothness','Gives higher setting expansion','Lowers the burnout temperature'],ans:2,exp:'The special liquid (colloidal silica solution) gives HIGHER setting expansion than water alone, better compensating for alloy shrinkage during solidification.'},
  {type:'mcq',q:'Why are metal casting rings used with Gypsum-bonded investment but NOT with Phosphate-bonded?',opts:['Gypsum-bonded sets faster, requiring rigid containment','Gypsum-bonded has LOW strength requiring metal support; Phosphate-bonded has HIGH strength','Metal rings conduct heat better, needed only for gold castings','Phosphate-bonded expands too much to fit in a metal ring'],ans:1,exp:'Metal rings support WEAK gypsum-bonded investment during burnout/casting. Phosphate and silicate investments have HIGH strength — plastic rings or no rings are used instead.'},
  {type:'mcq',q:'Which of the following is listed as an additive (other material) in investment composition?',opts:['Calcium Sulphate','Potassium Sulphate','Sodium Phosphate','Ethyl Silicate'],ans:1,exp:'Potassium Sulphate is an ADDITIVE that controls setting expansion. Calcium Sulphate = gypsum binder. Sodium Phosphate and Ethyl Silicate = binders for their respective investment types.'},
];


/* ═══════════════════════════════════════════════
   DENTAL WAXES — Quiz 1
   Pattern · Processing · Impression Waxes · Properties
   15 T/F + 15 MCQ = 30 Q | 2025–2026
═══════════════════════════════════════════════ */
const WAXES = [
  {type:'tf',q:'Waxes are thermoplastic materials that melt without decomposition.',ans:true,exp:'TRUE — Waxes are thermoplastic: they soften and melt on heating and solidify on cooling, without any chemical decomposition. This reversible behavior is what makes them suitable for pattern making.'},
  {type:'tf',q:'Dental waxes have a single melting point rather than a melting range.',ans:false,exp:'FALSE — Waxes have a melting RANGE because they contain molecules of different molecular weights, each melting at a slightly different temperature. There is no single precise melting point.'},
  {type:'tf',q:'Waxes have the greatest coefficient of thermal expansion of any restorative material used in dentistry.',ans:true,exp:'TRUE — Dental waxes have the highest coefficient of thermal expansion of all restorative materials. This is clinically significant because even small temperature changes cause measurable dimensional changes in wax patterns.'},
  {type:'tf',q:'Carving wax at temperatures well below its melting range prevents internal stress formation.',ans:false,exp:'FALSE — Carving at very low temperatures actually INCREASES internal stresses. Wax should be carved with a warm instrument near its melting range to allow the surface to flow and minimize stress build-up.'},
  {type:'tf',q:'A wax pattern should be invested within 20–30 minutes after removal from the cavity or die.',ans:true,exp:'TRUE — Stress relief is time-dependent. The longer the pattern is stored uninvested, the more internal stresses are released, causing progressive warpage. Investing within 20–30 minutes minimizes this risk.'},
  {type:'tf',q:'Base plate wax is typically pink in color and used to construct occlusal rims for complete dentures.',ans:true,exp:'TRUE — Base plate wax is a processing wax supplied in pink sheets. It is used to construct occlusal rims (bite rims) used for jaw relationship recording in complete denture fabrication.'},
  {type:'tf',q:'Sheet casting wax is used to build patterns for the metallic framework of removable partial dentures.',ans:true,exp:'TRUE — Sheet casting wax is supplied in pre-shaped forms replicating components (clasps, connectors, rests) of the RPD metallic framework wax pattern, which is then invested and cast.'},
  {type:'tf',q:'Utility wax comes in preformed horseshoe-shaped wafers.',ans:false,exp:'FALSE — Utility wax comes in long ROPES (pliable sticks) that are easily manipulated at room temperature. Horseshoe shapes are characteristic of BITE WAFER wax used for occlusal registration.'},
  {type:'tf',q:'Boxing wax is slightly tacky at room temperature.',ans:true,exp:'TRUE — Boxing wax has slight tackiness at room temperature, which helps it adhere to the impression sides during boxing. It is a processing wax placed around impressions before pouring gypsum.'},
  {type:'tf',q:'Sticky wax remains adhesive and sticky after it fully sets and hardens.',ans:false,exp:'FALSE — Once sticky wax hardens, it becomes FIRM, BRITTLE, and FREE FROM TACKINESS. It is only sticky/adhesive in the molten state. When set, its rigidity holds joined pieces together mechanically.'},
  {type:'tf',q:'Sticky wax is made from beeswax with resin and gum added.',ans:true,exp:'TRUE — Sticky wax contains beeswax as its main component, with rosin (resin) and gum added to provide adhesive properties in the molten state and rigidity when set.'},
  {type:'tf',q:'Corrective wax is a commonly used routine impression material.',ans:false,exp:'FALSE — Corrective wax is NOT commonly used. It is applied as a thin wax veneer over existing impressions to correct small imperfections (air blows), especially over zinc oxide eugenol impressions.'},
  {type:'tf',q:'Bite wafer wax is used to record the occlusal relationship of upper and lower teeth in dentulous patients.',ans:true,exp:'TRUE — Bite wafer wax is an impression wax used in dentulous patients to record the occlusal relationship (jaw registration) by capturing the cuspal imprints of opposing teeth.'},
  {type:'tf',q:'Occlusal indicator wax is used to detect areas of premature occlusal contact.',ans:true,exp:'TRUE — Occlusal indicator wax is a very thin wax sheet placed on teeth; it perforates at points of premature contact, allowing the clinician to identify and adjust high spots on restorations or dentures.'},
  {type:'tf',q:'Addition silicone is now preferred over bite wafer wax due to its superior elastic recovery and dimensional stability.',ans:true,exp:'TRUE — Addition silicone springs back elastically after removal and has excellent dimensional stability over time. Bite wafer wax can distort with temperature changes, making silicone more accurate for occlusal records.'},
  {type:'mcq',q:'Why do dental waxes have a melting RANGE rather than a single melting point?',opts:['They undergo chemical decomposition on heating','They contain molecules of different molecular weights','They absorb water during storage','They are purely inorganic compounds'],ans:1,exp:'Waxes contain similar molecules with varying molecular weights (or several molecular types), each melting at a slightly different temperature, producing a melting range rather than a single point. Waxes are organic and melt WITHOUT decomposition.'},
  {type:'mcq',q:'Beeswax is classified as which type of natural wax?',opts:['Mineral wax','Vegetable wax','Insect wax','Synthetic wax'],ans:2,exp:'Beeswax = INSECT wax (produced by honeybees). Mineral waxes = paraffin, ceresin. Vegetable waxes = carnauba. Synthetic waxes are man-made.'},
