  {type:'mcq',q:'The most clinically significant problem caused by the high coefficient of thermal expansion of wax is:',opts:['Discoloration of the wax pattern','Dimensional change causing casting inaccuracy','Increased brittleness at body temperature','Improved marginal adaptation'],ans:1,exp:'The high thermal expansion coefficient means wax expands/contracts more than any other restorative material. This dimensional change is the greatest source of error in wax patterns — any temperature change distorts the pattern and the resulting casting.'},
  {type:'mcq',q:'When inlay wax is adapted directly inside the patient\'s prepared tooth cavity, the resulting pattern is called a:',opts:['Die pattern','Indirect pattern','Cast pattern','Direct pattern'],ans:3,exp:'DIRECT pattern = wax adapted directly in the patient\'s mouth inside the preparation. INDIRECT pattern = wax adapted outside the mouth on a stone die replica. Both are valid techniques with different advantages.'},
  {type:'mcq',q:'Boxing wax is used in the dental laboratory to:',opts:['Record jaw relationship in edentulous patients','Adapt and extend impression trays','Box impressions before pouring stone to form a neat cast base','Join fixed partial denture units before soldering'],ans:2,exp:'Boxing wax is placed around the impression to contain the gypsum material and create a well-formed cast base. Jaw registration = base plate wax. Tray adaptation = utility wax. Joining FPD units = sticky wax.'},
  {type:'mcq',q:'Sheet casting wax is specifically designed for constructing the:',opts:['Occlusal rim for jaw registration','Wax pattern for inlay preparations','Metallic framework of removable partial dentures','Bite registration record'],ans:2,exp:'Sheet casting wax is pre-shaped for RPD metallic framework components (clasps, connectors, rests). Occlusal rims = base plate wax. Inlay patterns = inlay wax. Bite registration = bite wafer wax or addition silicone.'},
  {type:'mcq',q:'Sticky wax is used clinically to:',opts:['Correct air blows in edentulous impressions','Detect premature occlusal contacts','Fix fractured acrylic dentures and join FPD units before soldering','Adapt impression trays for individual patients'],ans:2,exp:'Sticky wax is adhesive when molten and firm/rigid when set — ideal for reassembling broken denture pieces and holding FPD units together for soldering. Corrective wax = air blow correction. Occlusal indicator wax = contact detection. Utility wax = tray adaptation.'},
  {type:'mcq',q:'Corrective wax is applied over a previous impression mainly to:',opts:['Increase the rigidity of the impression tray','Extend the tray borders','Register fine soft tissue detail and correct air blows','Record vertical dimension of occlusion'],ans:2,exp:'Corrective wax has high flow, allowing it to capture fine mucosal detail and fill in imperfections (air blows) in the original impression surface. It is applied as a thin veneer — not for rigidity, border extension, or VDO recording.'},
  {type:'mcq',q:'Warpage (distortion) of a wax pattern occurs due to:',opts:['Water absorption from the oral environment','Thermal changes and release of internal stresses','Chemical reaction with gypsum products','Exposure to ultraviolet light'],ans:1,exp:'Internal stresses are locked in during carving/adaptation. When temperature changes (warming), these stresses are released, causing the pattern to warp. Wax does not absorb significant water and does not react chemically with gypsum.'},
  {type:'mcq',q:'To minimize internal stresses when working with wax, it should be carved with a:',opts:['Cold metal instrument','Refrigerated plastic spatula','Warm instrument near the melting range','Dry sharp blade at room temperature'],ans:2,exp:'A warm instrument allows the wax surface to flow slightly, relieving stresses as they form. Cold instruments lock stresses in as the wax hardens rapidly. Wax should be added in small increments and carved gently near its softening range.'},
  {type:'mcq',q:'Addition silicone has largely replaced bite wafer wax for occlusal registration because of its:',opts:['Lower material cost','Ability to flow freely at mouth temperature','High elastic recovery and excellent dimensional stability','Similar properties to wax'],ans:2,exp:'Addition silicone springs back elastically after removal from undercuts and maintains its dimensions over time — both critical for accurate occlusal records. Bite wafer wax distorts with temperature changes and has no elastic recovery.'},
  {type:'mcq',q:'Utility wax is best described as:',opts:['A rigid wax used to box impressions','A soft, rope-form wax used to adapt impression trays','A wax used for occlusal rim fabrication','A brittle wax used for soldering procedures'],ans:1,exp:'Utility wax comes in long, pliable ropes easily manipulated at room temperature. Used for tray rim locks, extending borders, and aiding in boxing impressions. Boxing wax = sheet-form for pouring casts. Base plate wax = occlusal rims.'},
  {type:'mcq',q:'The bite wafer wax horseshoe form is often reinforced with metal particles in order to:',opts:['Improve thermal conductivity','Allow flow at body temperature','Provide stability and resist deformation on closure','Speed up the setting reaction'],ans:2,exp:'Metal particle reinforcement prevents the bite wafer from collapsing under occlusal load when the patient closes. Plain wax would deform under biting pressure, producing an inaccurate registration. Wax has no setting reaction.'},
  {type:'mcq',q:'Distortion of a wax pattern directly leads to:',opts:['Better marginal fit of the final restoration','Defects in the casting and inaccuracy of the finished restoration','Faster elimination of wax during burnout','Improved surface detail reproduction'],ans:1,exp:'The casting reproduces the wax pattern exactly — any warp or distortion results in a casting that does not fit, requiring extensive adjustment or remake. Distortion destroys fine surface detail rather than improving it.'},
  {type:'mcq',q:'Which of the following correctly explains why a wax pattern should be invested as soon as possible?',opts:['Prolonged storage causes chemical degradation of the wax','Delayed investing increases risk of stress relief and warpage over time','The wax absorbs moisture from the air, expanding the pattern','Room temperature storage causes the wax to melt partially'],ans:1,exp:'Stress relief is time-dependent: the longer the pattern is stored uninvested, the more internal stresses are released causing progressive warpage. Invest within 20–30 minutes. Wax does not chemically degrade or absorb atmospheric moisture significantly at room temperature.'},
];

/* ═══════════════════════════════════════════════
   DENTURE BASE MATERIALS — Quiz 11
   Requirements · Composition · Mixing · Processing · Properties · Porosities · Crazing
   15 T/F + 15 MCQ = 30 Q | 2025–2026
═══════════════════════════════════════════════ */
const DENTURE = [
  {type:'tf',q:'The denture base is the part of the denture that retains the artificial teeth and rests on soft tissues.',ans:true,exp:'TRUE — The denture base serves two functions: it retains (holds) the artificial teeth and it rests on the underlying soft tissues and bone, transmitting and distributing occlusal forces.'},
  {type:'tf',q:'High resilience in denture base material means it transfers all stresses directly to the underlying bone.',ans:false,exp:'FALSE — High resilience means the material ABSORBS energy WITHOUT permanent deformation. A resilient denture base cushions and distributes forces rather than transferring them directly to bone.'},
  {type:'tf',q:'The powder/liquid ratio for heat cure acrylic resin is 3:1 by volume and 2.5:1 by weight.',ans:true,exp:'TRUE — The recommended P/L ratio for heat cure acrylic = 3:1 by volume or 2.5:1 by weight. This ratio ensures adequate wetting of polymer by monomer and minimizes polymerization shrinkage.'},
  {type:'tf',q:'A low P/L ratio causes granular cured acrylic due to insufficient wetting of the powder.',ans:false,exp:'FALSE — HIGH P/L ratio causes granular acrylic (insufficient monomer to wet all powder). LOW P/L ratio = excess monomer = more shrinkage, more porosities, and weaker properties.'},
  {type:'tf',q:'Acrylic dough should be packed into the flask at the dough stage.',ans:true,exp:'TRUE — The dough stage is the ideal time for packing: the mass is plastic, non-sticky, and can be pressed into fine detail without flowing out. It does not adhere to instruments.'},
  {type:'tf',q:'Delayed packing of acrylic results in surface porosities and low viscosity flow out of the flask.',ans:false,exp:'FALSE — That describes EARLY packing (sandy/sticky stage). DELAYED packing (rubbery/elastic stage) causes high viscosity, inability to achieve metal-to-metal contact, tooth movement, or fracture during pressing.'},
  {type:'tf',q:'The inhibitor in the liquid component of heat cure acrylic is hydroquinone at 0.006%.',ans:true,exp:'TRUE — Hydroquinone (0.006%) in the liquid (monomer) is the inhibitor that prevents premature polymerization during storage. It scavenges free radicals, providing a shelf life of approximately 1 year.'},
  {type:'tf',q:'Overheating during curing causes shrinkage porosities in the surface of the denture.',ans:false,exp:'FALSE — Overheating causes GASEOUS (internal) porosities — uniform bubbles in THICK sections caused by monomer boiling (boiling point = 100.3°C). Shrinkage porosities are caused by underpacking.'},
  {type:'tf',q:'The neck of the artificial teeth should be painted with separating medium to prevent bonding to the denture base.',ans:false,exp:'FALSE — The neck of the teeth is deliberately NOT painted with separating medium so the tooth remains BONDED to the denture base. Only the gypsum surfaces receive separating medium.'},
  {type:'tf',q:'Polymerization shrinkage of pure monomer is 21%, reduced to 6% with the correct P/L ratio.',ans:true,exp:'TRUE — Pure monomer shrinks 21% on polymerization. Adding polymer powder (pre-polymerized) in the correct 3:1 P/L ratio reduces total shrinkage to approximately 6%, which is partially offset by water sorption.'},
  {type:'tf',q:'Residual monomer acts as a cross-linking agent and improves the mechanical properties of the denture.',ans:false,exp:'FALSE — Residual monomer acts as a PLASTICIZER — it DECREASES mechanical properties (strength, hardness) and INCREASES flexibility. It also causes tissue irritation and is a clinical concern.'},
  {type:'tf',q:'Water sorption of acrylic resin causes shrinkage that worsens the dimensional stability of the denture.',ans:false,exp:'FALSE — Water sorption causes EXPANSION (0.46%) which actually COMPENSATES for processing shrinkage, resulting in good overall dimensional stability. It is not pure shrinkage.'},
  {type:'tf',q:'Crazing refers to uniform internal bubbles found in thick sections of the denture base.',ans:false,exp:'FALSE — Uniform internal bubbles in thick sections = GASEOUS POROSITIES (caused by overheating). CRAZING = surface microcracks caused by tensile stresses from solvents, repeated drying/wetting, or water passage from gypsum.'},
  {type:'tf',q:'Cross-linking of acrylic resin decreases crazing.',ans:true,exp:'TRUE — Cross-linking agents (e.g. glycol dimethacrylate) create a 3D network that resists the development and propagation of microcracks. Higher cross-linking = better resistance to crazing.'},
  {type:'tf',q:'Chemically activated resin is identical in composition to heat cure resin except the liquid contains tertiary aromatic amine.',ans:true,exp:'TRUE — Cold cure (chemically activated) resin differs from heat cure only in that its liquid contains a TERTIARY AROMATIC AMINE (e.g. dimethyl-para-toluidine) that reacts with benzoyl peroxide at room temperature to initiate polymerization without heat.'},
  {type:'mcq',q:'Which component in the powder of heat cure acrylic initiates polymerization?',opts:['Hydroquinone','Dibutyl phthalate','Benzoyl peroxide','Glycol dimethacrylate'],ans:2,exp:'Benzoyl peroxide in the POWDER is the initiator — it decomposes on heating to produce free radicals that start polymerization. Hydroquinone = inhibitor in liquid. Dibutyl phthalate = plasticizer in powder. Glycol dimethacrylate = cross-linking agent in liquid.'},
  {type:'mcq',q:'What is the function of glycol dimethacrylate in the liquid of heat cure acrylic?',opts:['Initiates polymerization','Prevents premature polymerization','Acts as a cross-linking agent to improve crack resistance','Gives natural tissue-like color'],ans:2,exp:'Glycol dimethacrylate = CROSS-LINKING AGENT — creates a 3D polymer network, improving crack resistance and reducing crazing. Initiator = benzoyl peroxide (powder). Inhibitor = hydroquinone (liquid). Color = pigments (powder).'},
  {type:'mcq',q:'The mixing spatula for acrylic resin must be stainless steel because:',opts:['It prevents contamination of the powder','The monomer is an organic solvent that dissolves plastic spatulas','Steel conducts heat improving mixing','Plastic spatulas cause early polymerization'],ans:1,exp:'Methyl methacrylate monomer is an organic solvent that dissolves plastic spatulas, contaminating the mix. Stainless steel is unaffected. Plastic spatulas do not cause early polymerization — they simply dissolve and contaminate.'},
  {type:'mcq',q:'At which mixing stage does the acrylic mass no longer adhere to the walls of the mixing jar?',opts:['Sandy stage','Sticky stage','Dough stage','Rubbery stage'],ans:2,exp:'DOUGH stage = the mass no longer sticks to jar walls, is smooth and plastic, and is the ideal packing stage. Sandy = powder particles just wetted. Sticky = chains dispersing, sticks when touched. Rubbery = monomer dissipated, elastic and not plastic.'},
  {type:'mcq',q:'What is the SHORT curing cycle for heat cure acrylic?',opts:['65°C for 8 hours','74°C for 8 hours','74°C for 1.5 hours then boiling for 1 hour','100°C for 20 minutes'],ans:2,exp:'Short curing cycle = 74°C for 1.5 hours then 100°C (boiling) for 1 hour. Long cycle = 74°C for 8 hours. Rapid heat polymerized resin uses 100°C for 20 minutes. Starting at 74°C prevents monomer boiling (bp = 100.3°C).'},
  {type:'mcq',q:'Undercuring of acrylic resin leads to:',opts:['Gaseous porosities in thick sections','Warpage of the denture','High residual monomer content','Shrinkage porosities on the surface'],ans:2,exp:'Undercuring = insufficient polymerization = HIGH RESIDUAL MONOMER. This acts as a plasticizer, reducing mechanical properties and causing tissue irritation. Gaseous porosities = overheating. Warpage = early flask opening. Shrinkage porosities = underpacking.'},
  {type:'mcq',q:'Why must the denture flask be allowed to cool gradually before opening?',opts:['To prevent gaseous porosities','Early opening causes warpage; rapid cooling causes internal thermal stresses','To allow complete water sorption','To prevent the separating medium from dissolving'],ans:1,exp:'Early opening before cooling = warpage (stress relief before rigidity). Rapid bench cooling = internal thermal stresses and surface crazing. Bench cool slowly to room temperature before opening to prevent both problems.'},
  {type:'mcq',q:'Shrinkage porosities in acrylic dentures are caused by all of the following EXCEPT:',opts:['Underpacking','Early packing at the sandy stage','Overheating during curing','Excess monomer'],ans:2,exp:'Overheating causes GASEOUS porosities (boiling monomer = bubbles), NOT shrinkage porosities. Shrinkage porosities are caused by: underpacking, early packing (sandy/sticky stage = insufficient adaptation), and excess monomer (increased volumetric shrinkage).'},
  {type:'mcq',q:'What is the separating medium used in denture base processing and how many times is it applied?',opts:['Petroleum jelly — once','Sodium alginate — twice','Zinc oxide eugenol — three times','Vaseline — once'],ans:1,exp:'Sodium alginate solution is the standard separating medium, applied TWICE to gypsum surfaces. Two coats ensure complete coverage. It prevents water transfer from gypsum to acrylic (which causes crazing) and facilitates flask separation.'},
  {type:'mcq',q:'The purpose of the separating medium applied before packing includes all EXCEPT:',opts:['Prevent water passage from gypsum to resin','Reduce surface porosities','Bond the artificial teeth firmly to the denture base','Facilitate separation of flask halves'],ans:2,exp:'Bonding artificial teeth to the denture base is NOT a purpose of separating medium — the tooth necks are deliberately left WITHOUT separating medium to allow bonding. The medium is only on gypsum surfaces, not on tooth necks.'},
  {type:'mcq',q:'Which property is described as "absorbs energy without permanent deformation and does not transfer stresses to underlying bone"?',opts:['Yield strength','Fatigue strength','Resilience','Modulus of elasticity'],ans:2,exp:'RESILIENCE = ability to absorb energy elastically without permanent deformation. A resilient denture base cushions forces rather than transferring them to bone. Yield strength = onset of permanent deformation. Fatigue = cyclic loading resistance. Modulus = stiffness.'},
  {type:'mcq',q:'Crazing of acrylic denture base is caused by all of the following EXCEPT:',opts:['Repeated drying and wetting cycles','Contact with bleaching agents or alcohol','Overpacking the acrylic during processing','Passage of water from gypsum to acrylic'],ans:2,exp:'Overpacking does NOT cause crazing — it may cause flash or tooth displacement but not surface microcracks. Causes of crazing: repeated drying/wetting (mechanical stresses), bleach/alcohol (solvent attack), and water passage from gypsum to uncured acrylic during processing.'},
  {type:'mcq',q:'High impact strength modified denture resin is reinforced with:',opts:['Silica filler','Camphorquinone','Butadiene-styrene rubber','Glycol dimethacrylate'],ans:2,exp:'Butadiene-styrene rubber particles are dispersed throughout the acrylic matrix to absorb impact energy and prevent crack propagation. Silica filler = light-activated resin. Camphorquinone = light initiator. Glycol dimethacrylate = cross-linking agent.'},
  {type:'mcq',q:'Microwave cured acrylic resin requires which special consideration?',opts:['Must be cured at exactly 74°C for 8 hours','Requires a non-metallic flask','Must be mixed with tertiary aromatic amine','Supplied in sheets in light-proof packages'],ans:1,exp:'Microwave cured resin requires a NON-METALLIC (glass or plastic) flask because metal reflects microwaves, preventing curing and creating hazard. 74°C/8h = heat cure long cycle. Tertiary amine = cold cure. Sheets in light-proof packages = light-activated resin.'},
  {type:'mcq',q:'The thermal conductivity of acrylic resin is very low. This causes which clinical problem?',opts:['The denture becomes too flexible at mouth temperature','The patient cannot sense temperature through the denture','The denture absorbs excess water from saliva','The coefficient of thermal expansion becomes too high'],ans:1,exp:'Low thermal conductivity = poor heat transmission through the denture base = patient CANNOT sense hot or cold foods/liquids through the denture. This is a listed disadvantage of acrylic resin denture bases.'},
];


/* ═══════════════════════════════════════════════
   CASTING, SOLDERING & CORROSION — Quiz 1 + Defects
   Lost-Wax · Investment · Spruing · Casting Machines · Soldering · Tarnish & Corrosion
   27 T/F + 28 MCQ = 55 Q | 2025–2026
═══════════════════════════════════════════════ */
const CASTING = [
  // TRUE / FALSE (27)
  {type:'tf',q:'The lost-wax technique involves forming a wax pattern, surrounding it with investment, burning out the wax, then casting molten metal into the mold.',ans:true,exp:'TRUE — This is the complete sequence of the lost-wax casting process: (1) wax pattern fabrication, (2) investing, (3) burnout, (4) casting molten metal into the mold cavity left by the eliminated wax.'},
  {type:'tf',q:'In the direct technique, wax patterns shrink approximately 0.4% when cooled from mouth temperature to room temperature.',ans:false,exp:'FALSE — Direct technique shrinkage = 0.2% (cooling from mouth ~37°C to room temp ~23°C). The 0.4% shrinkage applies to the INDIRECT technique where the wax cools from laboratory die temperature over a longer period.'},
  {type:'tf',q:'Gold solidification shrinkage for a full crown is approximately 1.75%.',ans:true,exp:'TRUE — Full crown gold solidification shrinkage = 1.75%. Class V = 2.0% (highest, due to bulk). Thin 3/4 crown = 1.25%. These values determine how much investment expansion is needed to compensate.'},
  {type:'tf',q:'High heat investment uses quartz as its high-expansion silica component.',ans:false,exp:'FALSE — High heat investment uses CRISTOBALITE — a high-expansion polymorphic form of silica that provides greater thermal expansion than quartz. Cristobalite transforms more dramatically on heating.'},
  {type:'tf',q:'In high heat investment, the mold is first placed at 150°C to eliminate the wax, then elevated to 500°C for maximum thermal expansion.',ans:true,exp:'TRUE — Two-stage process: 150°C oven (wax elimination/pre-heat) → 500°C oven held 20–30 min (maximum thermal expansion = 1.25%). Both stages are essential for complete burnout and dimensional compensation.'},
  {type:'tf',q:'In high heat investment, most of the compensatory expansion comes from hygroscopic expansion.',ans:false,exp:'FALSE — In HIGH HEAT investment, the dominant compensation comes from THERMAL expansion (1.25% at 500°C). Hygroscopic expansion is the dominant mechanism in WATER IMMERSION investment technique.'},
  {type:'tf',q:'Water immersion investment is stronger than high heat investment and therefore does not require a metal ring.',ans:true,exp:'TRUE — Water immersion investment has higher strength than high heat investment, so it uses a RUBBER ring (not metal). High heat investment is weaker and requires a metal ring for support during burnout.'},
  {type:'tf',q:'The overall expansion achieved with water immersion investment is 2.1%.',ans:true,exp:'TRUE — Water immersion investment achieves a total of 2.1% expansion: approximately 1.6% hygroscopic + 0.5% setting expansion. This is achieved by immersing the ring in water at 37°C during setting.'},
  {type:'tf',q:'In water immersion investment, the mold is placed into a 500°C oven after setting.',ans:false,exp:'FALSE — Water immersion investment uses a 430°C oven (not 500°C). 500°C is specific to HIGH HEAT investment. Controlled water addition technique uses 340°C.'},
  {type:'tf',q:'Phosphate bonded investment is used for high-fusing gold alloys used with porcelain.',ans:true,exp:'TRUE — Phosphate bonded investment withstands temperatures >1200°C and is used for high-fusing gold alloys (metal-ceramic), as well as Co-Cr alloys. Regular gypsum-bonded investment is limited to <700°C.'},
  {type:'tf',q:'The sprue should always be attached to the thinnest portion of the wax pattern.',ans:false,exp:'FALSE — The sprue must be attached to the BULKIEST portion of the pattern, away from fine margins. This ensures the thin margins solidify first (from the margins inward) and the sprue remains open as a supply channel.'},
  {type:'tf',q:'A sprue that is too small in diameter may solidify before the casting is complete, causing porosity.',ans:true,exp:'TRUE — A too-small sprue solidifies prematurely, cutting off the supply of molten metal before the mold is completely filled, resulting in porosity or an incomplete casting.'},
  {type:'tf',q:'The wax sprue is the most commonly used type of sprue.',ans:true,exp:'TRUE — Wax sprues are most commonly used because they are easily attached, match thermal behavior of the wax pattern, and are eliminated cleanly during burnout along with the wax pattern.'},
  {type:'tf',q:'A reservoir is attached to the sprue approximately 1 mm away from the wax pattern to prevent porosity from shrinkage.',ans:true,exp:'TRUE — The reservoir (a larger ball of wax) attached ~1 mm from the pattern solidifies later than the casting due to its greater bulk, continuously supplying molten metal to compensate for shrinkage porosity.'},
  {type:'tf',q:'Asbestos liner is the preferred liner for casting rings due to its excellent cushioning effect.',ans:false,exp:'FALSE — Asbestos liner is NO LONGER USED because it is CARCINOGENIC. Non-asbestos alternatives — alumino-silicate ceramic or cellulose (paper) liners — are used instead. They provide similar cushioning without the health risk.'},
  {type:'tf',q:'The casting ring liner should be 3 mm shorter than the ring and wetted before use.',ans:true,exp:'TRUE — The liner is cut 3 mm shorter than the ring (leaving a collar of metal exposed) and wetted to enhance hygroscopic expansion and cushioning during investment setting.'},
  {type:'tf',q:'Centrifugal casting machines are suitable for making small castings only.',ans:false,exp:'FALSE — AIR PRESSURE machines are limited to small castings. Centrifugal machines can handle both LARGE and SMALL restorations, which is one of their main advantages over air pressure systems.'},
  {type:'tf',q:'A surfactant is applied to the wax pattern before investing to increase wettability and remove lubricant traces.',ans:true,exp:'TRUE — Surfactant (debubblizer) reduces surface tension of the investment liquid, allowing it to wet the wax pattern uniformly and eliminating any surface lubricant traces that could cause surface defects on the casting.'},
  {type:'tf',q:'In soldering, the intermediary alloy must have a melting temperature at least 50–100°C LOWER than the alloys being joined.',ans:true,exp:'TRUE — The solder fuses at 50–100°C below the parent alloys\' melting point. This allows the solder to flow while the joined metal parts remain solid, preventing distortion or melting of the restoration components.'},
  {type:'tf',q:'Tarnish refers to deep structural destruction of a metal, while corrosion refers only to surface discoloration.',ans:false,exp:'FALSE — REVERSED. TARNISH = surface discoloration/loss of luster (thin oxide/sulfide/chloride films). CORROSION = deeper chemical or electrochemical destruction of the metal structure with loss of material.'},
  // From Quiz 2 — Casting Defects, Soldering & Welding, Tarnish & Corrosion
  {type:'tf',q:'Distortion in casting is caused by distortion of the wax pattern due to improper handling or delayed investing.',ans:true,exp:'TRUE — Any distortion in the wax pattern is faithfully reproduced in the final casting. Causes include: improper handling, thermal stresses released over time, and delayed investing beyond 20–30 minutes.'},
  {type:'tf',q:'A too-large casting is caused by insufficient expansion of the investment to compensate for shrinkage.',ans:false,exp:'FALSE — A too-LARGE casting results from EXCESS expansion (overheating investment or using wrong investment). INSUFFICIENT expansion causes a too-SMALL casting that won\'t seat properly.'},
  {type:'tf',q:'Incomplete casting can result from back pressure caused by a sprue that is too short.',ans:true,exp:'TRUE — A too-short sprue positions the pattern too close to the end of the ring, reducing the air escape path. The trapped air (back pressure) resists metal flow, resulting in an incomplete casting.'},
  {type:'tf',q:'Discoloration of a casting is caused by formation of oxides, and overheating gypsum-bonded investment above 700°C causes SO₃ to evolve.',ans:true,exp:'TRUE — Overheating gypsum-bonded investment beyond 700°C decomposes the gypsum binder, releasing SO₃ gas. This reacts with the metal surface, forming sulfides that cause dark discoloration of the casting.'},
  {type:'tf',q:'Back pressure porosity has irregular voids caused by shrinkage of the alloy on cooling.',ans:false,exp:'FALSE — REVERSED. Back pressure porosity = ROUNDED margins, REGULAR large voids (from trapped air preventing metal flow). LOCALIZED SHRINKAGE porosity = IRREGULAR voids from alloy shrinkage on cooling.'},
  {type:'tf',q:'Soldering joins metals by using an intermediary alloy with a HIGHER melting point than the metals being joined.',ans:false,exp:'FALSE — Soldering uses an intermediary alloy with a LOWER melting point. WELDING, by contrast, joins parts by applying heat/pressure directly to the metals themselves (no intermediary alloy).'},
  {type:'tf',q:'In the electrochemical cell, the anode is the surface undergoing oxidation and corrosion, while the cathode undergoes reduction.',ans:true,exp:'TRUE — In corrosion: ANODE = oxidation + corrosion (loses electrons, material destroyed). CATHODE = reduction (gains electrons, protected). This is the basis of galvanic corrosion in oral cavity.'},
  // MCQ (28)
  {type:'mcq',q:'Which equation correctly represents the balance needed for accurate casting?',opts:['Wax shrinkage + gold shrinkage = wax expansion + setting expansion + hygroscopic expansion + thermal expansion','Gold shrinkage = thermal expansion only','Wax expansion + gold expansion = wax shrinkage + setting shrinkage','Wax shrinkage = thermal expansion only'],ans:0,exp:'All four expansion types combined (wax, setting, hygroscopic, thermal) must compensate for BOTH wax shrinkage AND gold solidification shrinkage. Using only thermal expansion or omitting any factor leads to dimensional inaccuracy.'},
  {type:'mcq',q:'In the indirect technique, the wax pattern shrinks approximately:',opts:['0.1%','0.2%','0.4%','1.25%'],ans:2,exp:'Indirect technique wax shrinkage = 0.4% (wax cools from die temperature in the lab over longer time). Direct technique = 0.2% (cooling from mouth ~37°C to room temp ~23°C). 1.25% = thermal expansion of high heat investment.'},
  {type:'mcq',q:'What is the gold solidification shrinkage for a Class V restoration?',opts:['1.25%','1.75%','2.0%','0.4%'],ans:2,exp:'Class V gold shrinkage = 2.0% (highest, due to bulk geometry). Full crown = 1.75%. Thin 3/4 crown = 1.25%. 0.4% = indirect wax shrinkage. The greater the bulk, the more shrinkage compensation required.'},
  {type:'mcq',q:'In high heat investment, the mold is held at 500°C to achieve:',opts:['Complete wax elimination only','Maximum hygroscopic expansion of 2.1%','Maximum thermal expansion of 1.25%','Setting expansion of 3.5%'],ans:2,exp:'500°C for 20–30 min = maximum THERMAL expansion of 1.25% in high heat investment. 2.1% = water immersion total expansion. 3.5% = setting expansion with dampened liner. Wax elimination begins at the first 150°C stage.'},
  {type:'mcq',q:'The purpose of lining the casting ring with a dampened liner in high heat investment is to:',opts:['Prevent the mold from overheating','Increase setting expansion to 3.5% by providing a cushion for expansion','Replace the need for thermal expansion','Speed up wax burnout'],ans:1,exp:'The dampened liner acts as a cushion allowing the investment to expand outward without ring restriction, and the water causes hygroscopic expansion that increases setting expansion from ~1.75% to ~3.5%. Thermal expansion remains the main compensation source.'},
  {type:'mcq',q:'Which investment type uses a rubber ring instead of a metal ring?',opts:['High heat investment','Water immersion investment','Phosphate bonded investment','Both A and B'],ans:1,exp:'Water immersion investment uses a RUBBER ring because it has HIGH strength and doesn\'t need metal support. High heat investment is WEAK and REQUIRES a metal ring. Phosphate bonded uses no ring or plastic ring.'},
  {type:'mcq',q:'In controlled water addition technique, the mold is placed in a furnace at:',opts:['150°C','340°C','430°C','500°C'],ans:1,exp:'Controlled water addition = 340°C oven. Water immersion = 430°C oven. High heat investment: first stage = 150°C (wax elimination), second stage = 500°C (thermal expansion).'},
  {type:'mcq',q:'What is the primary function of the sprue after burnout?',opts:['To hold the wax pattern on the die','To provide a channel through which molten metal enters the mold','To expand and compensate for gold shrinkage','To act as a surfactant reservoir'],ans:1,exp:'After burnout, the sprue channel is the PATHWAY for molten metal to flow into the mold cavity. Before burnout it holds the pattern. Expansion is controlled by investment properties. The surfactant is applied before investing, unrelated to the sprue.'},
  {type:'mcq',q:'The ideal sprue diameter should match:',opts:['The thinnest area of the wax pattern','The thickest area of the wax pattern','Exactly 2 mm regardless of restoration size','The diameter of the crucible former'],ans:1,exp:'Sprue diameter should match the THICKEST area of the pattern so it stays molten until the entire casting solidifies, ensuring complete fill. Thin sprues solidify prematurely, cutting off the metal supply.'},
  {type:'mcq',q:'What happens if the sprue diameter is TOO SMALL?',opts:['The wax pattern distorts','The sprue solidifies before the casting is complete, causing porosity','The mold expands too much','The investment sets too quickly'],ans:1,exp:'Too-small sprue = premature solidification = cuts off molten metal supply before the mold fills = porosity or incomplete casting. Too-LARGE sprue can distort the wax pattern near the attachment point.'},
  {type:'mcq',q:'A reservoir attached to the sprue is used to:',opts:['Speed up solidification of the casting','Prevent porosity by supplying molten alloy as the casting shrinks','Increase the setting expansion of the investment','Allow multiple castings simultaneously'],ans:1,exp:'The reservoir (larger cross-section than casting) solidifies LATER, continuously feeding molten metal to compensate for shrinkage porosity as the casting solidifies from margins inward. It does not affect investment expansion.'},
  {type:'mcq',q:'Asbestos ring liner has been replaced because:',opts:['It causes excessive thermal expansion','It is carcinogenic','It does not absorb water','It is too expensive'],ans:1,exp:'Asbestos is CARCINOGENIC — the primary reason for replacement. It is now replaced with alumino-silicate ceramic or cellulose (paper) liners that provide similar cushioning and water absorption without the health hazard.'},
  {type:'mcq',q:'The wet liner in a casting ring aids hygroscopic expansion AND acts as a cushion to allow expansion to occur:',opts:['Inward toward the investment','Outward away from the investment','Downward along the ring','In all directions equally'],ans:1,exp:'The wet liner cushions the investment and allows it to expand OUTWARD (away from the investment center), preventing the rigid metal ring walls from restricting expansion. Inward expansion would compress and distort the mold.'},
  {type:'mcq',q:'Which melting method is used for cobalt-chromium-nickel alloys?',opts:['Natural gas-air torch','Electrical resistance melting','Induction melting','Natural gas-oxygen torch'],ans:2,exp:'Co-Cr-Ni alloys = INDUCTION melting (electrical coils generate rapidly alternating magnetic field). Natural gas-air = most gold alloys. Electrical resistance = gold alloys. Natural gas-oxygen = high-fusing gold and palladium alloys.'},
  {type:'mcq',q:'Centrifugal casting machines work by:',opts:['Using compressed air to force molten metal into the mold','Applying vacuum pressure to draw metal into the mold','Rotating the crucible and mold around a central axis so centrifugal force drives the alloy','Using electrical resistance to pressurize the mold'],ans:2,exp:'Centrifugal machines rotate the crucible and mold — rotational force drives the molten alloy into the mold. Air pressure machines use compressed air. Vacuum machines draw metal by negative pressure. Electrical resistance is a melting method.'},
  {type:'mcq',q:'Pickling of the casting is performed to:',opts:['Polish the surface of the restoration','Remove oxides and sulfides that cause dark discoloration of the casting surface','Eliminate residual investment from the mold','Harden the metal after casting'],ans:1,exp:'Pickling = immersing the casting in acid solution to dissolve oxide and sulfide deposits causing dark discoloration. Investment is removed by devesting/quenching. Polishing uses rubber/rag/felt wheels. Hardening uses heat treatment.'},
  {type:'mcq',q:'Which of the following is a function of flux in soldering?',opts:['Limits the spreading of solder to unwanted areas','Hardens the solder after it flows','Protects alloy surfaces from oxidation and dissolves metallic oxides','Increases the melting temperature of the solder'],ans:2,exp:'Flux: (1) protects surfaces from oxidation during heating AND (2) dissolves metallic oxides that form, ensuring clean metal contact for solder flow. Anti-FLUX (graphite) limits spread. Flux has no hardening or temperature-raising function.'},
  {type:'mcq',q:'What is the fusion temperature range for gold solders?',opts:['500°C – 650°C','750°C – 900°C','900°C – 1000°C','1000°C – 1200°C'],ans:1,exp:'Gold solder fusion range = 750–900°C, which must be 50–100°C LOWER than the alloys being joined. Below 750°C = too weak for dental use. Above 900°C risks melting parent alloys.'},
  {type:'mcq',q:'A patient has amalgam opposing a gold inlay and feels sharp pain when teeth contact. This is due to:',opts:['Stress corrosion from polished/unpolished surface differences','Concentration cell corrosion from food debris','Galvanic (electrolytic) corrosion from two dissimilar metals in contact','Chemical corrosion from silver sulfide formation'],ans:2,exp:'Classic galvanic corrosion: amalgam and gold have different electrode potentials. Saliva = electrolyte. Direct contact = electrical current flow = sharp pain. Stress corrosion = polished/unpolished areas of SAME restoration. Concentration cell = different electrolyte concentrations.'},
  {type:'mcq',q:'Which type of corrosion occurs when an amalgam restoration has both polished and unpolished surface areas?',opts:['Dissimilar metal corrosion','Concentration cell corrosion','Stress corrosion','Chemical oxidation'],ans:2,exp:'Stress corrosion (corrosion from heterogeneous composition/surface): polished and unpolished areas of the SAME restoration act as different electrodes. Dissimilar metal = two DIFFERENT metals. Concentration cell = varying electrolyte concentration.'},
  {type:'mcq',q:'Which casting defect is most likely if the sprue is very narrow (thin)?',opts:['Distortion','Discoloration','Incomplete casting','Localized shrinkage porosity'],ans:2,exp:'Very narrow sprue restricts molten alloy flow into the mold → INCOMPLETE casting. A too-short sprue causes back pressure → also incomplete casting. Discoloration = oxide/sulfide contamination. Distortion = wax pattern mishandling.'},
  {type:'mcq',q:'Gas inclusion porosity in a casting is caused by:',opts:['Improper sprue placement','Prolonged or overheating of the alloy','Incomplete wax elimination','Too rapid heating of the investment'],ans:1,exp:'Gas inclusion porosity = prolonged or overheating of the alloy causes gas absorption/entrapment. Too rapid heating of investment = cracks in mold → fins/surface roughness. Incomplete wax elimination → carbon contamination/discoloration.'},
  {type:'mcq',q:'Surface roughness and fins on a casting surface are most likely caused by:',opts:['Insufficient casting pressure','Too rapid heating causing cracks in the investment','Overheating the alloy','Using an incorrect sprue diameter'],ans:1,exp:'Too rapid investment heating = mold cracking. Molten metal flows into cracks = FINS on casting surface. Overheating the alloy = gas inclusion porosity. Insufficient casting pressure = incomplete casting.'},
  {type:'mcq',q:'The fusion temperature of a dental solder must be at least how much lower than the melting point of the alloys being joined?',opts:['25–50°C','50–100°C','100–150°C','150–200°C'],ans:1,exp:'Solder fusion temperature must be 50–100°C LOWER than parent alloys. This gap ensures the solder flows while the parent metals remain solid and undistorted. A smaller gap risks melting the parent metals.'},
  {type:'mcq',q:'Which material is used as anti-flux in soldering to limit the spread of solder to undesirable areas?',opts:['Borax','Potassium fluoride','Graphite','Zinc chloride'],ans:2,exp:'GRAPHITE = anti-flux. Applied to areas where solder must NOT flow. Borax and potassium fluoride are FLUX materials (protect surfaces from oxidation). Graphite\'s non-wetting property repels molten solder.'},
  {type:'mcq',q:'Which type of electrolytic corrosion occurs when two dissimilar metals (e.g., amalgam and gold) are in contact?',opts:['Concentration cell corrosion','Stress corrosion','Corrosion due to heterogeneous composition','Galvanic corrosion from dissimilar metals'],ans:3,exp:'Galvanic corrosion = dissimilar metals in contact + electrolyte (saliva) = potential difference = current flow = corrosion + pain. Concentration cell = different electrolyte concentrations. Stress corrosion = polished vs. unpolished areas of same metal.'},
  {type:'mcq',q:'In base metal alloys, which elements form a passive protective oxide layer to prevent further corrosion?',opts:['Gold, silver, and copper','Zinc and tin','Chromium, aluminum, and titanium','Palladium and platinum'],ans:2,exp:'Chromium, aluminum, and titanium (at ≥20% concentration) form a continuous, non-porous, adherent PASSIVE oxide layer that prevents further corrosion. Household bleaches must be avoided as they attack this protective layer. Gold/silver/palladium/platinum are noble metals that resist corrosion by different mechanisms.'},
  {type:'mcq',q:'Tarnish on a dental restoration is best described as:',opts:['Deep pitting and loss of material due to electrochemical attack','Surface discoloration or slight loss of luster due to thin oxide/sulfide/chloride films','Complete dissolution of the metal surface','Cracking of the restoration under stress'],ans:1,exp:'Tarnish = surface discoloration or slight loss of luster from hard/soft deposits or thin oxide/sulfide/chloride films — WITHOUT significant loss of material. Corrosion = deeper electrochemical destruction WITH material loss.'},
];

const CERAMICS = [
  {type:'mcq',q:'The term "ceramic" derives from the Greek word "Keramikos", which means:',opts:['Hard material','Burn stuff','Crystal structure','Earth element'],ans:1,exp:'"Keramikos" = "burn stuff" — reflecting that ceramic properties are achieved through high-temperature firing. This etymology highlights the central role of heat in ceramic processing.'},
  {type:'mcq',q:'The atomic bonding in ceramics ranges between:',opts:['Metallic and ionic','Covalent and metallic','Purely ionic and purely covalent','Van der Waals and ionic'],ans:2,exp:'Ceramic bonding ranges from purely ionic to purely covalent, and most ceramics exhibit a combination of both types. This mixed bonding gives ceramics their characteristic hardness, brittleness, and electrical insulation.'},
  {type:'mcq',q:'Why are ceramics considered heat and electrical insulators?',opts:['They have high porosity','They lack relatively free electrons','They are crystalline','They have low melting point'],ans:1,exp:'Ceramics have no relatively free electrons available for conduction of electricity or heat, unlike metals. This is why they are excellent insulators and often used as refractories.'},
  {type:'mcq',q:'Which type of strength is HIGHER in ceramics?',opts:['Tensile strength','Shear strength','Compressive strength','Flexural strength'],ans:2,exp:'Ceramics have higher COMPRESSIVE strength than tensile strength. Tensile stress opens cracks; compressive stress closes them. This is why ceramic restorations must be designed to minimize tensile loading.'},
  {type:'mcq',q:'Which acid is used to dissolve ceramics?',opts:['Phosphoric acid','Hydrochloric acid','Sulfuric acid','Hydrofluoric acid'],ans:3,exp:'Ceramics are chemically indestructible under most conditions. Hydrofluoric acid (HF) is the only common acid capable of dissolving silica-based ceramics — exploited in bonding protocols to create micromechanical undercuts.'},
  {type:'mcq',q:'Glass Transition Temperature (Tg) is the temperature:',opts:['At which glass melts completely','Below which glass is rigid/solid and above which it becomes viscous','At which devitrification begins','Required for sintering'],ans:1,exp:'Tg = below which glass is rigid (solid), above which it becomes viscous (soft). It is NOT the melting point — glass does not have a sharp melting point but a gradual softening range.'},
  {type:'mcq',q:'Devitrification is:',opts:['The process of glass forming','The process of crystallization of glass','The quenching of molten ceramic','The firing of porcelain'],ans:1,exp:'Devitrification = CRYSTALLIZATION of glass, accomplished with nucleating agents at high temperature → glass ceramics with greater hardness/strength but decreased transparency. VITRIFICATION = glass forming (opposite).'},
  {type:'mcq',q:'Dental porcelain is essentially a glass prepared from:',opts:['Alumina and zirconia','High purity feldspar and quartz','Kaolin and silica only','Leucite and lithium disilicate'],ans:1,exp:'Dental porcelain = glass from high purity FELDSPAR (75–85%) and QUARTZ (12–22%), plus kaolin and metallic pigments. Contains a crystalline phase (quartz, leucite) within a glassy feldspar matrix.'},
  {type:'mcq',q:'Feldspar in dental porcelain consists of:',opts:['Potassium aluminum silicate + sodium aluminum silicate','Calcium silicate + magnesium oxide','Silica tetrahedra + kaolin','Leucite + quartz'],ans:0,exp:'Feldspar = hydrated aluminum silicates: potassium aluminum silicate (orthoclase) + sodium aluminum silicate (albite). Forms the glassy matrix of dental porcelain when fired.'},
  {type:'mcq',q:'Leucite is characterized by:',opts:['Low coefficient of thermal expansion','Large coefficient of thermal expansion','High translucency','Low melting temperature'],ans:1,exp:'Leucite (KAlSi₂O₆) has a LARGE coefficient of thermal expansion — important for CTE matching with metal alloys in PFM restorations. Forms when potassium feldspar is mixed with metal oxides and fired.'},
  {type:'mcq',q:'The role of Kaolin in dental porcelain is:',opts:['Strengthening agent','Flux to lower firing temperature','Binder that increases mouldability','Coloring agent'],ans:2,exp:'Kaolin = BINDER that increases mouldability of unfired porcelain. Becomes sticky with water, forming a workable mass. Also contributes to opaqueness. Modern porcelain omits kaolin entirely.'},
  {type:'mcq',q:'Modern dental porcelain does NOT contain kaolin; therefore it is classified as:',opts:['Polycrystalline ceramic','Feldspathic glass with crystalline inclusions','Pure oxide ceramic','Glass-infiltrated ceramic'],ans:1,exp:'Without kaolin = FELDSPATHIC GLASS with crystalline inclusions. Polycrystalline = 100% crystalline (zirconia). Glass-infiltrated (In-Ceram) = separate category with alumina/zirconia framework infiltrated with glass.'},
  {type:'mcq',q:'Glass modifiers (e.g., Na⁺, K⁺, Ca²⁺) affect silica tetrahedra by:',opts:['Strengthening the oxygen-silicon bond','Increasing viscosity','Interrupting the oxygen-silica bond, lowering softening temperature','Increasing melting temperature'],ans:2,exp:'Metal ions interrupt the Si-O network → LOWER softening temperature + increased fluidity + decreased viscosity. This is exploited in fluxes and glazes but reduces chemical durability at high concentrations.'},
  {type:'mcq',q:'High concentration of glass modifiers leads to:',opts:['Increased chemical durability','Reduced chemical durability and possible crystallization','Increased translucency','Higher firing temperature'],ans:1,exp:'High modifier concentration = reduced chemical durability (less resistance to oral fluids) + possible crystallization. This is why applied glaze (higher modifiers) is less durable than self-glaze.'},
  {type:'mcq',q:'Fluxes in dental porcelain are added to:',opts:['Increase color intensity','Reduce temperature required to sinter powder particles','Increase shrinkage','Improve opacity'],ans:1,exp:'Fluxes (low-fusing glasses) reduce the sintering temperature required to fuse porcelain powder particles together. Without fluxes, much higher temperatures would risk distortion of the restoration.'},
  {type:'mcq',q:'What are "FRITS" in dental porcelain manufacture?',opts:['Metal oxides used as colorants','Powdered material obtained after quenching the melted porcelain','The crystalline phase of porcelain','Nucleating agents for devitrification'],ans:1,exp:'FRITS = powder obtained by QUENCHING (rapid thermal shock) the blended melted porcelain while red hot. This shatters it into powder. What dental labs receive and use to build restorations.'},
  {type:'mcq',q:'The approximate proportion of Feldspar in conventional dental porcelain is:',opts:['12-22%','3-5%','75-85%','<1%'],ans:2,exp:'Composition: Feldspar 75–85% (glassy matrix), Quartz 12–22% (strengthening), Kaolin 3–5% (binder), Metallic pigments <1% (colorants).'},
  {type:'mcq',q:'The purpose of firing dental porcelain in the lab is:',opts:['To complete thermochemical reactions between components','Simply to sinter the particles of powder','To create the crystalline phase from raw ingredients','To add fluorescence'],ans:1,exp:'Thermochemical reactions are completed during manufacturing (frit production). Lab firing = simply SINTERING the powder particles together. No new chemical phases are created during lab firing.'},
  {type:'mcq',q:'Self-glaze porcelain is PREFERRED over applied glaze because:',opts:['Applied glaze has higher resistance to oral fluids','Self-glaze has lower firing temperature','Applied glaze contains more glass modifiers, lowering its resistance to oral fluids','Self-glaze is cheaper'],ans:2,exp:'Applied glaze = more glass modifiers → lower firing temp → LOWER resistance to oral fluids. Self-glaze uses the porcelain\'s own surface — same composition, same durability as the bulk material.'},
  {type:'mcq',q:'To reduce porosity in dental porcelain, which method is used?',opts:['Firing under high oxygen pressure','Firing under vacuum','Increasing kaolin content','Using only large particle sizes'],ans:1,exp:'Porosity reduction: (a) firing under VACUUM eliminates trapped gas, (b) BLENDED small and large particle sizes reduce interparticle voids. Both reduce porosity to ~1.3%.'},
  {type:'mcq',q:'Lithium disilicate glass ceramics (e.g., IPS e.max) have a strength of approximately:',opts:['60-70 MPa','100-160 MPa','350-400 MPa','900-1200 MPa'],ans:2,exp:'Lithium disilicate (Li₂Si₂O₅) = 350–400 MPa. Compare: feldspathic porcelain ≈ 60–70 MPa, leucite-reinforced ≈ 100–160 MPa, Y-TZP zirconia ≈ 900–1200 MPa.'},
  {type:'mcq',q:'Y-TZP is often called "ceramic steel" because:',opts:['It contains iron','It is the strongest and toughest all-ceramic material in dentistry','It has metallic appearance','It conducts electricity like steel'],ans:1,exp:'Y-TZP = "ceramic steel" because it is the STRONGEST and TOUGHEST all-ceramic material (~900–1200 MPa), far exceeding all other dental ceramics.'},
  {type:'mcq',q:'Transformation toughening in zirconia involves:',opts:['Conversion of monoclinic to tetragonal phase causing volume decrease','Conversion of tetragonal to monoclinic phase causing 3-5% volume increase, generating compressive stress at crack tip','Complete crystallization of all phases','Glass infiltration of porous framework'],ans:1,exp:'At crack tip: tensile stress → tetragonal → monoclinic = 3–5% volume INCREASE = localized compressive stress = crack squeezed shut and stopped. This unique mechanism makes zirconia exceptionally tough.'},
  {type:'mcq',q:'The APC bonding protocol for zirconia stands for:',opts:['Acid, Paste, Cure','Air-particle Abrasion, Primer, Composite Resin Cement','Alumina, Phosphoric acid, Cement','Adhesive, Polish, Coat'],ans:1,exp:'APC: A = Air-particle Abrasion (sandblasting — micromechanical), P = Primer with MDP (chemical coupling), C = Composite Resin Cement (adhesive). HF etching does NOT work for zirconia.'},
  {type:'mcq',q:'The MDP monomer in zirconia bonding primer works by:',opts:['Etching the zirconia surface with acid','Phosphate group forming ionic bond with zirconium oxide; methacrylate group copolymerizing with resin','Creating micromechanical roughness only','Dissolving the glassy phase'],ans:1,exp:'MDP = bifunctional: PHOSPHATE group → ionic bond with ZrO₂ (chemical). METHACRYLATE group → copolymerizes with resin cement (organic). Dual bonding without HF etching.'},
  {type:'mcq',q:'Silane coupling agent in ceramic bonding is described as:',opts:['A monofunctional molecule that etches the ceramic','A bifunctional molecule acting as a chemical bridge between ceramic and resin cement','An acid used after HF etching','A glass modifier reducing firing temperature'],ans:1,exp:'Silane = BIFUNCTIONAL bridge: Si-O-Si bonds to ceramic surface (after HF etching creates silanol groups) + methacrylate bonds to organic resin cement. Bridges the chemically incompatible phases.'},
  {type:'mcq',q:'CAD/CAM technique in ceramic fabrication involves:',opts:['Hand condensation of ceramic powder','Lost-wax casting under pressure','Computer-aided design and milling of prefabricated ceramic blocks','Slip casting followed by glass infiltration'],ans:2,exp:'CAD/CAM = computer design + milling of prefabricated blocks. Advantages: precision, efficiency, single-visit, high-strength materials (zirconia, lithium disilicate). Examples: CEREC, E4D.'},
  {type:'mcq',q:'In the slip-casting technique (In-Ceram), a ceramic slurry is applied to:',opts:['A metal die under pressure','A porous die, allowing liquid to be absorbed','A wax pattern in a mold','A prefabricated ceramic block'],ans:1,exp:'Slip-casting: slurry applied to POROUS gypsum die → liquid absorbed → dense ceramic layer deposited → sintering → glass infiltration (lanthanum glass for In-Ceram Alumina).'},
  {type:'mcq',q:'The advantage of high-fusing porcelain (1300°C) is:',opts:['Lower cost','Can be repaired without distortion','Higher translucency','Faster firing time'],ans:1,exp:'High-fusing advantage = can be REPAIRED without distortion (very high fusion temp means other ceramics can be added without deforming the base). Used for denture teeth.'},
  {type:'mcq',q:'Slow cooling (annealing) of dental porcelain is done to avoid:',opts:['Sintering failure','Surface crazing','Devitrification','Glass phase dissolution'],ans:1,exp:'Slow cooling avoids SURFACE CRAZING — surface microcracks from thermal stress gradients when surface cools faster than interior. Rapid temperature differences exceed the material\'s tensile strength at the surface.'},
  {type:'tf',q:'Ceramics include oxides, nitrides, and silicates.',ans:true,exp:'TRUE — Ceramics = compounds of metallic and non-metallic elements, including oxides (Al₂O₃, ZrO₂), nitrides (Si₃N₄), and silicates (dental porcelain). This broad category encompasses all non-metallic inorganic materials processed at high temperature.'},
  {type:'tf',q:'Ceramics have higher tensile strength than compressive strength.',ans:false,exp:'FALSE — Ceramics have HIGHER compressive strength than tensile strength. They are brittle and surface flaws/cracks govern strength. Tensile stress opens cracks; compressive stress closes them.'},
  {type:'tf',q:'The lack of free electrons in ceramics contributes to their transparency in a very pure state.',ans:true,exp:'TRUE — No free electrons = light not absorbed/reflected as in metals. Very pure, defect-free ceramics can be transparent. Dental ceramic translucency is achieved by minimizing crystalline content and porosity.'},
  {type:'tf',q:'Ceramics are chemically inert in the oral environment because they have already reacted maximally through oxidation processes.',ans:true,exp:'TRUE — Ceramics formed by oxidation = maximally reacted → cannot react further. Strong ionic/covalent bonds prevent leaching. Chemically stable and biocompatible in the oral cavity.'},
  {type:'tf',q:'Vitrification is the process by which crystallization of glass occurs.',ans:false,exp:'FALSE — VITRIFICATION = glass FORMING (cooling without crystallization). DEVITRIFICATION = crystallization of glass. These are opposite processes.'},
  {type:'tf',q:'Glass ceramics produced by devitrification have greater hardness and strength but decreased transparency.',ans:true,exp:'TRUE — Devitrification → glass ceramics with greater hardness/strength (crystalline reinforcement) + decreased transparency (crystalline phase scatters light). Classic strength–translucency trade-off.'},
  {type:'tf',q:'All ceramic materials are porcelain, but not all porcelain is ceramic.',ans:false,exp:'FALSE — All PORCELAIN is ceramic, but NOT all ceramic is porcelain. Zirconia (Y-TZP) and alumina are ceramics but NOT porcelains.'},
  {type:'tf',q:'Potassium feldspar when mixed with metal oxides and fired can form leucite and a glass phase.',ans:true,exp:'TRUE — K-feldspar + metal oxides → firing → LEUCITE (crystalline, large CTE) + glass phase. Important for CTE matching in PFM ceramics.'},
  {type:'tf',q:'Quartz remains unchanged during the firing process and acts as a strengthening agent.',ans:true,exp:'TRUE — Silica/quartz remains UNCHANGED during firing and acts as a STRENGTHENING AGENT as a fine crystalline dispersion throughout the glassy feldspar phase.'},
  {type:'tf',q:'Modern dental porcelain still contains kaolin as an essential component.',ans:false,exp:'FALSE — Modern dental porcelain does NOT contain kaolin. Without kaolin it is classified as feldspathic glass with crystalline inclusions. Kaolin was removed to improve translucency.'},
  {type:'tf',q:'Glass modifiers increase the viscosity of the glass and raise the softening temperature.',ans:false,exp:'FALSE — Glass modifiers DECREASE viscosity (increase fluidity) and LOWER softening temperature by interrupting the Si-O network. High modifier concentration also reduces chemical durability.'},
  {type:'tf',q:'Lanthanide oxide is used in dental porcelain to provide fluorescence instead of uranium oxide.',ans:true,exp:'TRUE — Lanthanide oxide provides fluorescence (important for esthetic matching under UV) without the radiation risk of uranium oxide which was previously used.'},
  {type:'tf',q:'Frits are obtained by slowly cooling the melted porcelain components.',ans:false,exp:'FALSE — Frits = obtained by QUENCHING (rapid thermal shock) while red hot. Slow cooling would produce a solid mass; quenching shatters it into usable powder.'},
  {type:'tf',q:'The first change during porcelain firing is the loss of water added to form the workable mass.',ans:true,exp:'TRUE — First change = loss of water. Subsequent: burnout of binders → sintering of particles → surface glazing.'},
  {type:'tf',q:'The purpose of glazing is to produce a smooth, shiny, and impervious surface.',ans:true,exp:'TRUE — Glazing = smooth + shiny + impervious surface → more tissue-compatible, less plaque retention, more esthetic, protects against surface wear.'},
  {type:'tf',q:'Applied glaze is preferred over self-glaze because it has better resistance to oral fluids.',ans:false,exp:'FALSE — SELF-GLAZE is preferred. Applied glaze = more glass modifiers → lower firing temp → LOWER resistance to oral fluids.'},
  {type:'tf',q:'Increasing the crystalline phase in high-strength ceramics increases opacity and decreases translucency.',ans:true,exp:'TRUE — Crystalline phase = opaque (scatters light). Glassy phase = translucent. High-strength ceramics (like zirconia) are more opaque. Higher yttria in zirconia = more translucent but less strong.'},
  {type:'tf',q:'High-fusing porcelain is used for crown and bridge fabrication.',ans:false,exp:'FALSE — High-fusing (1300°C) = denture teeth. Low-fusing (850–1100°C) = PFM crowns/bridges. Ultra-low-fusing (<850°C) = repairs on existing PFM restorations.'},
  {type:'tf',q:'Hydrofluoric acid etching is effective for bonding to zirconia (Y-TZP) restorations.',ans:false,exp:'FALSE — Zirconia is 100% crystalline with NO glassy silica phase → HF etching is ineffective. APC protocol required: sandblasting + MDP primer + composite resin cement.'},
  {type:'tf',q:'Silica-based ceramics (glass-based ceramics) are etchable with hydrofluoric acid.',ans:true,exp:'TRUE — Glass ceramics contain a silica glassy phase that HF dissolves → micromechanical undercuts for resin bonding. Followed by silane for chemical coupling.'},
  {type:'tf',q:'Pure zirconia is stable at room temperature without any stabilizers.',ans:false,exp:'FALSE — Pure zirconia is UNSTABLE: cools → tetragonal → monoclinic + 3–5% volume expansion → shatters. Yttria (Y₂O₃) locks it in the tetragonal phase at room temperature.'},
  {type:'tf',q:'Polycrystalline ceramics (like Y-TZP) are 100% crystalline and contain no glassy phase.',ans:true,exp:'TRUE — 100% crystalline, no glassy phase → highest strength/toughness. Cannot be HF etched. Most opaque of all dental ceramics.'},
  {type:'tf',q:'Traditional 3Y-TZP (1st/2nd generation) has the highest translucency among zirconia types.',ans:false,exp:'FALSE — 3Y-TZP = LOWEST translucency (most opaque) + HIGHEST strength (1000+ MPa). Higher yttria (4Y, 5Y) = more translucent + less strong. Classic trade-off.'},
  {type:'tf',q:'The heat-pressed technique uses the lost-wax method with ceramic ingots pressed into a mold under pressure.',ans:true,exp:'TRUE — Heat-pressed: lost-wax → ceramic ingots melted + pressed into mold under pressure → eliminates porosity. Used for lithium disilicate (IPS e.max Press, IPS Empress).'},
  {type:'tf',q:'The copy-milling technique (Celay system) is more common than CAD/CAM.',ans:false,exp:'FALSE — Copy-milling is LESS common than CAD/CAM. Uses mechanical linkage — less precise and versatile than digital CAD/CAM systems.'},
  {type:'tf',q:'Glass-infiltrated ceramics (In-Ceram) are effectively bonded using standard HF acid etching.',ans:false,exp:'FALSE — Standard HF etching is INEFFECTIVE for In-Ceram (high-purity alumina/zirconia framework not altered by HF). Recommended: sandblasting + MDP resin cement OR tribochemical silica coating + silane.'},
  {type:'tf',q:'The crystalline phase in dental porcelain includes silica, leucites, and certain metallic oxides used as colorants.',ans:true,exp:'TRUE — Crystalline phase: quartz/silica (strengthening), leucite (CTE adjustment), metallic oxide colorants (iron = brown/yellow, tin = white/opaque, cobalt = blue, titanium = yellow).'},
  {type:'tf',q:'Leucite-reinforced glass ceramics (e.g., IPS Empress) contain 35-45% leucite crystals in a glass matrix.',ans:true,exp:'TRUE — 35–45% leucite crystals (KAlSi₂O₆) in glass matrix → strength ≈ 100–160 MPa. Good esthetics, compatible CTE with PFM metal alloys.'},
  {type:'tf',q:'Glazed porcelain surfaces are more compatible with soft tissues than unglazed surfaces.',ans:true,exp:'TRUE — Glazed = smooth → less plaque retention → less gingival irritation. Unglazed porcelain = rough, abrasive → tissue irritation + excessive wear of opposing teeth.'},
  {type:'tf',q:'Shrinkage during porcelain firing occurs due to sintering eliminating voids between powder particles.',ans:true,exp:'TRUE — Water/binders evaporate → voids form → sintering fuses particles and eliminates voids → volumetric shrinkage (~30–40%). Proper condensation before firing minimizes total shrinkage.'},
];



let currentFilter = 'cement';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (f === 'cement') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Cement Quiz';
    document.getElementById('startBtnSub').textContent = '125 questions — shuffled';
  } else if (f === 'amalgam') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Amalgam Quiz';
    document.getElementById('startBtnSub').textContent = '80 questions — shuffled';
  } else if (f === 'composite') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Composite Quiz';
    document.getElementById('startBtnSub').textContent = '70 questions — shuffled';
  } else if (f === 'impression') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Impression Quiz';
    document.getElementById('startBtnSub').textContent = '50 questions — shuffled';
  } else if (f === 'elastic') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Elastic Impression Quiz';
    document.getElementById('startBtnSub').textContent = '40 questions — shuffled';
  } else if (f === 'modeldie') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Model & Die Quiz';
    document.getElementById('startBtnSub').textContent = '30 questions — shuffled';
  } else if (f === 'investment') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Investment Materials Quiz';
    document.getElementById('startBtnSub').textContent = '30 questions — shuffled';
  } else if (f === 'waxes') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Dental Waxes Quiz';
    document.getElementById('startBtnSub').textContent = '30 questions — shuffled';
  } else if (f === 'denture') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Denture Base Quiz';
    document.getElementById('startBtnSub').textContent = '30 questions — shuffled';
  } else if (f === 'casting') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Casting Quiz';
    document.getElementById('startBtnSub').textContent = '55 questions — shuffled';
  } else if (f === 'ceramics') {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Ceramics Quiz';
    document.getElementById('startBtnSub').textContent = '60 questions — shuffled';
  } else {
    document.getElementById('startBtnLabel').textContent = '⚡ Start Cement Quiz';
    document.getElementById('startBtnSub').textContent = '125 questions — shuffled';
  }
  exitToMenu();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(mode) {
  if (mode === 'current') {
    if (currentFilter === 'amalgam') quizDeck = shuffle([...AMALGAM]);
    else if (currentFilter === 'composite') quizDeck = shuffle([...COMPOSITE]);
    else if (currentFilter === 'impression') quizDeck = shuffle([...IMPRESSION]);
    else if (currentFilter === 'elastic') quizDeck = shuffle([...ELASTIC]);
    else if (currentFilter === 'modeldie') quizDeck = shuffle([...MODELDIE]);
    else if (currentFilter === 'investment') quizDeck = shuffle([...INVESTMENT]);
    else if (currentFilter === 'waxes') quizDeck = shuffle([...WAXES]);
    else if (currentFilter === 'denture') quizDeck = shuffle([...DENTURE]);
    else if (currentFilter === 'casting') quizDeck = shuffle([...CASTING]);
    else if (currentFilter === 'ceramics') quizDeck = shuffle([...CERAMICS]);
    else quizDeck = shuffle([...CEMENT1, ...CEMENT2, ...CEMENT3]);
  } else if (mode === 'cement1') quizDeck = shuffle([...CEMENT1]);
  else if (mode === 'cement2') quizDeck = shuffle([...CEMENT2]);
  else if (mode === 'cement3') quizDeck = shuffle([...CEMENT3]);
  else quizDeck = shuffle([...CEMENT1, ...CEMENT2, ...CEMENT3]);

  quizIndex = 0;
  quizCorrect = 0;
  quizAnswered = false;

  document.getElementById('quizStart').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizActive').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = quizDeck[quizIndex];
  quizAnswered = false;

  document.getElementById('qNum').textContent = `Q${quizIndex + 1} / ${quizDeck.length}`;
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
  document.getElementById('qProgress').style.width = `${(quizIndex / quizDeck.length) * 100}%`;

  const badge = document.getElementById('qTypeBadge');
  badge.className = 'quiz-type-badge ' + q.type;
  badge.textContent = q.type === 'tf' ? 'TRUE / FALSE' : 'MCQ';

  document.getElementById('qQuestion').textContent = q.q;
  document.getElementById('qExplanation').classList.remove('visible');
  document.getElementById('qNextBtn').classList.remove('visible');

  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';

  if (q.type === 'tf') {
    const div = document.createElement('div');
    div.className = 'tf-buttons';
    const tBtn = document.createElement('button');
    tBtn.className = 'tf-btn true-btn';
    tBtn.textContent = '✓ TRUE';
    const fBtn = document.createElement('button');
    fBtn.className = 'tf-btn false-btn';
    fBtn.textContent = '✗ FALSE';
    tBtn.onclick = () => answerTF(true, tBtn, fBtn, q);
    fBtn.onclick = () => answerTF(false, tBtn, fBtn, q);
    div.appendChild(tBtn);
    div.appendChild(fBtn);
    optsEl.appendChild(div);
  } else {
    const labels = ['A','B','C','D'];
    const btns = [];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt}</span>`;
      btn.onclick = () => answerMCQ(i, btns, q);
      optsEl.appendChild(btn);
      btns.push(btn);
    });
  }
}

function answerTF(chosen, tBtn, fBtn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;
  tBtn.disabled = true;
  fBtn.disabled = true;
  if (chosen === true) {
    tBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) fBtn.classList.add('correct');
  } else {
    fBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) tBtn.classList.add('correct');
  }
  showExplanation(isCorrect, q.exp);
}

function answerMCQ(chosen, btns, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === chosen && isCorrect) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
    else if (i === q.ans) b.classList.add('show-correct');
  });
  showExplanation(isCorrect, q.exp);
}

function showExplanation(correct, text) {
  const el = document.getElementById('qExplanation');
  el.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong> — ${text}`;
  el.classList.add('visible');
  const nb = document.getElementById('qNextBtn');
  nb.textContent = quizIndex + 1 < quizDeck.length ? 'Next Question →' : 'See Results';
  nb.classList.add('visible');
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizDeck.length) {
    showResult();
  } else {
    renderQuestion();
    document.querySelector('.main').scrollTop = 0;
  }
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  const result = document.getElementById('quizResult');
  result.classList.add('visible');
  const pct = Math.round((quizCorrect / quizDeck.length) * 100);
  document.getElementById('rScore').textContent = pct + '%';
  const wrong = quizDeck.length - quizCorrect;
  document.getElementById('rCorrect').textContent = `✓ ${quizCorrect} Correct`;
  document.getElementById('rWrong').textContent = `✗ ${wrong} Wrong`;
  let label = '';
  if (pct >= 90) label = 'Excellent! You\'re ready for the exam 🎯';
  else if (pct >= 75) label = 'Good work — review the missed questions 📖';
  else if (pct >= 60) label = 'Keep studying — you\'re getting there 💪';
  else label = 'Review the material and try again 🔁';
  document.getElementById('rLabel').textContent = label;
}

function restartQuiz() {
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function quizBack() {
  if (quizIndex === 0 && !quizAnswered) {
    exitToMenu();
  } else {
    document.getElementById('confirmCount').textContent = quizAnswered ? quizIndex + 1 : quizIndex;
    document.getElementById('confirmModal').style.display = 'flex';
  }
}

function exitToMenu() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function closeConfirmModal() {
  document.getElementById('confirmModal').style.display = 'none';
}

function closeConfirm(e) {
  if (e.target === document.getElementById('confirmModal')) closeConfirmModal();
}

function confirmExit() {
  closeConfirmModal();
  exitToMenu();
}
</script>
