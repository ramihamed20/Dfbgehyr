<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Dental Materials — Study App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080d14"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080d14;
  --surface: #0f1620;
  --surface2: #161f2e;
  --surface3: #1c2840;
  --border: #1e2d45;
  --border2: #243550;
  --text: #e4eaf5;
  --text2: #a8b8d8;
  --muted: #5a6e8f;
  --accent: #3d8ef0;
  --accent-glow: rgba(61,142,240,0.18);
  --accent2: #30d4a0;
  --accent2-glow: rgba(48,212,160,0.15);
  --red: #f06060;
  --green: #30d4a0;
  --yellow: #f0c030;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;
  display:flex;flex-direction:column;height:100dvh;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(61,142,240,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(61,142,240,0.025) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0;
}
.topbar,.main{position:relative;z-index:1;}

/* TOP BAR */
.topbar{
  background:linear-gradient(180deg,#0d1624 0%,#0a1220 100%);
  border-bottom:1px solid var(--border2);
  padding:14px 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 2px 16px rgba(0,0,0,0.3);
  padding-top:max(14px,env(safe-area-inset-top));
}
.topbar h1{
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topbar h1 span{
  background:linear-gradient(135deg,var(--accent) 0%,#60b4ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.badge{
  font-size:10px;
  background:linear-gradient(135deg,var(--accent) 0%,#2a7de0 100%);
  color:#fff;padding:4px 10px;border-radius:20px;font-weight:700;letter-spacing:0.3px;
  box-shadow:0 2px 8px rgba(61,142,240,0.3);
}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;overscroll-behavior:contain;}
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.section{display:none;padding:14px 14px 80px;animation:fadeSlideUp 0.25s ease;}
.section.active{display:flex;flex-direction:column;}

/* FILTER TABS */
.filter-row{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{
  flex-shrink:0;padding:8px 14px;border-radius:22px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;letter-spacing:0.1px;
  cursor:pointer;transition:all 0.18s;font-family:'DM Sans',sans-serif;min-height:38px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;scroll-snap-align:start;
  user-select:none;-webkit-user-select:none;
}
.filter-btn:active{transform:scale(0.95);}
.filter-btn.active{
  background:linear-gradient(135deg,var(--accent) 0%,#2a7de0 100%);
  border-color:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(61,142,240,0.35);
}

/* QUIZ HEADER */
.quiz-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.quiz-back-btn{
  display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;
  border:1px solid var(--border2);background:var(--surface);color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.18s;flex-shrink:0;min-height:36px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.quiz-back-btn:hover{color:var(--text);border-color:var(--accent);}
.quiz-back-btn:active{transform:scale(0.95);}
.quiz-q-num{font-size:12px;color:var(--muted);font-weight:600;flex:1;text-align:center;}
.quiz-score-chip{
  font-size:12px;font-weight:700;color:var(--accent2);
  background:var(--accent2-glow);border:1px solid rgba(48,212,160,0.2);
  padding:4px 12px;border-radius:20px;flex-shrink:0;
}
.quiz-progress-bar{height:3px;background:var(--surface2);border-radius:4px;margin-bottom:14px;overflow:hidden;}
.quiz-progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));
  background-size:200% 100%;animation:shimmer 2s linear infinite;
  border-radius:4px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 0 8px rgba(61,142,240,0.4);
}
.quiz-type-badge{font-size:9px;padding:4px 10px;border-radius:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
.quiz-type-badge.tf{background:rgba(240,192,48,0.12);color:var(--yellow);border:1px solid rgba(240,192,48,0.2);}
.quiz-type-badge.mcq{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(61,142,240,0.2);}

/* QUIZ CARD */
.quiz-card{
  background:linear-gradient(160deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:18px 16px;margin-bottom:12px;box-shadow:var(--shadow);
}
.quiz-question{font-size:clamp(14px,3.8vw,16px);line-height:1.65;color:var(--text);margin-bottom:16px;margin-top:10px;font-weight:400;}
.quiz-options{display:flex;flex-direction:column;gap:9px;}
.quiz-opt{
  padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-size:15px;font-weight:400;
  cursor:pointer;text-align:left;transition:all 0.18s;font-family:'DM Sans',sans-serif;
  line-height:1.45;display:flex;align-items:flex-start;gap:10px;
  min-height:52px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.quiz-opt:hover{border-color:var(--accent);background:var(--surface3);}
.quiz-opt:active{opacity:0.85;transform:scale(0.99);}
.quiz-opt.correct{background:rgba(48,212,160,0.1);border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(48,212,160,0.1);}
.quiz-opt.wrong{background:rgba(240,96,96,0.1);border-color:var(--red);color:var(--red);}
.quiz-opt.show-correct{background:rgba(48,212,160,0.07);border-color:var(--green);color:var(--green);}
.quiz-opt .opt-label{font-weight:700;font-size:12px;flex-shrink:0;margin-top:2px;opacity:0.5;}
.quiz-opt.correct .opt-label,.quiz-opt.wrong .opt-label,.quiz-opt.show-correct .opt-label{opacity:1;}
.quiz-opt[disabled]{cursor:default;}
.quiz-opt span:last-child{word-break:break-word;}

/* TF */
.tf-buttons{display:flex;gap:10px;}
.tf-btn{
  flex:1;padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-size:17px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s;min-height:56px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.tf-btn:active{transform:scale(0.97);}
.tf-btn.true-btn:hover{background:rgba(48,212,160,0.1);border-color:var(--green);}
.tf-btn.false-btn:hover{background:rgba(240,96,96,0.1);border-color:var(--red);}
.tf-btn.correct{background:rgba(48,212,160,0.15);border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(48,212,160,0.1);}
.tf-btn.wrong{background:rgba(240,96,96,0.12);border-color:var(--red);color:var(--red);}
.tf-btn[disabled]{cursor:default;}

/* EXPLANATION */
.quiz-explanation{
  margin-top:12px;padding:12px 14px;
  background:var(--accent-glow);border:1px solid rgba(61,142,240,0.18);
  border-radius:var(--radius-sm);font-size:13px;color:var(--text2);
  line-height:1.6;display:none;
}
.quiz-explanation.visible{display:block;animation:fadeSlideUp 0.25s ease both;}
.quiz-explanation strong{color:var(--accent);}

/* NEXT BTN */
.quiz-next-btn{
  width:100%;padding:15px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--accent) 0%,#2a7de0 100%);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;min-height:52px;
  box-shadow:0 4px 18px rgba(61,142,240,0.35);
  transition:opacity 0.18s,transform 0.15s;letter-spacing:0.2px;display:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.quiz-next-btn.visible{display:block;animation:pulseIn 0.3s ease both;}
.quiz-next-btn:active{transform:scale(0.98);opacity:0.9;}

/* START SCREEN */
.quiz-start{text-align:center;padding:12px 0;}
.quiz-start h2{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;
  background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.quiz-start p{color:var(--muted);font-size:13px;margin-bottom:20px;}
.start-options{display:flex;flex-direction:column;gap:9px;max-width:340px;margin:0 auto 16px;}
.start-opt-btn{
  padding:16px 18px;border-radius:var(--radius);border:1px solid var(--border2);
  background:var(--surface);color:var(--text);text-align:left;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;min-height:56px;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.start-opt-btn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);opacity:0;transition:opacity 0.2s;border-radius:3px 0 0 3px;
}
.start-opt-btn:hover{border-color:var(--accent);background:var(--surface2);}
.start-opt-btn:hover::before{opacity:1;}
.start-opt-btn:active{transform:scale(0.98);background:var(--surface2)!important;}
.start-opt-btn .sot{font-size:14px;font-weight:700;display:block;margin-bottom:3px;}
.start-opt-btn .son{font-size:11px;color:var(--muted);}
.start-opt-all{border-color:var(--accent)!important;background:linear-gradient(135deg,rgba(61,142,240,0.1) 0%,rgba(61,142,240,0.05) 100%)!important;}
.start-opt-all::before{opacity:1!important;background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%)!important;}
.start-opt-all .sot{color:var(--accent);}

/* RESULT */
.quiz-result{display:none;text-align:center;padding:28px 16px;}
.quiz-result.visible{display:block;}
.result-score{
  font-family:'Syne',sans-serif;font-size:68px;font-weight:800;line-height:1;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:14px 0 8px;filter:drop-shadow(0 0 20px rgba(61,142,240,0.2));
}
.result-label{font-size:14px;color:var(--muted);margin-bottom:24px;}
.result-stats{display:flex;gap:10px;justify-content:center;margin-bottom:28px;}
.stat-chip{padding:9px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;border:1px solid transparent;}
.stat-chip.green{background:rgba(48,212,160,0.1);color:var(--green);border-color:rgba(48,212,160,0.2);}
.stat-chip.red{background:rgba(240,96,96,0.1);color:var(--red);border-color:rgba(240,96,96,0.2);}
.restart-btn{
  padding:15px 36px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--accent) 0%,#2a7de0 100%);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;box-shadow:0 4px 18px rgba(61,142,240,0.35);
  min-height:52px;transition:transform 0.15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.restart-btn:active{transform:scale(0.97);}

/* CONFIRM MODAL */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;animation:fadeIn 0.2s ease;
}
.confirm-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  padding:28px 24px;max-width:320px;width:100%;text-align:center;
  box-shadow:var(--shadow-lg);animation:scaleIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.confirm-icon{font-size:36px;margin-bottom:14px;}
.confirm-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px;}
.confirm-msg strong{color:var(--text);}
.confirm-btns{display:flex;gap:10px;}
.confirm-no{
  flex:1;padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;min-height:48px;transition:all 0.18s;
}
.confirm-no:hover{border-color:var(--accent);}
.confirm-yes{
  flex:1;padding:13px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--red) 0%,#d04040 100%);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;min-height:48px;
  box-shadow:0 3px 12px rgba(240,96,96,0.3);transition:transform 0.15s;
}
.confirm-yes:active{transform:scale(0.97);}

/* KEYFRAMES */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes countUp{from{opacity:0;transform:scale(0.7) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes pulseIn{0%{opacity:0;transform:scale(0.95) translateY(6px);}60%{transform:scale(1.02) translateY(0);}100%{opacity:1;transform:scale(1) translateY(0);}}

.quiz-result.visible .result-score{animation:countUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;}
.quiz-result.visible .result-stats{animation:fadeSlideUp 0.4s ease 0.3s both;}
.quiz-result.visible .restart-btn{animation:fadeSlideUp 0.4s ease 0.45s both;}
.quiz-options .quiz-opt:nth-child(1){animation:fadeSlideUp 0.2s ease 0.05s both;}
.quiz-options .quiz-opt:nth-child(2){animation:fadeSlideUp 0.2s ease 0.1s both;}
.quiz-options .quiz-opt:nth-child(3){animation:fadeSlideUp 0.2s ease 0.15s both;}
.quiz-options .quiz-opt:nth-child(4){animation:fadeSlideUp 0.2s ease 0.2s both;}
.tf-buttons .tf-btn:nth-child(1){animation:fadeSlideUp 0.2s ease 0.05s both;}
.tf-buttons .tf-btn:nth-child(2){animation:fadeSlideUp 0.2s ease 0.1s both;}

/* MOBILE FIXES */
body{padding-bottom:env(safe-area-inset-bottom);}
button,[role="button"]{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
@media(min-width:540px){body{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);}}
@media(max-width:360px){
  .topbar h1{font-size:15px;}
  .quiz-card{padding:14px 12px;}
  .quiz-opt{padding:11px 12px;font-size:13px;min-height:48px;}
  .tf-btn{font-size:14px;padding:14px;}
  .start-opt-btn{padding:12px 14px;}
  .start-opt-btn .sot{font-size:13px;}
  .result-score{font-size:52px;}
}
@media(min-width:414px){
  .section{padding:16px 16px 80px;}
  .start-options{gap:10px;}
  .quiz-opt{padding:14px 16px;}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>Dental <span>Materials</span></h1>
  <span class="badge">Quiz</span>
</div>

<div class="main">
  <div class="section active" id="section-quiz">

    <!-- Filter tabs -->
    <div class="filter-row" id="quizFilter">
      <button class="filter-btn active" id="btn-cement" onclick="setFilter('cement', this)">🦷 Cement (125)</button>
      <button class="filter-btn" id="btn-amalgam" onclick="setFilter('amalgam', this)">⚗️ Amalgam (80)</button>
      <button class="filter-btn" id="btn-composite" onclick="setFilter('composite', this)">🔬 Composite (70)</button>
      <button class="filter-btn" id="btn-impression" onclick="setFilter('impression', this)">🧪 Impression (50)</button>
      <button class="filter-btn" id="btn-elastic" onclick="setFilter('elastic', this)">🦠 Elastic Imp. (40)</button>
      <button class="filter-btn" id="btn-modeldie" onclick="setFilter('modeldie', this)">🏛️ Model &amp; Die (30)</button>
      <button class="filter-btn" id="btn-investment" onclick="setFilter('investment', this)">🔥 Investment (30)</button>
      <button class="filter-btn" id="btn-waxes" onclick="setFilter('waxes', this)">🕯️ Waxes (30)</button>
      <button class="filter-btn" id="btn-denture" onclick="setFilter('denture', this)">🦷 Denture Base (30)</button>
      <button class="filter-btn" id="btn-casting" onclick="setFilter('casting', this)">⚙️ Casting (55)</button>
      <button class="filter-btn" id="btn-ceramics" onclick="setFilter('ceramics', this)">🏺 Ceramics (60)</button>
    </div>

    <!-- Start Screen -->
    <div id="quizStart" class="quiz-start">
      <h2 id="startTitle">Quiz Mode</h2>
      <p id="startSubtitle">Tap a subject above, then start.</p>
      <div class="start-options">
        <button class="start-opt-btn start-opt-all" id="startAllBtn" onclick="startQuiz('current')">
          <span class="sot" id="startBtnLabel">⚡ Start Cement Quiz</span>
          <span class="son" id="startBtnSub">125 questions — shuffled</span>
        </button>
      </div>
    </div>

    <!-- Active Quiz -->
    <div id="quizActive" style="display:none;">
      <div class="quiz-header">
        <button class="quiz-back-btn" onclick="quizBack()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </button>
        <span class="quiz-q-num" id="qNum">Q1 / 125</span>
        <span class="quiz-score-chip" id="qScore">✓ 0</span>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="qProgress" style="width:0%"></div>
      </div>
      <div class="quiz-card">
        <span class="quiz-type-badge" id="qTypeBadge">T/F</span>
        <p class="quiz-question" id="qQuestion" style="margin-top:10px;">—</p>
        <div class="quiz-options" id="qOptions"></div>
        <div class="quiz-explanation" id="qExplanation"></div>
      </div>
      <button class="quiz-next-btn" id="qNextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>

    <!-- Result Screen -->
    <div id="quizResult" class="quiz-result">
      <p style="color:var(--muted);font-size:13px;">Your Score</p>
      <div class="result-score" id="rScore">0%</div>
      <p class="result-label" id="rLabel">—</p>
      <div class="result-stats">
        <div class="stat-chip green" id="rCorrect">✓ 0 Correct</div>
        <div class="stat-chip red" id="rWrong">✗ 0 Wrong</div>
      </div>
      <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
    </div>

  </div>
</div>

<!-- Confirm Exit Modal -->
<div id="confirmModal" class="confirm-overlay" style="display:none;" onclick="closeConfirm(event)">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <p class="confirm-title">Leave Quiz?</p>
    <p class="confirm-msg">You've answered <strong id="confirmCount">0</strong> questions. Your progress will be lost.</p>
    <div class="confirm-btns">
      <button class="confirm-no" onclick="closeConfirmModal()">Continue</button>
      <button class="confirm-yes" onclick="confirmExit()">Leave</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════

  {type:'mcq',q:'Which of the following accelerates the setting time of ZOE cement?',opts:['Glycerin','Cooling the glass slab','Finer powder particle size','Adding glycol'],ans:2,exp:'Finer powder particle size increases the surface area of ZnO, accelerating the reaction. Cooling and adding glycol/glycerin retard it.'},

  {type:'mcq',q:'What is the recommended total mixing time for zinc phosphate cement?',opts:['30 seconds','1 minute 15 seconds','3 minutes','5 minutes'],ans:1,exp:'Total mixing time = 1 min 15 sec. Each portion of powder is mixed for 15–20 seconds, spread over a large cool glass slab.'},

  {type:'mcq',q:'The compressive strength of zinc phosphate cement is:',opts:['0.7–7 MN/m²','38 MN/m²','55–100 MN/m²','180 MN/m²'],ans:2,exp:'Zinc phosphate compressive strength: 55–100 MN/m². Compare: ZOE = 0.7–7 MN/m², Reinforced ZOE = 38 MN/m², GIC Type II = 150 MPa.'},
  {type:'mcq',q:'Film thickness of zinc phosphate cement is:',opts:['5–10 microns','15–20 microns','25–35 microns','40 microns'],ans:1,exp:'Zinc phosphate film thickness: 15–20 µm (Type I ≤25 µm for luting; Type II medium grain). ZOE has ~40 µm (highest).'},
  {type:'mcq',q:'According to ADA spec No.96, Zinc Phosphate Type I is:',opts:['Medium grain for luting and filling','Fine grain for luting (film ≤ 25 µm)','Coarse grain for bases','Fine grain for luting (film ≤ 40 µm)'],ans:1,exp:'Type I = fine grain for luting, film thickness ≤25 µm. Type II = medium grain for luting and filling (higher compressive strength).'},
  {type:'mcq',q:'Which of the following is a disadvantage of zinc phosphate cement?',opts:['Low compressive strength','High film thickness','Lack of adhesion to tooth structure → marginal leakage','Inhibits polymerization of composites'],ans:2,exp:'Key disadvantage: no chemical adhesion to tooth structure (only mechanical interlocking) → marginal leakage → secondary caries risk.'},
  {type:'mcq',q:'Zinc phosphate cement is classified according to its setting reaction as:',opts:['Polymerization reaction','Acid-base reaction','Dual-cured','Tricure'],ans:1,exp:'Zinc phosphate sets via an acid-base reaction: ZnO (base powder) + H₃PO₄ (acid liquid) → amorphous zinc phosphate.'},
  {type:'mcq',q:'Which cement is specifically used to protect the pulp from the initial acidity of zinc phosphate cement?',opts:['Silicate cement','ZOE or calcium hydroxide lining','EBA cement','Glass ionomer'],ans:1,exp:'ZOE or Ca(OH)₂ liner is placed in deep cavities before zinc phosphate cementation to protect the pulp from the low initial pH (1.6–3.6).'},

/* ═══════════════════════════════════════════════

   Dr. Asma Ghoul | 2025–2026
═══════════════════════════════════════════════ */
const CEMENT3 = [
  // TRUE / FALSE (20)
  {type:'tf',q:'Light-cured GIC was developed because conventional GIC had moisture sensitivity and low early strength.',ans:true,exp:'True — conventional GIC\'s moisture sensitivity and weak early strength drove the development of light-cured (resin-modified) GIC, which adds HEMA for rapid light-cure setting.'},
  {type:'tf',q:'The resin component added to Light-cured GIC is called HEMA (2-hydroxyethyl methacrylate).',ans:true,exp:'True — HEMA (2-hydroxyethyl methacrylate) is the polymerizable resin monomer added to conventional GIC to allow light-cured setting.'},
  {type:'tf',q:'Light-cured GIC sets by a single acid-base reaction only.',ans:false,exp:'False — it sets by a DUAL-CURE process: the initial set is by light-activated polymerization of HEMA, followed by the slower acid-base reaction (like conventional GIC).'},
  {type:'tf',q:'Light-cured GIC has better mechanical strength and wear resistance than conventional composite resins.',ans:false,exp:'False — light-cured GIC has LOWER fracture toughness and wear resistance than composite resins. This is why it is not used in high stress-bearing areas.'},
  {type:'tf',q:'Compomers are formulated with water as part of their composition.',ans:false,exp:'False — compomers are ANHYDROUS (contain no water). This distinguishes them from GICs. Water is absorbed from the oral environment post-placement to trigger the secondary reaction.'},
  {type:'tf',q:'The primary setting of compomers occurs through a light-cured free radical polymerization reaction.',ans:true,exp:'True — the primary setting is rapid light-cured free radical polymerization (like composite resins). The secondary acid-base reaction occurs later via water uptake.'},
  {type:'tf',q:'Compomers can chemically bond to tooth structure without the use of a bonding agent.',ans:false,exp:'False — compomers require acid etching and a bonding agent, similar to composite resins. They have no self-adhesive property despite containing polyacid groups.'},
  {type:'tf',q:'Compomers release more fluoride than conventional glass ionomer cements.',ans:false,exp:'False — compomers release LESS fluoride than GICs. Their fluoride release relies on the slow secondary acid-base reaction triggered by water uptake from saliva.'},
  {type:'tf',q:'The secondary setting reaction of compomers is triggered by water absorbed from the oral environment.',ans:true,exp:'True — after light-cured primary setting, water uptake from saliva triggers a slow acid-base reaction between acidic resin groups and glass filler, responsible for sustained fluoride release.'},
  {type:'tf',q:'Giomers contain Surface Pre-Reacted Glass-Ionomer (S-PRG) filler particles.',ans:true,exp:'True — S-PRG (Surface Pre-Reacted Glass-Ionomer) fillers are the defining characteristic of giomers. They are pre-reacted before incorporation into the resin matrix.'},
  {type:'tf',q:'Giomers set through an acid-base reaction, similar to conventional GIC.',ans:false,exp:'False — giomers set via LIGHT-ACTIVATED free radical polymerization, like composite resins. The S-PRG fillers are pre-reacted, so no acid-base reaction occurs during setting.'},
  {type:'tf',q:'Giomers can recharge with fluoride from external sources such as toothpaste.',ans:true,exp:'True — the S-PRG filler acts as a fluoride reservoir that can RECHARGE from external fluoride sources. This is the major advantage of giomers over compomers.'},
  {type:'tf',q:'Giomers are more sensitive to moisture during setting than conventional GICs.',ans:false,exp:'False — giomers are LESS sensitive to moisture than GICs because they set by light-cured polymerization, not an acid-base reaction that requires controlled moisture conditions.'},
  {type:'tf',q:'MTA was given FDA approval for endodontic use in 1998.',ans:true,exp:'True — MTA (Mineral Trioxide Aggregate) received FDA approval for endodontic use in 1998, following initial research by Torabinejad and colleagues.'},
  {type:'tf',q:'MTA requires a completely dry environment to set properly.',ans:false,exp:'False — MTA is HYDROPHILIC and sets WELL in the presence of moisture. This is one of its key clinical advantages, especially for root-end procedures in moist surgical fields.'},
  {type:'tf',q:'The initial pH of set MTA is approximately 12.5, making it highly alkaline.',ans:true,exp:'True — set MTA has pH ≈ 12.5, which contributes to its antimicrobial effect by creating an environment hostile to bacterial growth.'},
  {type:'tf',q:'MTA has a short setting time of approximately 10–15 minutes.',ans:false,exp:'False — MTA has a LONG setting time of 3–4 HOURS, which is a significant clinical disadvantage. The patient cannot bite on the restoration immediately.'},
  {type:'tf',q:'Gray MTA can cause grayish darkening (discoloration) of the tooth crown.',ans:true,exp:'True — gray MTA contains bismuth oxide and other components that can cause grayish discoloration, particularly in anterior teeth. White MTA was developed to reduce this.'},
  {type:'tf',q:'MTA stimulates the formation of hard tissue such as cementum and bone-like tissue.',ans:true,exp:'True — MTA\'s bioactivity stimulates odontoblasts and cementoblasts to form cementum and bone-like tissue. This makes it ideal for pulp capping and apexification.'},
  {type:'tf',q:'MTA and calcium hydroxide have identical clinical applications and properties.',ans:false,exp:'False — MTA is superior in sealing ability, hard tissue formation, and moisture tolerance. Ca(OH)₂ does not set reliably in moisture and has inferior marginal seal.'},
  // MCQ (25)
  {type:'mcq',q:'Which of the following best describes the setting reaction of Light-Cured GIC?',opts:['Acid-base reaction only','Light-activated polymerization only','Dual-cure: acid-base + light-activated polymerization','Hydration reaction with water'],ans:2,exp:'Light-cured GIC (RMGIC) has a DUAL-CURE mechanism: primary set by light-activated polymerization of HEMA, and a secondary slower acid-base reaction (like conventional GIC).'},
  {type:'mcq',q:'The resin component in Light-Cured GIC that may cause hypersensitivity reactions is:',opts:['Bis-GMA','HEMA (2-hydroxyethyl methacrylate)','Camphorquinone','Polyacrylic acid'],ans:1,exp:'HEMA can cause allergic contact hypersensitivity reactions in sensitized individuals. This is a documented disadvantage of light-cured GIC compared to conventional GIC.'},
  {type:'mcq',q:'Which of the following is a disadvantage of Light-Cured GIC compared to conventional composite resins?',opts:['Lower fluoride release','No adhesion to tooth structure','Lower fracture toughness and wear resistance','Longer setting time'],ans:2,exp:'Despite improved properties over conventional GIC, light-cured GIC still has lower fracture toughness and wear resistance than composite resins, limiting its use in stress-bearing areas.'},
  {type:'mcq',q:'Compomers are best described as:',opts:['Glass ionomer cements modified with resin','Polyacid-modified composite resins','Resin-modified glass ionomer cements','Metal-modified glass ionomer cements'],ans:1,exp:'Compomers = POlyacid-Modified cOMPOsites (COMPOMER). They are primarily composite resins with polyacid-modified monomers and fluoroaluminosilicate glass added. NOT the same as RMGIC.'},
  {type:'mcq',q:'Which component of compomers is responsible for fluoride release?',opts:['Acid-modified dimethacrylate monomers','Photo-initiator systems','Reactive fluoroaluminosilicate glass filler','Bis-GMA resin matrix'],ans:2,exp:'Reactive fluoroaluminosilicate glass filler is the source of fluoride in compomers. After water uptake, the secondary acid-base reaction releases fluoride from this glass.'},
  {type:'mcq',q:'The PRIMARY setting reaction of compomers involves:',opts:['Slow acid-base reaction triggered by water absorption','Rapid light-cured free radical polymerization','Dual-cure acid-base and polymerization simultaneously','Hydration reaction similar to MTA'],ans:1,exp:'Primary setting = rapid light-cured free radical polymerization (gives initial hardness). Secondary setting = slow acid-base reaction after water uptake (provides sustained fluoride release).'},
  {type:'mcq',q:'Which of the following is a disadvantage UNIQUE to compomers compared to GICs?',opts:['Lower mechanical strength','No self-adhesion — requires bonding agent','Higher moisture sensitivity','Shorter working time'],ans:1,exp:'Unlike GICs (which self-adhere via chemical bonding), compomers require acid etching and bonding agents. This is their unique disadvantage compared to GICs.'},
  {type:'mcq',q:'Compomers are most commonly supplied as:',opts:['Powder and liquid system','Two-paste system','Single-paste in unit-dose compules or syringes for light-curing','Capsules for mechanical mixing'],ans:2,exp:'Compomers are supplied as single-paste in unit-dose compules (Compoglass, Dyract) or syringes, activated by light curing — similar to composite resin supply forms.'},
  {type:'mcq',q:'The key feature that distinguishes Giomers from all other resin-based materials is:',opts:['Use of bis-GMA resin matrix','Light-activated polymerization','S-PRG (Surface Pre-Reacted Glass-Ionomer) filler particles','Fluoride release without recharge'],ans:2,exp:'S-PRG (Surface Pre-Reacted Glass-Ionomer) fillers are the unique defining feature of giomers. No other resin-based material uses pre-reacted glass-ionomer filler particles.'},
  {type:'mcq',q:'S-PRG filler particles in Giomers are created by:',opts:['Mixing glass powder with polyacrylic acid during placement','Pre-reacting fluoroaluminosilicate glass with polyacrylic acid in the presence of water','Adding fluoride salts directly to bis-GMA resin','Bonding silver particles to glass powder'],ans:1,exp:'S-PRG particles are formed BEFORE incorporation into the resin matrix by pre-reacting fluoroaluminosilicate glass with polyacrylic acid + water. This creates a stable glass-ionomer surface layer.'},
  {type:'mcq',q:'How does Giomer\'s fluoride behavior differ from that of Compomers?',opts:['Giomers release less fluoride than compomers','Giomers cannot release fluoride at all','Giomers release fluoride AND can recharge from external fluoride sources; compomers cannot recharge','Both release the same amount of fluoride'],ans:2,exp:'Key difference: Giomers release fluoride AND can RECHARGE from toothpaste/fluoride varnish (S-PRG reservoir). Compomers release fluoride via water-triggered acid-base reaction but CANNOT recharge.'},
  {type:'mcq',q:'The acid neutralization property of Giomers means that they:',opts:['React with and destroy bacterial acids, raising the surrounding pH','Neutralize the phosphoric acid used during etching','React with saliva to form a protective coating','Release hydroxide ions that damage enamel'],ans:0,exp:'Giomers neutralize bacterial acids produced in plaque by raising the surrounding pH — an anti-caries mechanism distinct from simple fluoride release.'},
  {type:'mcq',q:'Compared to conventional GICs, Giomers are:',opts:['More sensitive to moisture during setting','Less sensitive to moisture and have better aesthetics','Unable to release fluoride','Weaker mechanically'],ans:1,exp:'Giomers are LESS moisture-sensitive (light-cured polymerization, no acid-base reaction during setting) and have BETTER aesthetics than conventional GIC.'},
  {type:'mcq',q:'The main disadvantage of Giomers compared to pure composite resins is:',opts:['They require a bonding agent','Lower mechanical strength — not suitable for high stress areas','They do not release fluoride','They cannot be light-cured'],ans:1,exp:'Despite S-PRG filler advantages, giomers have lower mechanical strength than pure composites, limiting their use to low stress-bearing areas.'},
  {type:'mcq',q:'MTA is primarily composed of the same main components as:',opts:['Zinc phosphate cement','Portland cement','Glass ionomer cement','Calcium hydroxide cement'],ans:1,exp:'MTA is composed of tricalcium silicate, dicalcium silicate, tricalcium aluminate, and gypsum — essentially Portland cement purified to medical grade, with bismuth oxide added for radiopacity.'},
  {type:'mcq',q:'Which component of MTA makes it visible on dental X-rays?',opts:['Tricalcium silicate','Gypsum (calcium sulphate)','Bismuth oxide (radiopacifier)','Tricalcium aluminate'],ans:2,exp:'Bismuth oxide (Bi₂O₃) is added to MTA as a radiopacifier, making it visible on dental radiographs for clinical verification of placement.'},
  {type:'mcq',q:'The setting reaction of MTA is best described as:',opts:['Acid-base reaction','Light-activated polymerization','Hydration reaction when mixed with sterile water','Free radical polymerization'],ans:2,exp:'MTA sets by a HYDRATION reaction when mixed with sterile water (or physiological saline). This is similar to the setting of Portland cement.'},
  {type:'mcq',q:'The high alkaline pH of set MTA (~12.5) provides which of the following benefits?',opts:['Improves adhesion to dentine','Creates an antimicrobial environment hostile to bacterial growth','Accelerates the setting reaction','Reduces tooth discoloration'],ans:1,exp:'pH ≈ 12.5 creates a highly alkaline environment that is hostile to bacterial growth — an important property for sealing infected root canals and perforations.'},
  {type:'mcq',q:'MTA is considered IDEAL for root-end surgeries because:',opts:['It sets very quickly in 5 minutes','It bonds chemically to dentine','It is hydrophilic and sets well in the presence of moisture','It does not cause any tooth discoloration'],ans:2,exp:'Root-end surgery (apicoectomy) involves a moist surgical environment. MTA\'s hydrophilic nature means it sets BETTER in moisture — a critical advantage over most other materials.'},
  {type:'mcq',q:'Which of the following is NOT a clinical application of MTA?',opts:['Pulpotomy dressing','Apexification','Cementation of orthodontic brackets','Repair of root perforations'],ans:2,exp:'MTA applications: pulpotomy, pulp capping, apexification, root perforation repair, root-end filling (apicoectomy). It is NOT used for orthodontic bracket cementation.'},
  {type:'mcq',q:'The typical setting time of MTA is:',opts:['5–10 minutes','30–45 minutes','3–4 hours','24 hours'],ans:2,exp:'MTA setting time = 3–4 HOURS. This is a major clinical disadvantage, as it prevents immediate loading or restoration placement.'},
  {type:'mcq',q:'MTA stimulates the formation of hard tissue by activating:',opts:['Fibroblasts and epithelial cells','Odontoblasts or cementoblasts to lay down a hard tissue barrier','Osteoclasts to remodel bone','Inflammatory cells to seal the tissue'],ans:1,exp:'MTA\'s bioactivity stimulates odontoblasts (to form dentine-like tissue) or cementoblasts (to form cementum). This promotes hard tissue barrier formation ideal for pulp capping and apexification.'},
  {type:'mcq',q:'Which material would be MOST appropriate for repairing a root perforation in a moist environment?',opts:['Zinc phosphate cement','Glass ionomer cement','MTA','Calcium hydroxide cement'],ans:2,exp:'MTA is the material of choice for root perforation repair because: (1) it is hydrophilic and sets in moisture, (2) superior sealing ability, (3) biocompatible and bioactive.'},
  {type:'mcq',q:'Which of the following materials has the BEST ability to continuously recharge with fluoride from the oral environment?',opts:['Conventional GIC','Compomer','Giomer','Light-cured GIC'],ans:2,exp:'Giomers — S-PRG fillers act as a fluoride reservoir that continuously releases fluoride AND recharges from external sources (toothpaste, fluoride varnish). No other material matches this behavior.'},
  {type:'mcq',q:'The process of apexification using MTA involves:',opts:['Sealing a lateral root perforation with MTA','Inducing a calcified barrier in a non-vital immature tooth with an open apex','Filling the root canal completely in a vital tooth','Removing the radicular pulp in a primary tooth'],ans:1,exp:'Apexification = inducing formation of a calcified apical barrier (or artificial barrier with MTA) in a non-vital immature tooth with an open/blunderbuss apex.'},
];

/* ═══════════════════════════════════════════════
   IMPRESSION DATA
═══════════════════════════════════════════════ */
const IMPRESSION = [
  // ─── True / False (25) ───
  {type:'tf',q:'The function of an impression material is to accurately record the dimension of oral tissues and their related structures.',ans:true,exp:'TRUE — The impression material records oral tissue dimensions accurately, which is then used to pour a positive model (cast) for construction of dental prostheses and restorations.'},
  {type:'tf',q:'The impression gives a positive reproduction of oral tissues.',ans:false,exp:'FALSE — The impression gives a NEGATIVE reproduction. The POSITIVE reproduction is obtained by pouring dental stone or plaster into the impression to create a model/cast.'},
  {type:'tf',q:'Non-elastic impression materials can be used in areas where undercuts are present.',ans:false,exp:'FALSE — Non-elastic materials are RESTRICTED to areas with NO undercuts. In the presence of undercuts, rigid materials fracture or permanently distort on removal from the mouth.'},
  {type:'tf',q:'Impression plaster is supplied as a powder that sets as a result of a hydration reaction when mixed with water.',ans:true,exp:'TRUE — Impression plaster (calcium sulphate hemihydrate) + water → hydration reaction → calcium sulphate dihydrate (the set product). This is an irreversible chemical reaction.'},
  {type:'tf',q:'The chief constituent of impression plaster is calcium sulphate dihydrate.',ans:false,exp:'FALSE — The chief constituent of impression plaster is Calcium Sulphate HEMIHYDRATE (CaSO₄·½H₂O). Dihydrate (CaSO₄·2H₂O) is the SET PRODUCT formed after the hydration reaction.'},
  {type:'tf',q:'Potassium sulphate is added to impression plaster to slow down the setting process.',ans:false,exp:'FALSE — Potassium sulphate (K₂SO₄) ACCELERATES setting and adjusts dimensional change to +0.06%. BORAX is added to SLOW setting down (retarder).'},
  {type:'tf',q:'Materials containing starch added to impression plaster are called soluble plasters.',ans:true,exp:'TRUE — "Soluble plasters" contain starch. The starch swells in boiling water, causing the plaster to disintegrate and facilitating easy removal of the impression from the cast model.'},
  {type:'tf',q:'Impression plaster fractures on removal from the mouth when undercuts are present.',ans:true,exp:'TRUE — Impression plaster is rigid (non-elastic). If undercuts are present, the locked material cannot flex on removal and will fracture, making it unsuitable for dentulous arches with retentive areas.'},
  {type:'tf',q:'Impression compound is a thermoplastic material, meaning it softens when heated and hardens when cooled without a chemical reaction.',ans:true,exp:'TRUE — Impression compound is thermoplastic: physical softening on heating, physical hardening on cooling. No chemical reaction occurs — it can be repeatedly reheated and resoftened (reversible process).'},
  {type:'tf',q:'The setting process of impression compound is irreversible.',ans:false,exp:'FALSE — The process is REVERSIBLE. Impression compound hardens by physical cooling only, so it can be resoftened by reheating. This distinguishes it from chemically-setting materials like ZOE or plaster.'},
  {type:'tf',q:'Impression compound has a low coefficient of thermal expansion, resulting in minimal shrinkage on cooling.',ans:false,exp:'FALSE — Impression compound has a HIGH coefficient of thermal expansion, causing CONSIDERABLE shrinkage of approximately 1.5% by volume on cooling — a significant source of inaccuracy.'},
  {type:'tf',q:'For prosthetic impressions, dental compound is heated in a water bath at 55–60°C.',ans:true,exp:'TRUE — Water bath at 55–60°C is used to heat compound for prosthetic (full arch) impressions. Type 1 (low-fusing) compound for inlays/copper bands is softened using a flame or hotter water.'},
  {type:'tf',q:'If impression compound is kneaded in the water bath, the water will act as a plasticizer when incorporated into the material.',ans:true,exp:'TRUE — Water incorporated during kneading acts as a plasticizer, softening the compound further. However, excessive water incorporation can weaken the material and affect its properties.'},
  {type:'tf',q:'Impression compound has high thermal conductivity, requiring only brief immersion in the water bath.',ans:false,exp:'FALSE — Compound has LOW thermal conductivity. Heat penetrates slowly, so SUFFICIENT TIME of immersion is required to ensure the material is uniformly softened throughout its bulk.'},
  {type:'tf',q:'A compound impression should be cast within one hour after making the impression to avoid warpage and distortion.',ans:true,exp:'TRUE — Compound undergoes slow plastic flow (warpage) over time due to stress relaxation. Casting within one hour minimizes dimensional change from this delayed distortion.'},
  {type:'tf',q:'Zinc oxide-eugenol impression material is supplied as a single paste in a collapsible tube.',ans:false,exp:'FALSE — ZOE is supplied as TWO pastes in separate collapsible tubes: Paste 1 contains zinc oxide; Paste 2 contains eugenol. They are mixed together on a paper pad to initiate the chemical setting reaction.'},
  {type:'tf',q:'The setting reaction of zinc oxide-eugenol results in the formation of zinc eugenolate.',ans:true,exp:'TRUE — The chemical reaction between ZnO and eugenol produces amorphous zinc eugenolate (a chelate compound) as the matrix. Unreacted ZnO particles are embedded within this matrix.'},
  {type:'tf',q:'Water is not necessary for zinc oxide-eugenol to set.',ans:false,exp:'FALSE — Water IS necessary for ZOE to set. Manufacturers incorporate several percent of water into the components. Water acts as the reaction catalyst — without it, the setting reaction would not proceed.'},
  {type:'tf',q:'Zinc oxide-eugenol impression paste sets more quickly in thin sections than in thick sections.',ans:true,exp:'TRUE — In thin sections, heat dissipates more rapidly from the surface, which paradoxically accelerates the exothermic ZOE setting reaction. Thin wash impressions therefore set faster.'},
  {type:'tf',q:'Zinc oxide-eugenol impression material is sufficiently fluid to record fine details in the mouth.',ans:true,exp:'TRUE — ZOE impression paste is sufficiently fluid to flow into fine details and surface irregularities, making it very accurate. This is a key advantage over impression compound.'},
  {type:'tf',q:'Zinc oxide-eugenol is an elastic impression material and can record undercuts without distortion.',ans:false,exp:'FALSE — ZOE is NON-ELASTIC (rigid) and CANNOT record undercuts. Like all rigid impression materials, it must be used only in areas without undercuts, or it will fracture/distort on removal.'},
  {type:'tf',q:'Eugenol in zinc oxide-eugenol impression pastes can cause irritation and burning sensation in some patients.',ans:true,exp:'TRUE — Eugenol is a tissue irritant. It can cause tingling, burning sensation, and even tissue necrosis in sensitive patients. Eugenol-free ZOE formulations are available for sensitive patients.'},
  {type:'tf',q:'Impression waxes set by a chemical reaction, unlike zinc oxide-eugenol pastes.',ans:false,exp:'FALSE — This is reversed. Impression WAXES are THERMOPLASTIC (no chemical reaction). ZOE sets by a CHEMICAL reaction (ZnO + eugenol → zinc eugenolate). Waxes simply solidify on cooling.'},
  {type:'tf',q:'A model should be cast immediately from a wax impression to avoid distortion.',ans:true,exp:'TRUE — Wax impressions are thermoplastic and subject to stress relaxation and flow at room temperature. Immediate casting minimizes distortion from slow plastic deformation under residual stresses.'},
  {type:'tf',q:'Agar hydrocolloid and alginate are classified as elastic impression materials.',ans:true,exp:'TRUE — Both agar hydrocolloid and alginate are hydrocolloids classified as ELASTIC impression materials. They can flex on removal from undercuts and return to their original shape without permanent distortion.'},
  // ─── MCQ (25) ───
  {type:'mcq',q:'The function of impression material is to transfer accurate dimensions of the teeth to the:',opts:['Impression tray','Surrounding tissues','Model','Patient'],ans:2,exp:'The impression records oral tissue dimensions (negative), and a positive model is then poured into it. The model is used to fabricate dental prostheses and restorations.'},
  {type:'mcq',q:'Which of the following is classified as a non-elastic (rigid) impression material?',opts:['Agar hydrocolloid','Impression plaster','Silicone impression','Alginate hydrocolloid'],ans:1,exp:'Impression plaster is rigid/non-elastic — it fractures rather than flexing when removed from undercuts. Agar, silicone, and alginate are all elastic materials that can flex on removal.'},
  {type:'mcq',q:'The following impression materials are non-elastic EXCEPT:',opts:['Impression plaster','Impression compound','Wax impression','Agar-Agar'],ans:3,exp:'Agar-Agar (agar hydrocolloid) is an ELASTIC impression material — it can be removed from undercuts without permanent distortion. Plaster, compound, and wax are all rigid/non-elastic.'},
  {type:'mcq',q:'The following are thermoplastic impression materials EXCEPT:',opts:['Agar-Agar','Impression compound','Wax impression','All of the above'],ans:0,exp:'Agar-Agar is NOT thermoplastic. It sets by a physical sol-gel transition (temperature-controlled gel formation), not by thermoplastic hardening. Compound and wax are true thermoplastic materials.'},
  {type:'mcq',q:'The chief constituent of impression plaster is:',opts:['Calcium sulphate dihydrate','Calcium sulphate hemihydrate','Potassium sulphate','Zinc oxide'],ans:1,exp:'Calcium sulphate hemihydrate (CaSO₄·½H₂O) is the main ingredient of impression plaster. It reacts with water (hydration reaction) to form calcium sulphate dihydrate — the set, hard product.'},
  {type:'mcq',q:'Potassium sulphate is added to impression plaster to:',opts:['Slow down the setting reaction','Improve cohesive properties','Adjust the setting time to 3–5 minutes','Act as a coloring agent'],ans:2,exp:'Potassium sulphate is an accelerator that adjusts setting time to 3–5 minutes and controls dimensional change to +0.06%. Borax (not potassium sulphate) is the retarder used to slow setting.'},
  {type:'mcq',q:'Starch is added to impression plaster materials to:',opts:['Adjust setting time','Adjust dimensional change during setting','Easy manipulation','Facilitate removal of impression from the cast model'],ans:3,exp:'Starch swells in boiling water, causing the impression plaster to disintegrate and fragment. This allows easy separation of the impression from the poured stone cast model — hence the name "soluble plaster".'},
  {type:'mcq',q:'Which impression material causes dryness in the patient\'s mouth?',opts:['Zinc oxide-eugenol impression','Impression compound','Alginate impression','Impression plaster'],ans:3,exp:'Impression plaster produces a dry sensation in the patient\'s mouth. It is non-toxic but absorbs moisture from oral tissues and saliva during setting, creating this characteristic dry feeling.'},
  {type:'mcq',q:'The following material is dimensionally stable after setting:',opts:['Alginate','Impression compound','Wax impression','Zinc oxide-eugenol'],ans:3,exp:'ZOE has little or no dimensional change after setting and is stable in the laboratory environment. In contrast: alginate shrinks on dehydration, compound has thermal shrinkage, and wax flows under stress.'},
  {type:'mcq',q:'Impression compound has which of the following thermal properties?',opts:['Low coefficient of thermal expansion','High coefficient of thermal expansion','Same thermal expansion as tooth structure','No thermal changes during setting'],ans:1,exp:'Impression compound has a HIGH coefficient of thermal expansion, causing considerable volumetric shrinkage (~1.5%) on cooling from mouth temperature to room temperature — a key source of dimensional inaccuracy.'},
  {type:'mcq',q:'The thermal conductivity of impression compound is:',opts:['High','Very high','Low','Same as enamel'],ans:2,exp:'Impression compound has LOW thermal conductivity. Heat penetrates slowly through the bulk of the material, necessitating sufficient immersion time in the water bath for complete, uniform softening.'},
  {type:'mcq',q:'Heat application is needed for the manipulation of which material?',opts:['Zinc oxide-eugenol impression','Impression plaster','Alginate hydrocolloid','Impression compound'],ans:3,exp:'Impression compound is thermoplastic and MUST be heated to soften before use. It is heated in a water bath (55–60°C for Type 2) or flame (Type 1). ZOE, plaster, and alginate are all mixed at room temperature.'},
  {type:'mcq',q:'The following material can be used as a secondary impression for edentulous patients:',opts:['Alginate impression','Impression plaster','Impression compound','Zinc oxide-eugenol'],ans:3,exp:'ZOE is used as a wash (secondary/final) impression in a compound or special tray for edentulous patients. Applied 2–3 mm thick, it records fine mucosal detail and is dimensionally stable after setting.'},
  {type:'mcq',q:'Which of the following statements about zinc oxide-eugenol impression material is TRUE?',opts:['It can be used as preliminary impression of dentulous arches','It sets by a physical reaction','It is a muco-static impression material','It cannot be used as bite registration paste'],ans:2,exp:'ZOE is muco-static — it records tissues in their resting, undisplaced state. It sets by CHEMICAL reaction (not physical). It cannot be used in dentulous arches (no undercut tolerance) but CAN be used as bite registration.'},
  {type:'mcq',q:'The zinc oxide-eugenol impression paste sets quickly in which section?',opts:['Thick section','Very thick section','Thin section','All sections equally'],ans:2,exp:'ZOE sets faster in THIN sections. In thin areas, heat generated by the exothermic reaction dissipates more quickly, creating favorable conditions for the reaction to proceed faster than in thick sections.'},
  {type:'mcq',q:'Which material is used to coat the patient\'s lips before taking a zinc oxide-eugenol impression?',opts:['Alginate mould seal','Soap solution','Petroleum jelly','Zinc acetate'],ans:2,exp:'Petroleum jelly (Vaseline) is applied to protect the patient\'s lips and surrounding soft tissues before taking a ZOE impression. ZOE paste is adhesive and eugenol can cause tissue irritation if direct contact occurs.'},
  {type:'mcq',q:'Which of the following increases the setting time of zinc oxide-eugenol impression paste?',opts:['Presence of water','Increase in temperature','Decrease in temperature','Addition of zinc acetate'],ans:2,exp:'DECREASE in temperature slows the ZOE setting reaction (longer setting time). Water, increased temperature, and zinc acetate all ACCELERATE setting (decrease setting time).'},
  {type:'mcq',q:'Regarding accuracy of zinc oxide-eugenol impression materials, which is correct?',opts:['They are not sufficiently fluid to record fine surface detail','They are inaccurate because they are too viscous','They are very accurate as they are sufficiently fluid to record fine detail in the mouth','They have the same accuracy as impression compound'],ans:2,exp:'ZOE is very accurate — it is sufficiently fluid to flow into fine surface details and mucosal irregularities. This is one of its main advantages over impression compound, which is too viscous for fine detail recording.'},
  {type:'mcq',q:'Which of the following impression materials has high coefficient of thermal expansion?',opts:['Alginate impression','Impression plaster','Impression compound','Zinc oxide-eugenol impression'],ans:2,exp:'Impression compound has HIGH thermal expansion coefficient → considerable shrinkage (~1.5% volume) on cooling. ZOE and plaster have minimal dimensional change. Alginate changes due to water content, not thermal expansion.'},
  {type:'mcq',q:'The setting reaction of ZOE produces which end product as the matrix?',opts:['Zinc hydroxide','Zinc acetate','Zinc eugenolate (chelate)','Calcium zinc eugenolate'],ans:2,exp:'ZnO + eugenol + water → amorphous zinc eugenolate (chelate compound). This zinc eugenolate matrix holds together the unreacted ZnO particles. The chelate structure gives ZOE its rigid set.'},
  {type:'mcq',q:'Impression compound Type 1 (low fusing) is supplied in which forms for copper band impressions?',opts:['Sheets 4–5mm thick','Powder and liquid','Sticks and cones','Two pastes in collapsible tubes'],ans:2,exp:'Type 1 low-fusing compound (for individual impressions, copper bands, inlays, crowns) is supplied as sticks and cones. Type 2 (for full arch prosthetic impressions) is supplied as sheets 4–5mm thick.'},
  {type:'mcq',q:'Which separating agent is applied to a plaster impression before casting a stone model?',opts:['Zinc acetate','Alginate mould seal or soap solution','Petroleum jelly','Potassium sulphate'],ans:1,exp:'Alginate mould seal or soap solution is applied to impression plaster before pouring the stone model. This prevents chemical adhesion and intermixing between the impression plaster and the dental stone cast.'},
  {type:'mcq',q:'Which of the following impression materials is classified as elastic?',opts:['Impression plaster','Dental compound','Zinc oxide-eugenol','Polysulphide rubber'],ans:3,exp:'Polysulphide rubber is an elastomeric (elastic) impression material — it returns to its original shape after flexing over undercuts. Plaster, compound, and ZOE are all rigid/non-elastic materials.'},
  {type:'mcq',q:'Which of the following causes a burning sensation and irritation in the patient\'s mouth?',opts:['Impression compound','Alginate impression','Zinc oxide-eugenol impression','Impression plaster'],ans:2,exp:'Eugenol in ZOE impression paste is a tissue irritant. It can cause tingling, burning sensation, and potential soft tissue damage in sensitive patients. Eugenol-free alternatives are available for these patients.'},
  {type:'mcq',q:'Impression waxes differ from impression compound mainly because they:',opts:['Set by a chemical reaction','Can sometimes flow at mouth temperature','Are more accurate than compound','Require a water bath for softening'],ans:1,exp:'Waxes can flow and deform at mouth temperature (37°C), making them thermally unstable in the oral environment. Compound is more stable at mouth temperature. Neither sets by chemical reaction — both are thermoplastic.'},
];

/* ═══════════════════════════════════════════════
   COMPOSITE DATA

const COMPOSITE = [
  // ─── QUIZ 1: History · Composition · Matrix · Filler Classification ───
  // True/False (15)
  {type:'tf',q:'Silicate cement (1878) was the first tooth-colored restorative material used in dentistry.',ans:true,exp:'TRUE — Silicate cement (introduced 1878) was the first tooth-colored restorative material. It was later abandoned due to solubility in oral fluids, surface crazing, and poor mechanical properties.'},
  {type:'tf',q:'Silicate cements were abandoned due to poor esthetics and inability to match tooth color.',ans:false,exp:'FALSE — Silicate cements were abandoned due to solubility problems, surface crazing, loss of translucency, and poor mechanical properties — NOT because of poor esthetics.'},
  {type:'tf',q:'Acrylic resins (1940s) failed clinically mainly because of high polymerization shrinkage and poor abrasion resistance.',ans:true,exp:'TRUE — Acrylic resins failed due to: high polymerization shrinkage, poor abrasion resistance, and high thermal expansion coefficient — all leading to clinical failure.'},
  {type:'tf',q:'Composite resins were introduced in 1962 and offered lower thermal expansion and better wear resistance than acrylic resins.',ans:true,exp:'TRUE — Composite resins (introduced 1962 by Bowen) offered significant improvements: lower thermal expansion, better wear resistance, and reduced polymerization shrinkage compared to acrylic resins.'},
  {type:'tf',q:'A composite material is defined as a physical mixture of two or more chemically IDENTICAL materials.',ans:false,exp:'FALSE — A composite material consists of at least two chemically DIFFERENT materials combined with a distinct interface between them. This interface (coupling agent) is critical for stress transfer.'},
  {type:'tf',q:'The organic matrix phase of composite resin is responsible for polymerization shrinkage.',ans:true,exp:'TRUE — The organic matrix (BIS-GMA, UDMA, TEGDMA) undergoes polymerization, causing shrinkage. More matrix = more shrinkage. Increasing filler loading reduces shrinkage by reducing matrix volume.'},
  {type:'tf',q:'BIS-GMA has HIGHER polymerization shrinkage than MMA due to its high molecular weight.',ans:false,exp:'FALSE — BIS-GMA has LOWER polymerization shrinkage than MMA precisely because of its high molecular weight and fewer available double bonds per unit volume.'},
  {type:'tf',q:'Diluents such as TEGDMA are added to composite resin to reduce the overall viscosity of the oligomer.',ans:true,exp:'TRUE — BIS-GMA/UDMA oligomers have high viscosity. TEGDMA diluent reduces viscosity to allow adequate filler incorporation and clinical handling.'},
  {type:'tf',q:'Ordinary composite resin consists of 75% BIS-GMA and 25% TEGDMA.',ans:true,exp:'TRUE — Standard ordinary composite matrix = 75% BIS-GMA + 25% TEGDMA. This ratio balances the low viscosity needed for filler incorporation against acceptable polymerization shrinkage.'},
  {type:'tf',q:'Ormocers have a purely organic matrix, similar to conventional composite resins.',ans:false,exp:'FALSE — Ormocers have BOTH organic and inorganic components: an inorganic polysiloxane (SiO₂) backbone modified by organic methacrylate groups. This dual nature reduces shrinkage and residual monomer.'},
  {type:'tf',q:'Silorane-based composites undergo ring-opening polymerization, which results in low volumetric shrinkage.',ans:true,exp:'TRUE — Silorane uses ring-opening polymerization: the oxirane ring opens and GAINS space, compensating for volume loss. This produces minimal shrinkage — the key advantage of silorane composites.'},
  {type:'tf',q:'Increasing filler loading in composite resin reduces polymerization shrinkage and improves mechanical properties.',ans:true,exp:'TRUE — More filler = less resin matrix = less shrinkage. Filler also directly strengthens the composite. Key rule: more filler → better properties in all dimensions.'},
  {type:'tf',q:'Macrofilled composite has a filler diameter of 20–30 µm and provides an excellent surface finish.',ans:false,exp:'FALSE — Macrofilled composite has filler 20–30 µm, but provides POOR surface finish. Large particles pluck out during wear, leaving a rough, easily stained surface that is difficult to polish.'},
  {type:'tf',q:'Microfine composite has poor mechanical properties because its filler content is limited to a maximum of 25% by volume.',ans:true,exp:'TRUE — Microfine particles (0.04–0.2 µm) have enormous surface area and act as thickening agents, limiting filler to max 25% by volume. Low filler = poor mechanical properties despite excellent surface finish.'},
  {type:'tf',q:'Nanofilled composites are highly translucent because their filler size is below the wavelength of visible light (400–800 nm).',ans:true,exp:'TRUE — Nanomers (2–75 nm) and nanoclusters are smaller than visible light wavelengths. They do not scatter light, producing high translucency that mimics natural tooth optical properties.'},
  // MCQ (20)
  {type:'mcq',q:'Composite resins were first introduced in:',opts:['1878','1940','1962','1990'],ans:2,exp:'Composite resins were introduced in 1962 by Bowen (Bowen\'s resin = BIS-GMA). 1878 = silicate cement; 1940s = acrylic resins.'},
  {type:'mcq',q:'Which early restorative material was abandoned due to solubility in oral fluids and surface crazing?',opts:['Acrylic resin','Silicate cement','Zinc phosphate cement','Composite resin'],ans:1,exp:'Silicate cement was abandoned because of: (1) solubility in oral fluids, (2) surface crazing, (3) loss of translucency, (4) poor mechanical properties. NOT due to poor esthetics.'},
  {type:'mcq',q:'Acrylic resins (1940s) failed clinically mainly because of:',opts:['High cost and poor esthetics','High polymerization shrinkage, poor abrasion resistance, and high thermal expansion','Lack of tooth color','Slow and unpredictable setting time'],ans:1,exp:'Acrylic resins failed due to: high polymerization shrinkage, poor abrasion resistance, and high thermal expansion. These mechanical failures led to development of composite resins.'},
  {type:'mcq',q:'The two principal phases of resin composite restorative material are:',opts:['Initiator and activator','Enamel and dentine','Inorganic filler dispersed in a continuous resin matrix','Coupling agent and pigment'],ans:2,exp:'The two principal phases of composite are: (1) organic resin matrix (continuous phase) and (2) inorganic filler (dispersed phase). These two phases are bonded by the coupling agent.'},
  {type:'mcq',q:'Which component of composite resin is responsible for polymerization shrinkage?',opts:['Inorganic filler phase','Coupling agent','Organic matrix phase','UV stabilizer'],ans:2,exp:'The organic matrix (BIS-GMA, UDMA, TEGDMA) undergoes polymerization and shrinks. The inorganic filler does NOT shrink. Increasing filler content reduces total shrinkage by reducing matrix volume.'},
  {type:'mcq',q:'Bowen\'s resin refers to:',opts:['TEGDMA','UDMA','BIS-GMA (Bisphenol-A-glycidyl methacrylate)','MMA (methyl methacrylate)'],ans:2,exp:'BIS-GMA (Bisphenol-A-glycidyl methacrylate) is called Bowen\'s resin after its inventor R.L. Bowen (1962). It remains the primary oligomer in most composite resins.'},
  {type:'mcq',q:'BIS-GMA/UDMA oligomers are superior to MMA monomer because they have:',opts:['Higher polymerization shrinkage and faster setting','Lower molecular weight and less cross-linkage','Lower polymerization shrinkage, lower volatility, stiffer resin, and rapid hardening','Better water sorption and higher thermal expansion'],ans:2,exp:'BIS-GMA/UDMA advantages over MMA: (1) lower polymerization shrinkage (high MW), (2) lower volatility (safer), (3) stiffer/stronger resin (cross-linkage), (4) rapid hardening. Disadvantage: high viscosity → need TEGDMA diluent.'},
  {type:'mcq',q:'Diluents such as TEGDMA are added to composite resin to:',opts:['Increase polymerization shrinkage','Reduce overall viscosity of the oligomer','Increase the molecular weight of the matrix','Replace inorganic filler particles'],ans:1,exp:'TEGDMA is a low-viscosity diluent added to reduce the high viscosity of BIS-GMA/UDMA, allowing adequate filler incorporation and clinical workability. Trade-off: TEGDMA has lower MW → increases shrinkage slightly.'},
  {type:'mcq',q:'An ordinary composite resin matrix typically consists of:',opts:['50% BIS-GMA + 50% TEGDMA','75% BIS-GMA + 25% TEGDMA','25% BIS-GMA + 75% TEGDMA','100% UDMA only'],ans:1,exp:'Ordinary composite = 75% BIS-GMA + 25% TEGDMA. This ratio provides the balance between adequate viscosity for filler loading and acceptable polymerization shrinkage.'},
  {type:'mcq',q:'The matrix of Ormocers differs from conventional composites because it is:',opts:['Only organic','Only inorganic','Both organic and inorganic — polysiloxane SiO₂ backbone + methacrylate groups','Made of pure titanium oxide'],ans:2,exp:'Ormocers (Organically Modified Ceramics) have a dual matrix: inorganic polysiloxane (SiO₂) backbone with organic methacrylate groups attached. This reduces shrinkage, residual monomers, and improves biocompatibility.'},
  {type:'mcq',q:'Silorane-based composites achieve minimal polymerization shrinkage through:',opts:['Free-radical addition polymerization','Ring-opening polymerization of oxirane groups','Increased filler loading only','Chemical activation by benzoyl peroxide'],ans:1,exp:'Silorane uses ring-opening polymerization of oxirane (epoxide) rings. The ring opens and GAINS space, compensating for volume contraction that normally occurs in addition polymerization.'},
  {type:'mcq',q:'The primary function of inorganic filler particles in composite is to:',opts:['Provide color to the restoration','Initiate the polymerization reaction','Strengthen the composite and reduce the amount of resin matrix','Bond the filler to the resin'],ans:2,exp:'Inorganic filler strengthens the composite AND reduces the proportion of resin matrix, which reduces shrinkage, thermal expansion, and water sorption. More filler = better mechanical and physical properties.'},
  {type:'mcq',q:'Strontium and barium glasses are incorporated into filler particles mainly to:',opts:['Improve shade matching','Increase radiopacity','Decrease the strength of composite','Reduce thermal expansion only'],ans:1,exp:'Strontium (Sr) and barium (Ba) glasses are heavy metals that absorb X-rays, making the composite restoration visible on dental radiographs (radiopaque). This is essential for detecting secondary caries and overhangs.'},
  {type:'mcq',q:'Macrofilled (conventional) composite has a filler diameter of:',opts:['0.04–0.2 µm','0.5–3 µm','20–30 µm','2–75 nm'],ans:2,exp:'Macrofilled composite: filler diameter 20–30 µm. Good mechanical properties but POOR surface finish — large particles pluck out during wear, leaving a rough surface. Now largely obsolete clinically.'},
  {type:'mcq',q:'The main disadvantage of Microfine composite is:',opts:['Very rough surface and high staining tendency','Poor mechanical properties due to low filler volume (max 25%)','Too large particle size','Difficulty in shade matching'],ans:1,exp:'Microfine composite disadvantage: poor mechanical properties because high surface area of tiny particles (0.04–0.2 µm) acts as thickening agent, limiting filler to max 25% by volume → weak restoration.'},
  {type:'mcq',q:'In Microfine composite, filler content is limited to 25% by volume because:',opts:['Microfine particles are too heavy to be incorporated','Microfine particles have high surface area and act as thickening agents','The resin cannot wet the particles properly','Larger particles block light transmission'],ans:1,exp:'Microfine particles have enormous surface area (small size = high S/V ratio), which makes them powerful thickening agents. Adding more than 25% by volume makes the paste too thick to handle clinically.'},
  {type:'mcq',q:'Blended (Hybrid) composite combines the advantages of:',opts:['Macrofilled and nanofilled composites','Fine fillers (mechanical properties) and microfine fillers (surface finish)','Acrylic resin and silicate cement','BIS-GMA and metallic fillers'],ans:1,exp:'Hybrid composite blends: (1) fine fillers (0.5–3 µm) for mechanical strength and (2) microfine fillers (0.04–0.2 µm) for surface finish. This combination achieves better overall properties than either type alone.'},
  {type:'mcq',q:'Nanofilled composites are highly translucent because their filler size is:',opts:['Larger than visible light wavelengths (400–800 nm)','Exactly 1000 nm in diameter','Below the wavelength of visible light (400–800 nm)','Equal to enamel crystal size'],ans:2,exp:'Nanomers (2–75 nm) are smaller than visible light wavelengths (400–800 nm). Particles smaller than light wavelengths do not scatter light, producing high translucency and excellent optical properties.'},
  {type:'mcq',q:'The maximum filler content achievable in Nanofilled composites is approximately:',opts:['25% by volume','50% by volume','78.5% by volume','95% by volume'],ans:2,exp:'Nanofilled composites achieve up to 78.5% by volume filler (combining nanomers + nanoclusters). This is significantly higher than microfine (max 25%) and provides excellent mechanical properties alongside superior esthetics.'},
  {type:'mcq',q:'Nanohybrid composites differ from true Nanofilled composites because:',opts:['They contain no nanoparticles at all','Their smoothness is determined by the largest particles and they become dull after few years','They have lower polymerization shrinkage than nanofilled','They contain no filler particles whatsoever'],ans:1,exp:'Nanohybrid = nanoparticles + conventional hybrid particles. Surface smoothness is determined by the largest particles (which eventually show through), so nanohybrids become dull over time — unlike true nanofilled which maintains smoothness long-term.'},

  // ─── QUIZ 2: Coupling Agent · Initiator · Properties · Adhesion · Modifications ───
  // True/False (15)
  {type:'tf',q:'The coupling agent in composite resin is responsible for chemically bonding the inorganic filler particles to the organic resin matrix.',ans:true,exp:'TRUE — The coupling agent (organosilane) is the interfacial bonding agent between filler and matrix. Without it, the filler-matrix bond would fail rapidly in the wet oral environment.'},
  {type:'tf',q:'The most commonly used coupling agent in composite resin is an organosilane molecule.',ans:true,exp:'TRUE — Organosilane is the standard coupling agent. It is bifunctional: Si-OH groups bond to silica-based fillers; methacrylate C=C groups co-polymerize with the resin matrix.'},
  {type:'tf',q:'The coupling agent improves mechanical properties by transferring stresses from the stronger resin matrix to the weaker filler particles.',ans:false,exp:'FALSE — The coupling agent transfers stresses from the WEAK resin matrix to the STRONGER filler particles — the opposite direction. This is what improves mechanical properties.'},
  {type:'tf',q:'In a chemically activated (self-cure) composite, polymerization is initiated by camphorquinone absorbing blue light.',ans:false,exp:'FALSE — Camphorquinone is the photosensitizer for LIGHT-CURED composites. Self-cure (chemical activation) uses benzoyl peroxide (initiator) + tertiary amine (activator) in a two-paste system.'},
  {type:'tf',q:'Light-cured composites use a single paste supplied in a light-proof syringe, which allows command setting.',ans:true,exp:'TRUE — Light-cured composite: single paste in opaque/light-proof syringe. Sets ONLY when light is applied (command setting). No mixing required = no air incorporation and no human mixing variables.'},
  {type:'tf',q:'The peak absorption wavelength of camphorquinone is approximately 468 nm, which falls within the blue light range.',ans:true,exp:'TRUE — Camphorquinone peak absorption = 468 nm (blue light range 400–500 nm). The light-curing unit wavelength must match this peak for efficient photoinitiator activation.'},
  {type:'tf',q:'UV light is currently preferred over blue light for polymerization of composite resins due to its greater depth of cure.',ans:false,exp:'FALSE — UV light was DISCONTINUED. Reasons: (1) limited depth of cure, (2) harmful to skin (cancer risk) and eyes, (3) may alter oral flora. Blue light (400–500 nm) replaced UV for all clinical use.'},
  {type:'tf',q:'The optimum distance between the light source tip and the composite surface for adequate depth of cure is 1.0 mm.',ans:true,exp:'TRUE — Optimum tip-to-composite distance = 1.0 mm. Light intensity follows the inverse square law — increasing distance rapidly reduces intensity and depth of cure.'},
  {type:'tf',q:'Darker shades and higher opacity of composite resin result in greater depth of cure.',ans:false,exp:'FALSE — Darker shades and higher opacity DECREASE depth of cure — they absorb light, preventing it from penetrating deeper. Solution: increase exposure time and reduce increment thickness to ≤2–2.5 mm.'},
  {type:'tf',q:'Inhibitors in composite resin are also called free radical scavengers, and the most common example is monomethyl ether of hydroquinone.',ans:true,exp:'TRUE — Inhibitors (free radical scavengers) prevent spontaneous polymerization during storage. Monomethyl ether of hydroquinone is the standard inhibitor, quenching any stray free radicals before intentional activation.'},
  {type:'tf',q:'UV absorbers such as benzophenone are added to composite resin to prevent yellowing and minimize color changes caused by oxidation.',ans:true,exp:'TRUE — UV absorbers (benzophenone) intercept UV radiation that would otherwise cause oxidative degradation of the resin matrix, preventing yellowing and maintaining color stability over time.'},
  {type:'tf',q:'Composite resin has a higher coefficient of thermal expansion than metallic restorations, which can lead to marginal gap and percolation.',ans:true,exp:'TRUE — Composite\'s high organic matrix content gives it a higher thermal expansion coefficient than metal. Cyclic thermal changes cause repeated expansion/contraction → material fatigue → marginal gap → percolation.'},
  {type:'tf',q:'Polymerization shrinkage in composite resin creates stresses at the interface that can cause marginal leakage, secondary caries, and postoperative sensitivity.',ans:true,exp:'TRUE — Polymerization shrinkage can create interfacial stresses up to 130 kg/cm². These stresses cause: (1) marginal leakage, (2) secondary caries, (3) postoperative sensitivity, (4) enamel crack lines.'},
  {type:'tf',q:'Bonding to dentine is stronger and more reliable than bonding to enamel in composite resin restorations.',ans:false,exp:'FALSE — Bonding to ENAMEL is stronger and more reliable. Dentine is living, heterogeneous, tubular, contains organic matter and dentinal fluid — all factors that compromise bond reliability.'},
  {type:'tf',q:'Acid etching of enamel with 30–50% phosphoric acid for 15–30 seconds removes approximately 15 microns of enamel surface and creates microtags for mechanical bonding.',ans:true,exp:'TRUE — Phosphoric acid (30–50%) for 15–30 sec: removes ~15 µm enamel surface, creates microporosities, allows resin tags to penetrate and form micromechanical interlocking — the basis of enamel bonding.'},
  // MCQ (20)
  {type:'mcq',q:'The coupling agent in composite resin has which of the following molecular structure?',opts:['Si-OH groups on one side bonding to resin, and methacrylate groups on the other side bonding to filler','Si-OH groups bonding to silica-based fillers, and methacrylate C=C groups bonding to the resin matrix','Two identical ends that bond only to the resin matrix','A metallic core that bonds to the inorganic filler only'],ans:1,exp:'Organosilane coupling agent: Si-OH groups → bond to silica-based inorganic filler. Methacrylate C=C groups → co-polymerize with the organic resin matrix. This bifunctional structure bridges the two phases.'},
  {type:'mcq',q:'Which of the following best describes the role of the coupling agent in reducing clinical failure?',opts:['It increases the viscosity of the composite paste','It prevents water penetration between filler and resin, reducing early loss of filler particles','It initiates the polymerization reaction','It absorbs UV light to prevent yellowing'],ans:1,exp:'The coupling agent prevents water from penetrating the filler-matrix interface, which would cause hydrolytic breakdown and loss of filler particles. This maintains bond integrity in the wet oral environment.'},
  {type:'mcq',q:'In a chemically activated (self-cure) composite, polymerization is initiated by mixing:',opts:['Camphorquinone + blue light','Benzoyl peroxide (initiator) in Paste 1 + tertiary amine (activator) in Paste 2','TEGDMA + BIS-GMA in equal amounts','UV light + benzophenone'],ans:1,exp:'Self-cure system: two-paste. Paste 1 = resin + benzoyl peroxide (initiator). Paste 2 = resin + tertiary amine (activator). On mixing → reaction produces free radicals → polymerization begins.'},
  {type:'mcq',q:'The photosensitizer used in light-cured composite resin is:',opts:['Benzoyl peroxide','Benzophenone','Camphorquinone','Monomethyl ether of hydroquinone'],ans:2,exp:'Camphorquinone is the photoinitiator (photosensitizer) in light-cured composites. It absorbs blue light at peak 468 nm and generates free radicals. Benzoyl peroxide = self-cure. Benzophenone = UV absorber.'},
  {type:'mcq',q:'The blue light used to polymerize composite resin has a wavelength range of:',opts:['200–300 nm','300–400 nm','400–500 nm','600–700 nm'],ans:2,exp:'Blue light wavelength range = 400–500 nm, with camphorquinone peak absorption at 468 nm. This replaces the old UV (200–400 nm) which was discontinued due to health hazards and limited depth of cure.'},
  {type:'mcq',q:'UV light was replaced by blue light for polymerization of composite resins because UV light:',opts:['Did not initiate polymerization at all','Had limited depth of cure, was harmful to skin and eyes, and may alter oral flora','Caused excessive polymerization shrinkage','Was too expensive for routine clinical use'],ans:1,exp:'UV light discontinued because: (1) limited depth of cure, (2) skin cancer risk + eye damage, (3) may alter oral flora. Blue light (400–500 nm) is safer, deeper penetrating, and more efficient.'},
